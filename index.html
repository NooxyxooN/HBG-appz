<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCGbRb6h1lGf7JpqLoVT-giA0L1xydeC5A",
    authDomain: "hbgas-3758e.firebaseapp.com",
    projectId: "hbgas-3758e",
    storageBucket: "hbgas-3758e.firebasestorage.app",
    messagingSenderId: "113248645317",
    appId: "1:113248645317:web:0223507d7e6428d72c00ac",
    measurementId: "G-CWB6BPZ19M"
  };

  const COLLECTION = 'gasShopData';
  let app, db, fbError = null;
  try{
    app = initializeApp(firebaseConfig);
    db = getFirestore(app);
  }catch(e){
    fbError = e;
    console.error('Firebase init failed', e);
  }

  window.fbGetOnce = async function(key){
    if(fbError) throw fbError;
    const snap = await getDoc(doc(db, COLLECTION, key));
    return snap.exists() ? snap.data().items : null;
  };
  window.fbSet = async function(key, items){
    if(fbError) throw fbError;
    await setDoc(doc(db, COLLECTION, key), { items, updatedAt: Date.now() });
  };
  window.fbListen = function(key, cb){
    if(fbError) return;
    return onSnapshot(doc(db, COLLECTION, key), snap=>{
      if(snap.exists()) cb(snap.data().items);
    }, err=>{
      console.error('fbListen error', key, err);
      if(window.showSaveError) window.showSaveError('เชื่อมต่อฐานข้อมูลแบบเรียลไทม์ไม่สำเร็จ: ' + err.message);
    });
  };

  window._fbReadyResolve();
</script>

<script>
/* ---------------- storage ---------------- */
function fbReadyOrTimeout(){
  if(!window._fbReadyRaced){
    window._fbReadyRaced = Promise.race([
      window.fbReady,
      new Promise((_,rej)=> setTimeout(()=> rej(new Error('เชื่อมต่อฐานข้อมูล Firebase ไม่สำเร็จ (หมดเวลารอ) ลองรีเฟรชหน้าใหม่')), 8000))
    ]);
  }
  return window._fbReadyRaced;
}
async function loadData(key, fallback){
  try{
    await fbReadyOrTimeout();
    const items = await window.fbGetOnce(key);
    return (items !== null && items !== undefined) ? items : fallback;
  }
  catch(e){
    console.error('load failed', key, e);
    showSaveError('โหลดข้อมูลไม่สำเร็จ (' + key + '): ' + (e && e.message ? e.message : String(e)));
    return fallback;
  }
}
async function saveData(key, value){
  try{
    await fbReadyOrTimeout();
    await window.fbSet(key, value);
    hideSaveError();
  }
  catch(e){
    console.error('storage save failed', key, e);
    showSaveError('บันทึกไม่สำเร็จ: ' + (e && e.message ? e.message : String(e)));
  }
}

    document.body.appendChild(el);
  }
  el.textContent = '⚠️ ' + msg;
}

let state = { customers: [], sales: [], reminders: [], tasks: [], purchases: [], transactions: [], gasPrices: {4:0,7:0,15:0,48:0}, pickupDiscount: {4:10,7:10,15:20,48:20}, inventory: emptyInventory(), dailySummaries: {}, loaded:false };

function extractLatLngFromMapsUrl(url){
  if(!url) return null;
  let m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m) return `${m[1]},${m[2]}`;
  m = url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m) return `${m[1]},${m[2]}`;
  const d3 = url.match(/!3d(-?\d+\.\d+)/);
  const d4 = url.match(/!4d(-?\d+\.\d+)/);
  if(d3 && d4) return `${d3[1]},${d4[1]}`;
  return null;
}

// keep a customer's detailed borrowed-cylinder breakdown (by size+brand) in sync with the flat gasCylinders total
function addToCustomerGasBreakdown(c, items){
  if(!items || !items.length) return;
  if(!Array.isArray(c.gasCylindersBreakdown)) c.gasCylindersBreakdown = [];
  items.forEach(item=>{
    const qty = Number(item.qty||0);
    if(qty<=0) return;
    const existing = c.gasCylindersBreakdown.find(l=>l.size===item.size && l.brand===item.brand);
    if(existing) existing.qty += qty; else c.gasCylindersBreakdown.push({ size:item.size, brand:item.brand, qty });
  });
  c.gasCylinders = sumGasBreakdown(c.gasCylindersBreakdown);
}
function removeFromCustomerGasBreakdown(c, items){
  if(!items || !items.length) return;
  if(!Array.isArray(c.gasCylindersBreakdown)) c.gasCylindersBreakdown = [];
  items.forEach(item=>{
    const qty = Number(item.qty||0);
    if(qty<=0) return;
    const existing = c.gasCylindersBreakdown.find(l=>l.size===item.size && l.brand===item.brand);
    if(existing) existing.qty = Math.max(0, existing.qty - qty);
  });
  c.gasCylindersBreakdown = c.gasCylindersBreakdown.filter(l=>l.qty>0);
  c.gasCylinders = Math.max(0, sumGasBreakdown(c.gasCylindersBreakdown));
}

function getCustomerStats(customerId){
  const orders = state.sales.filter(s=>s.customerId===customerId).sort((a,b)=>b.date.localeCompare(a.date));
  const totalAmount = orders.reduce((a,b)=>a+Number(b.amount||0),0);
  const totalGas = orders.reduce((a,b)=>a+Number(b.gasQty||0),0);
  return { orders, totalAmount, totalGas, count: orders.length, lastDate: orders.length? orders[0].date : null };
}

// estimates a customer's delivery cycle (average days between orders) from real delivery history,
// so we can guess roughly when they'll need gas again without waiting for them to call in. Needs
// at least 3 actual deliveries (2 gaps) to say anything — with a brand-new install this will just
// return null for everyone until a few months of orders build up, which is expected and fine.
// Only counts sales with gasQty>0 (an actual delivery), so payment/debt-clearing entries (which
// also live in state.sales but carry no gas) don't get treated as delivery events.
function getCustomerCycleInfo(customerId){
  const dates = [...new Set(
    state.sales.filter(s=>s.customerId===customerId && Number(s.gasQty||0)>0).map(s=>s.date)
  )].sort();
  if(dates.length < 3) return null;
  const gaps = [];
  for(let i=1;i<dates.length;i++){
    const days = Math.round((Date.parse(dates[i]) - Date.parse(dates[i-1])) / 86400000);
    if(days>0) gaps.push(days);
  }
  if(gaps.length < 2) return null;
  const avgDays = gaps.reduce((a,b)=>a+b,0) / gaps.length;
  const variance = gaps.reduce((a,g)=>a+Math.pow(g-avgDays,2),0) / gaps.length;
  const stdev = Math.sqrt(variance);
  const isRegular = stdev <= avgDays * 0.6; // loose sanity guard — skip customers who order too erratically to predict
  const lastDate = dates[dates.length-1];
  const nextExpectedMs = Date.parse(lastDate) + Math.round(avgDays)*86400000;
  const daysUntilNext = Math.round((nextExpectedMs - Date.now()) / 86400000);
  return {
    ordersCount: dates.length,
    avgDays: Math.round(avgDays),
    lastDate,
    nextExpectedDate: new Date(nextExpectedMs).toISOString().slice(0,10),
    daysUntilNext,
    isRegular
  };
}

// customers whose predicted next order falls within `withinDays` (including already-overdue ones),
// sorted most-overdue first — feeds the "ใกล้ถึงรอบส่งแล้ว" dashboard section
function getUpcomingReorderCustomers(withinDays){
  return state.customers
    .map(c=>({ c, cycle: getCustomerCycleInfo(c.id) }))
    .filter(x=>x.cycle && x.cycle.isRegular && x.cycle.daysUntilNext <= withinDays)
    .sort((a,b)=>a.cycle.daysUntilNext - b.cycle.daysUntilNext);
}

// one-time cleanup: old ซอย/หมู่ entries sometimes had text mixed in (e.g. "ซอย 5", "หมู่3 ")
// — keep only the digits, per user request ("ผิดเดี๋ยวไปแก้ทีหลัง" if the number itself is wrong)
function migrateNumericSoiMoo(){
  let custChanged = false;
  state.customers.forEach(c=>{
    const newSoi = stripToDigits(c.soi);
    const newMoo = stripToDigits(c.moo);
    if(newSoi !== (c.soi||'')){ c.soi = newSoi; custChanged = true; }
    if(newMoo !== (c.moo||'')){ c.moo = newMoo; custChanged = true; }
  });
  if(custChanged) persistCustomers();

  let taskChanged = false;
  state.tasks.forEach(t=>{
    const newSoi = stripToDigits(t.soi);
    const newMoo = stripToDigits(t.moo);
    if(newSoi !== (t.soi||'')){ t.soi = newSoi; taskChanged = true; }
    if(newMoo !== (t.moo||'')){ t.moo = newMoo; taskChanged = true; }
  });
  if(taskChanged) persistTasks();
}

function computeDailySummary(dateStr){
  const salesToday = state.sales.filter(s=>s.date===dateStr);
  // only cash actually collected counts as income — unpaid (ค้างจ่าย) sales get counted later,
  // on the day the debt is actually paid off (openPaymentPrompt records that as its own sale entry)
  const saleAmount = salesToday.filter(s=>!s.unpaid).reduce((a,s)=>a+Number(s.amount||0),0);
  const newDebtToday = salesToday.filter(s=>s.unpaid).reduce((a,s)=>a+Number(s.amount||0),0);
  const purchaseExpense = state.purchases.filter(p=>p.date===dateStr).reduce((a,p)=>a+Number(p.billAmount||0),0);
  const txIncome = state.transactions.filter(t=>t.type==='income' && t.date===dateStr).reduce((a,t)=>a+Number(t.amount||0),0);
  const txExpense = state.transactions.filter(t=>t.type==='expense' && t.date===dateStr).reduce((a,t)=>a+Number(t.amount||0),0);
  const totalIncome = saleAmount + txIncome;
  const totalExpense = purchaseExpense + txExpense;
  let fullTotal = 0, emptyTotal = 0;
  GAS_SIZES.forEach(sz=>{
    const reg = (state.inventory[sz] && state.inventory[sz].regular) || {full:0,empty:0};
    const ptt = (state.inventory[sz] && state.inventory[sz].ptt) || {full:0,empty:0};
    fullTotal += Number(reg.full||0) + Number(ptt.full||0);
    emptyTotal += Number(reg.empty||0) + Number(ptt.empty||0);
  });
  const borrowedTotal = state.customers.reduce((a,c)=>a+Number(c.gasCylinders||0),0);
  const newCustomersToday = state.customers.filter(c=>(c.createdAt||'').slice(0,10)===dateStr).length;
  return {
    date: dateStr,
    income: totalIncome,
    expense: totalExpense,
    profit: totalIncome - totalExpense,
    newDebtToday,
    fullTotal,
    emptyTotal,
    borrowedTotal,
    newCustomersToday,
    salesCountToday: salesToday.length,
    savedAt: new Date().toISOString()
  };
}
function trySaveDailySummaryIfDue(){
  const now = new Date();
  if(now.getHours() < 21) return; // only auto-save from 21:00 onward
  const dateStr = todayISO();
  // recompute and overwrite today's snapshot every time this runs (page load + the 60s interval)
  // instead of freezing at the very first save past 21:00 — otherwise any sale/purchase entered
  // *after* that first save (e.g. doing bookkeeping late in the evening) would never make it into
  // the snapshot, which is exactly what caused a real day to show ฿0 income/expense despite having
  // actual sales recorded. This naturally stops updating once the date rolls over past midnight,
  // since dateStr becomes tomorrow's date and yesterday's snapshot is left as its last save.
  state.dailySummaries[dateStr] = computeDailySummary(dateStr);
  persistDailySummaries();
}
// lets the shop owner force a fresh recompute for any day (today or history) straight from current
// sales/purchases/transactions data — the fix for a stale/wrong snapshot that already got saved
function recomputeDailySummary(dateStr){
  state.dailySummaries[dateStr] = computeDailySummary(dateStr);
  persistDailySummaries();
  openDailySummaryModal();
}

function ensureInventorySlot(sz, brand){
  if(!state.inventory[sz]) state.inventory[sz] = { regular:{full:0,empty:0}, ptt:{full:0,empty:0} };
  if(!state.inventory[sz][brand]) state.inventory[sz][brand] = { full:0, empty:0 };
  return state.inventory[sz][brand];
}
// call when full cylinders arrive at the shop (e.g. restock from supplier)
function inventoryAddFull(sz, brand, qty){
  if(qty<=0) return;
  const slot = ensureInventorySlot(sz, brand);
  slot.full = Math.max(0, Number(slot.full||0) + qty);
}
// call when a full cylinder leaves the shop (delivered to a customer)
function inventoryRemoveFull(sz, brand, qty){
  if(qty<=0) return;
  const slot = ensureInventorySlot(sz, brand);
  slot.full = Math.max(0, Number(slot.full||0) - qty);
}
// call when an empty cylinder comes back to the shop (customer exchange or return)
function inventoryAddEmpty(sz, brand, qty){
  if(qty<=0) return;
  const slot = ensureInventorySlot(sz, brand);
  slot.empty = Math.max(0, Number(slot.empty||0) + qty);
}
// call when an empty cylinder leaves the shop (handed to supplier in a full-for-empty exchange)
function inventoryRemoveEmpty(sz, brand, qty){
  if(qty<=0) return;
  const slot = ensureInventorySlot(sz, brand);
  slot.empty = Math.max(0, Number(slot.empty||0) - qty);
}
// apply the effect of a delivery breakdown (e.g. from a sale or completed task) on shop stock
function applyDeliveryToInventory(breakdown, cylinderPending){
  if(!breakdown) return;
  breakdownToLineItems(breakdown).forEach(item=>{
    inventoryRemoveFull(item.size, item.brand, item.qty);
    if(!cylinderPending) inventoryAddEmpty(item.size, item.brand, item.qty); // immediate exchange: empty comes back right away
    // if cylinderPending, the empty stays out with the customer (tracked via customer.gasCylinders) until returned
  });
  persistInventory();
}
// apply the effect of a restock purchase on shop stock (supplier delivers full cylinders).
// most suppliers do a straight full-for-empty swap on delivery, so by default we also draw down
// the matching empty-cylinder stock per brand/size — pass exchangeEmpty:false to skip this
// (e.g. a one-off purchase of extra tanks with no empties handed back)
function applyPurchaseToInventory(breakdown, exchangeEmpty){
  if(!breakdown) return;
  breakdownToLineItems(breakdown).forEach(item=>{
    inventoryAddFull(item.size, item.brand, item.qty);
    if(exchangeEmpty) inventoryRemoveEmpty(item.size, item.brand, item.qty);
  });
  persistInventory();
}

const GAS_SIZES = ['4','7','15','48'];
const GAS_BRAND_LABELS = { regular:'ธรรมดา', ptt:'🅿 ปตท' };
function getBreakdownQty(entry){
  if(entry==null) return 0;
  if(typeof entry === 'object') return Number(entry.qty||0);
  return Number(entry||0);
}
function getBreakdownBrand(entry){
  if(entry && typeof entry === 'object') return entry.brand || 'regular';
  return 'regular';
}

        <option value="ptt" ${brand==='ptt'?'selected':''}>🅿 ปตท</option>
      </select>` : ''}
    </div>`;
  }).join('')}</div>`;
}
function readGasSizeInputs(prefix, includeBrand){
  if(includeBrand===undefined) includeBrand = true;
  const b = {};
  GAS_SIZES.forEach(sz=>{
    const el = document.getElementById(`${prefix}_${sz}`);
    const qty = el? (Number(el.value)||0) : 0;
    if(includeBrand){
      const brandEl = document.getElementById(`${prefix}_${sz}_brand`);
      b[sz] = { qty, brand: brandEl? brandEl.value : 'regular' };
    } else {
      b[sz] = qty;
    }
  });
  return b;
}
function sumGasBreakdown(b){
  if(!b) return 0;
  if(Array.isArray(b)) return b.reduce((a,item)=>a+Number(item.qty||0),0);
  return GAS_SIZES.reduce((a,sz)=>a+getBreakdownQty(b[sz]),0);
}
function computeSuggestedPrice(b, selfPickup){
  if(!b) return 0;
  if(Array.isArray(b)){
    return b.reduce((a,item)=>{
      const unitPrice = Number(state.gasPrices[item.size]||0) - (selfPickup? Number(state.pickupDiscount[item.size]||0) : 0);
      return a + Number(item.qty||0) * Math.max(0, unitPrice);
    }, 0);
  }
  return GAS_SIZES.reduce((a,sz)=>{
    const unitPrice = Number(state.gasPrices[sz]||0) - (selfPickup? Number(state.pickupDiscount[sz]||0) : 0);
    return a + getBreakdownQty(b[sz]) * Math.max(0, unitPrice);
  }, 0);
}
function gasBreakdownSummary(b){
  if(!b) return '';
  if(Array.isArray(b)){
    return b.filter(item=>Number(item.qty||0)>0).map(item=>{
      const brandTag = item.brand==='ptt'? ' (🅿 ปตท)' : '';
      return `แก๊ส${item.size}kg${brandTag} จำนวน ${item.qty} ถัง`;
    }).join(', ');
  }
  return GAS_SIZES.filter(sz=>getBreakdownQty(b[sz])>0).map(sz=>{
    const qty = getBreakdownQty(b[sz]);
    const brand = getBreakdownBrand(b[sz]);
    const brandTag = brand==='ptt'? ' (🅿 ปตท)' : '';
    return `แก๊ส${sz}kg${brandTag} จำนวน ${qty} ถัง`;
  }).join(', ');
}
// normalize any breakdown (array or size-keyed object) into a flat array of {size,brand,qty}
function breakdownToLineItems(b){
  if(!b) return [];
  if(Array.isArray(b)) return b.filter(i=>Number(i.qty||0)>0);
  return GAS_SIZES.map(sz=>({ size:sz, brand:getBreakdownBrand(b[sz]), qty:getBreakdownQty(b[sz]) })).filter(i=>i.qty>0);
}

/* Urgency system: auto-escalates by elapsed time since timerStartAt, unless manually pinned */
const URGENCY_AUTO_ICONS = { green:'🟢', yellow:'🟡', red:'🔴' };
// used by the compact circle+popover urgency picker in the Add/Edit Task form
const TASK_URGENCY_FORM_ICONS = { auto:'🟢🟡🔴', green:'🟢', yellow:'🟡', red:'🔴', paused:'🔵' };
const TASK_URGENCY_FORM_LABELS = { auto:'อัตโนมัติ (ไล่สีตามเวลาที่รอ)', green:'เขียว (กำหนดเอง)', yellow:'เหลือง (กำหนดเอง)', red:'แดง (กำหนดเอง)', paused:'พักไว้ก่อน (รอ activate)' };
const URGENCY_AUTO_LABELS = { green:'ปกติ (≤30 นาที)', yellow:'รอมานาน (30 นาที - 2ชม.30นาที)', red:'ค้างนาน (2ชม.30นาทีขึ้นไป)' };
function getTaskUrgencyState(t){
  if(t.urgencyMode === 'paused') return 'paused';
  if(t.urgencyMode === 'green' || t.urgencyMode === 'yellow' || t.urgencyMode === 'red') return t.urgencyMode;
  const startedAt = t.timerStartAt || Date.parse(t.createdAt) || Date.now();
  const elapsedMin = (Date.now() - startedAt) / 60000;
  if(elapsedMin >= 150) return 'red';
  if(elapsedMin > 30) return 'yellow';
  return 'green';
}
function getTaskUrgencyIcon(state_){ return state_==='paused' ? '🔵' : URGENCY_AUTO_ICONS[state_]; }
function getTaskUrgencyLabel(state_){ return state_==='paused' ? 'พักไว้ (รอ activate)' : URGENCY_AUTO_LABELS[state_]; }
// quick popup to change a task's status color by tapping its emoji directly, without opening
// the full edit form
function openTaskUrgencyPicker(taskId){
  const t = state.tasks.find(x=>x.id===taskId);
  if(!t) return;
  const current = t.urgencyMode || 'auto';
  const options = [
    ['auto','🟢🟡🔴 อัตโนมัติ (ไล่สีตามเวลาที่รอ)'],
    ['green','🟢 เขียว (กำหนดเอง)'],
    ['yellow','🟡 เหลือง (กำหนดเอง)'],
    ['red','🔴 แดง (กำหนดเอง)'],
    ['paused','🔵 พักไว้ก่อน (รอ activate)']
  ];
  const body = `
    <h3>เปลี่ยนสถานะ</h3>
    <div class="btnrow" style="flex-direction:column;align-items:stretch;gap:8px;">
      ${options.map(([k,l])=>`<button type="button" class="btn ${current===k?'primary':'ghost'}" data-set-urgency-val="${k}" style="text-align:left;">${l}</button>`).join('')}
    </div>
    <div class="btnrow" style="margin-top:14px;">
      <button type="button" class="btn ghost" id="cancelModal">ปิด</button>
    </div>
  `;
  showModal(body);
  document.querySelectorAll('[data-set-urgency-val]').forEach(b=>b.addEventListener('click', ()=>{
    const val = b.dataset.setUrgencyVal;
    const wasPaused = t.urgencyMode === 'paused';
    t.urgencyMode = val;
    if(val==='auto' && wasPaused) t.timerStartAt = Date.now(); // matches "Activate": restart the clock
    persistTasks();
    closeModal();
    render();
  }));
}
function formatElapsed(startMs){
  const min = Math.floor((Date.now() - startMs) / 60000);
  if(min < 1) return 'เมื่อสักครู่';
  if(min < 60) return `${min} นาทีที่แล้ว`;
  const h = Math.floor(min/60), m = min%60;
  return m>0 ? `${h} ชม. ${m} นาทีที่แล้ว` : `${h} ชม.ที่แล้ว`;
}

/* ---------------- real phone notifications for new งานส่ง (while the app is open/backgrounded) ----
   This is a "local" notification (Notification API / service worker showNotification), not a true
   push message — it only fires while this browser tab or installed PWA is running somewhere in the
   background. Getting notifications even when the app is fully closed would need a server component
   (Firebase Cloud Messaging + a Cloud Function watching Firestore) which is a much bigger project. */
function getNotifiedTaskIds(){
  // returns null specifically when this device has never initialized the feature yet, so the
  // caller can tell "never run before" apart from "ran before, currently zero new tasks"
  try{
    const raw = localStorage.getItem('notifiedTaskIds');
    if(raw===null) return null;
    return new Set(JSON.parse(raw));
  }catch(e){ return null; }
}
function saveNotifiedTaskIds(idsSet){
  try{ localStorage.setItem('notifiedTaskIds', JSON.stringify([...idsSet])); }
  catch(e){ /* localStorage unavailable — notifications just won't dedupe across reloads */ }
}
function showLocalNotification(title, body){
  if('serviceWorker' in navigator && navigator.serviceWorker.controller){
    navigator.serviceWorker.ready.then(reg=>{
      reg.showNotification(title, { body, icon:'icon-192.png', badge:'icon-192.png', tag:'hbg-new-task' });
    }).catch(()=>{ try{ new Notification(title, { body, icon:'icon-192.png' }); }catch(e){} });
  } else {
    try{ new Notification(title, { body, icon:'icon-192.png' }); }catch(e){ /* not supported here */ }
  }
}
function notifyNewTasks(){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  let notified = getNotifiedTaskIds();
  if(notified===null){
    // first time this feature has ever run on this device — baseline to whatever tasks already
    // exist right now instead of firing a notification flood for old tasks all at once
    saveNotifiedTaskIds(new Set(state.tasks.map(t=>t.id)));
    return;
  }
  const newTasks = state.tasks.filter(t=>!notified.has(t.id));
  if(!newTasks.length) return;
  newTasks.forEach(t=>notified.add(t.id));
  saveNotifiedTaskIds(notified);
  if(newTasks.length===1){
    const t = newTasks[0];
    const cust = t.customerId? state.customers.find(c=>c.id===t.customerId) : null;
    const name = cust? cust.name : (t.customName||'ไม่ระบุชื่อ');
    const items = (t.gasBreakdown && sumGasBreakdown(t.gasBreakdown)>0) ? compactGasBreakdown(t.gasBreakdown) : '';
    showLocalNotification('🆕 งานส่งใหม่', `${name}${items? ' | '+items : ''}`);
  } else {
    showLocalNotification('🆕 งานส่งใหม่', `มีงานส่งใหม่เพิ่ม ${newTasks.length} รายการ`);
  }
}
function requestTaskNotificationPermission(){
  if(!('Notification' in window)) return;
  Notification.requestPermission().then(()=>{
    notifyNewTasks(); // establishes the "already seen" baseline right away so granting permission
                       // doesn't immediately fire notifications for tasks that already existed
    render();
  });
}

  if(currentTab==='dashboard') app.innerHTML = renderDashboard();

/* ---------------- RANK ---------------- */
function renderRank(){
  const currentYear = todayISO().slice(0,4);
  const map = {};
  state.sales.forEach(s=>{
    if(!s.customerId) return;
    if(s.date.slice(0,4) !== currentYear) return;
    if(!map[s.customerId]) map[s.customerId] = {gas:0, amount:0, count:0};
    const gasQty = s.gasBreakdown? sumGasBreakdown(s.gasBreakdown) : Number(s.gasQty||0);
    map[s.customerId].gas += gasQty;
    map[s.customerId].amount += Number(s.amount||0);
    map[s.customerId].count += 1;
  });
  let arr = Object.keys(map).map(id=>{
    const cust = state.customers.find(c=>c.id===id);
    return { name: cust? cust.name : 'ลูกค้าที่ถูกลบแล้ว', ...map[id] };
  });
  const sortOptions = [['gas','ถัง'],['amount','เงิน'],['name','ชื่อ']];
  if(rankSort==='name') arr.sort((a,b)=>a.name.localeCompare(b.name,'th'));
  else if(rankSort==='amount') arr.sort((a,b)=>b.amount-a.amount);
  else arr.sort((a,b)=> b.gas - a.gas || b.amount - a.amount);

  const sortRow = `<div class="btnrow" style="margin-bottom:12px;">${sortOptions.map(([k,l])=>`<button class="btn ${rankSort===k?'primary':'ghost'} small" data-rank-sort="${k}">เรียงตาม ${l}</button>`).join('')}</div>`;

  if(!arr.length) return sortRow + '<div class="empty">ยังไม่มีข้อมูลยอดสั่งซื้อของปีนี้ ลองบันทึกยอดขายพร้อมเลือกลูกค้าก่อนครับ</div>';
  const medals = ['🥇','🥈','🥉'];
  return sortRow + `<h2 class="section-title">อันดับลูกค้าประจำปี ${currentYear} (ลูกค้าทั้งหมด ${arr.length} คน)</h2>` + arr.map((r,i)=>`
    <div class="card" style="display:flex;align-items:center;gap:12px;">
      <div style="font-size:20px;font-weight:700;width:32px;text-align:center;">${medals[i] || (i+1)}</div>
      <div style="flex:1;">
        <div style="font-weight:700;">${escapeHtml(r.name)}</div>
        <div class="rem-meta">สั่ง ${r.count} ครั้ง</div>
      </div>
      <div style="text-align:right;">
        <div class="mono" style="color:var(--orange-dark);">${fmtMoney(r.gas)} ถัง</div>
        <div class="mono" style="color:var(--green);font-size:13px;">฿${fmtMoney(r.amount)}</div>
      </div>
    </div>
  `).join('');
}

/* ---------------- PURCHASES (incoming stock from suppliers) ---------------- */
function getLatestCostPerUnit(){
  const result = {};
  const sorted = [...state.purchases].sort((a,b)=>b.date.localeCompare(a.date));
  GAS_SIZES.forEach(sz=>{
    const found = sorted.find(p=> p.costPerUnit && Number(p.costPerUnit[sz]||0)>0);
    result[sz] = found ? Number(found.costPerUnit[sz]) : null;
  });
  return result;
}

// weighted-average all-in cost per cylinder (purchase cost + driver tip), weighted by quantity across all recorded purchases
function getWeightedAvgCostPerUnit(){
  const result = {};
  GAS_SIZES.forEach(sz=>{
    let totalQty = 0, totalCost = 0;
    state.purchases.forEach(p=>{
      const qty = getBreakdownQty(p.breakdown && p.breakdown[sz]);
      const cost = Number((p.costPerUnit && p.costPerUnit[sz]) || 0);
      if(qty>0 && cost>0){
        const tip = p.tipPaid ? Number(p.tipPerCylinder||0) : 0;
        totalQty += qty;
        totalCost += qty * (cost + tip);
      }
    });
    result[sz] = totalQty>0 ? (totalCost/totalQty) : null;
  });
  return result;
}

function getSupplierNames(){
  const names = new Set();
  state.purchases.forEach(p=>{ if(p.supplierName) names.add(p.supplierName); });
  return [...names].sort((a,b)=>a.localeCompare(b,'th'));
}

// collects every distinct ซอย/หมู่/จุดสังเกต value ever typed (across both customers and walk-in
// tasks) so the input fields can offer them back as a native <datalist> dropdown — same pattern as
// the supplier-name autocomplete above — instead of making you retype the same soi/moo/landmark
// for every new person who happens to live in the same area
function stripToDigits(v){ return (v||'').toString().replace(/[^0-9]/g,''); }

function getKnownFieldValues(field){
  const values = new Set();
  state.customers.forEach(c=>{ if(c[field]) values.add(c[field]); });
  state.tasks.forEach(t=>{ if(t[field]) values.add(t[field]); });
  return [...values].sort((a,b)=>a.localeCompare(b,'th'));
}

function getLatestCostForSupplier(supplierName){
  const match = [...state.purchases]
    .filter(p=> p.supplierName.trim().toLowerCase() === supplierName.trim().toLowerCase() && p.costPerUnit)
    .sort((a,b)=>b.date.localeCompare(a.date))[0];
  return match ? { cost: match.costPerUnit, tipPaid: match.tipPaid||false, tipPerCylinder: match.tipPerCylinder||0 } : null;
}

function getPurchasePaymentStatus(p){
  let cash = Number(p.paidCash||0);
  let transfer = Number(p.paidTransfer||0);
  // backward compatibility with older records that only had paid + paymentMethod
  if(cash===0 && transfer===0 && p.paid){
    if(p.paymentMethod==='transfer') transfer = Number(p.billAmount||0);
    else cash = Number(p.billAmount||0);
  }
  const billAmount = Number(p.billAmount||0);
  const paidTotal = cash + transfer;
  const remaining = Math.max(0, billAmount - paidTotal);
  // a bill of ฿0 means the amount hasn't been filled in yet, not that it's "paid" — don't treat it as settled
  const isPaid = billAmount > 0 && remaining <= 0;
  const noBillAmount = billAmount <= 0;
  return { cash, transfer, paidTotal, remaining, isPaid, noBillAmount, billAmount };
}

function renderPurchases(){
  const active = state.purchases.filter(p=>!p.archived);
  const archived = state.purchases.filter(p=>p.archived);
  const statuses = active.map(p=>({ p, s: getPurchasePaymentStatus(p) }));
  const unpaid = statuses.filter(x=>!x.s.isPaid);
  const unpaidTotal = unpaid.reduce((a,x)=>a+x.s.remaining,0);
  const summary = active.length ? `
    <div class="debtor-total">
      <span>บิลที่ยังค้างชำระ (${unpaid.length} ใบ)</span>
      <span class="amt">฿${fmtMoney(unpaidTotal)}</span>
    </div>` : '';

  const archiveToggle = archived.length ? `<div class="btnrow" style="margin-bottom:${purchasesArchiveOpen?'10px':'14px'};">
    <button class="btn ${purchasesArchiveOpen?'primary':'ghost'} small" id="togglePurchaseArchive">📦 รายการที่เคลียร์แล้ว (${archived.length}) ${purchasesArchiveOpen?'▲':'▼'}</button>
  </div>` : '';
  let archivePanel = '';
  if(purchasesArchiveOpen && archived.length){
    const sortedArchived = [...archived].sort((a,b)=>b.date.localeCompare(a.date));
    archivePanel = `<div class="rem-meta" style="margin-bottom:8px;">รายการเหล่านี้ยังนับรวมในยอดรายจ่ายหน้าแรกตามปกติ แค่ไม่โชว์ในลิสต์หลักด้านล่างเฉยๆ</div>` +
      sortedArchived.map(p=>renderPurchaseRow(p, getPurchasePaymentStatus(p), true)).join('');
  }

  if(!active.length) return archiveToggle + archivePanel + '<div class="empty">ยังไม่มีรายการรับถังจากซัพพลายเออร์ที่ต้องจัดการ<br>แตะปุ่ม + เพื่อเพิ่มรายการ</div>';

  const sortOptions = [['date','วันที่'],['amount','จำนวนเงิน'],['gas','จำนวนถัง']];
  const sortBar = `<div class="btnrow" style="margin-bottom:12px;">${sortOptions.map(([k,l])=>`<button class="btn ${purchasesSort===k?'primary':'ghost'} small" data-purchases-sort="${k}">เรียงตาม ${l}</button>`).join('')}</div>`;

  let sorted = [...statuses];
  if(purchasesSort==='amount') sorted.sort((a,b)=>Number(b.p.billAmount||0)-Number(a.p.billAmount||0));
  else if(purchasesSort==='gas') sorted.sort((a,b)=>sumGasBreakdown(b.p.breakdown)-sumGasBreakdown(a.p.breakdown));
  else sorted.sort((a,b)=>b.p.date.localeCompare(a.p.date));

  const rows = sorted.map(({p,s})=>renderPurchaseRow(p, s, false)).join('');
  return archiveToggle + archivePanel + summary + sortBar + rows;
}

    // don't override what's already being edited on an existing record
    if(editing) return;
    const name = supplierInput.value.trim();
    if(!name) { supplierCostHint.style.display = 'none'; return; }
    const remembered = getLatestCostForSupplier(name);
    if(remembered){
      GAS_SIZES.forEach(sz=>{
        const costEl = document.getElementById(`purchaseCost_${sz}`);
        if(costEl && Number(remembered.cost[sz]||0)>0) costEl.value = remembered.cost[sz];

        document.getElementById('tipAmountField').style.display = '';

      }
      supplierCostHint.style.display = 'block';
    } else {

    document.getElementById('f_bill').value = total;

        state.purchases = state.purchases.filter(p=>p.id!==editId);
        persistPurchases(); render();
      });
    });
  }
  document.getElementById('purchaseForm').addEventListener('submit', e=>{
    e.preventDefault();
    const supplierName = document.getElementById('f_supplier').value.trim();
    if(!supplierName){
      document.getElementById('supplierError').style.display = 'block';
      document.getElementById('f_supplier').focus();
      return;
    }
    const data = {
      supplierName,
      date: document.getElementById('f_date').value || todayISO(),
      breakdown: readGasSizeInputs('purchase'),
      costPerUnit: readGasSizeInputs('purchaseCost', false),
      tipPaid: document.getElementById('f_tipPaid').checked,
      tipPerCylinder: Number(document.getElementById('f_tipPerCylinder').value)||0,
      billAmount: Number(document.getElementById('f_bill').value)||0,
      paidCash: Number(document.getElementById('f_paidCash').value)||0,
      paidTransfer: Number(document.getElementById('f_paidTransfer').value)||0,
      note: document.getElementById('f_note').value.trim()
    };
    if(editing){ Object.assign(editing, data); }
    else {
      const exchangeEmpty = document.getElementById('f_exchangeEmpty').checked;
      state.purchases.push({ id: uid(), ...data, exchangeEmpty });
      applyPurchaseToInventory(data.breakdown, exchangeEmpty);
    }
    persistPurchases();
    closeModal();
    render();
  });
}

        <div id="qpError" class="rem-meta" style="color:var(--red);display:none;margin-top:4px;">กรุณากรอกจำนวนเงินมากกว่า 0</div>
      </div>
      <div class="btnrow">
        <button type="submit" class="btn primary">บันทึก</button>
        <button type="button" class="btn ghost" id="cancelModal">ยกเลิก</button>
      </div>
    </form>`;
  showModal(body);
  document.getElementById('qpFullBtn').addEventListener('click', ()=>{
    document.getElementById('f_qpAmount').value = s.remaining;
  });
  document.getElementById('quickPayForm').addEventListener('submit', e=>{
    e.preventDefault();
    const amt = Number(document.getElementById('f_qpAmount').value)||0;
    if(amt<=0){
      document.getElementById('qpError').style.display = 'block';
      document.getElementById('f_qpAmount').focus();
      return;
    }
    const method = document.getElementById('f_qpMethod').value;
    if(method==='transfer') p.paidTransfer = Number(p.paidTransfer||0) + amt;
    else p.paidCash = Number(p.paidCash||0) + amt;
    persistPurchases();
    closeModal();
    render();
  });
}

/* ---------------- DASHBOARD ---------------- */
function renderDashboard(){
  const today = todayISO();
  const monthKey = today.slice(0,7);
  // only count sales that were actually paid — ค้างจ่าย (unpaid/debt) sales aren't real income yet,
  // they get counted as income later on whatever day the customer actually pays it off
  const saleToday = state.sales.filter(s=>s.date===today && !s.unpaid).reduce((a,b)=>a+Number(b.amount),0);
  const saleMonth = state.sales.filter(s=>s.date.slice(0,7)===monthKey && !s.unpaid).reduce((a,b)=>a+Number(b.amount),0);
  const totalDebt = state.customers.reduce((a,c)=>a+Number(c.debt||0),0);
  const totalGas = state.customers.reduce((a,c)=>a+Number(c.gasCylinders||0),0);
  // split the total borrowed-cylinder count by brand for the dashboard card. Older/bulk-imported
  // customers may have a gasCylinders count with no brand breakdown recorded — default that
  // unspecified portion to "regular" so regular+ptt always adds back up to the real total
  const gasByBrand = { regular:0, ptt:0 };
  state.customers.forEach(c=>{
    const items = breakdownToLineItems(c.gasCylindersBreakdown||[]);
    const bdSum = items.reduce((a,i)=>a+i.qty,0);
    items.forEach(item=>{ gasByBrand[item.brand] = (gasByBrand[item.brand]||0) + item.qty; });
    const unspecified = Number(c.gasCylinders||0) - bdSum;
    if(unspecified>0) gasByBrand.regular += unspecified;
  });
  const upcoming = getUpcomingReminders(3);
  // customers whose predicted delivery cycle says they're due (or overdue) within 2 days — stays
  // empty until enough order history builds up per customer (needs 3+ real deliveries to guess)
  const upcomingReorders = getUpcomingReorderCustomers(2);
  const unpaidBills = state.purchases.filter(p=>{
    if(p.archived) return false;
    const s = getPurchasePaymentStatus(p);
    return !s.isPaid && !s.noBillAmount;
  });
  const unpaidBillTotal = unpaidBills.reduce((a,p)=>a+getPurchasePaymentStatus(p).remaining,0);

  const extraIncomeMonth = state.transactions.filter(t=>t.type==='income' && t.date.slice(0,7)===monthKey).reduce((a,t)=>a+Number(t.amount||0),0);
  const extraExpenseMonth = state.transactions.filter(t=>t.type==='expense' && t.date.slice(0,7)===monthKey).reduce((a,t)=>a+Number(t.amount||0),0);
  const purchaseExpenseMonth = state.purchases.filter(p=>p.date.slice(0,7)===monthKey).reduce((a,p)=>a+Number(p.billAmount||0),0);
  const totalIncomeMonth = saleMonth + extraIncomeMonth;
  const totalExpenseMonth = purchaseExpenseMonth + extraExpenseMonth;
  const profitMonth = totalIncomeMonth - totalExpenseMonth;

  const dailySummaryButtonRow = `<div class="btnrow" style="margin-bottom:12px;"><button class="btn ghost small" id="openDailySummaryBtn">📋 สรุปผลประจำวัน (อัตโนมัติ 21:00 น.)</button></div>`;

        <div class="stat" data-show-pl="expense" style="cursor:pointer;"><div class="label">รายจ่าย (แตะดู)</div><div class="value debt">฿${fmtMoney(totalExpenseMonth)}</div></div>
        <div class="stat" style="grid-column:span 2;"><div class="label">กำไรสุทธิ</div><div class="value" style="color:${profitMonth>=0?'var(--green)':'var(--red)'};">฿${fmtMoney(profitMonth)}</div></div>

// bundles every piece of app data into one JSON file the shop owner can keep as an offline backup
// (separate from Firestore, which is the live source of truth) — covers everything loaded at init()
function exportFullBackup(){
  const backup = {
    exportedAt: new Date().toISOString(),
    app: 'ห้วยบอนแก๊ส - สมุดบัญชีร้าน',
    customers: state.customers,
    sales: state.sales,
    reminders: state.reminders,
    tasks: state.tasks,
    purchases: state.purchases,
    transactions: state.transactions,
    gasPrices: state.gasPrices,
    pickupDiscount: state.pickupDiscount,
    inventory: state.inventory,
    dailySummaries: state.dailySummaries
  };
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `สำรองข้อมูล_ห้วยบอนแก๊ส_${todayISO()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function getPLItems(type, period){
  const today = todayISO();
  function inPeriod(dateStr){
    if(period==='day') return dateStr===today;
    if(period==='month') return dateStr.slice(0,7)===today.slice(0,7);
    if(period==='year') return dateStr.slice(0,4)===today.slice(0,4);
    if(period==='custom') return dateStr===plDetailCustomDate;
    return true; // 'all'
  }
  let items = [];
  if(type==='income'){
    // ค้างจ่าย (unpaid) sales aren't cash yet — leave them out of the income breakdown; they'll
    // show up here on whatever day the debt actually gets paid off instead
    state.sales.filter(s=>inPeriod(s.date) && !s.unpaid).forEach(s=>{
      const cust = state.customers.find(c=>c.id===s.customerId);
      items.push({ date:s.date, amount:s.amount, note: cust? cust.name : (s.note||'ยอดขาย') });
    });
    state.transactions.filter(t=>t.type==='income' && inPeriod(t.date)).forEach(t=>{
      items.push({ date:t.date, amount:t.amount, note: t.note||'รายรับอื่นๆ' });
    });
  } else {
    state.purchases.filter(p=>inPeriod(p.date)).forEach(p=>{
      items.push({ date:p.date, amount:p.billAmount||0, note: `รับถัง — ${p.supplierName}${p.note? ' · '+p.note:''}` });
    });
    state.transactions.filter(t=>t.type==='expense' && inPeriod(t.date)).forEach(t=>{
      items.push({ date:t.date, amount:t.amount, note: t.note||'รายจ่ายอื่นๆ' });
    });
  }
  items.sort((a,b)=>b.date.localeCompare(a.date));
  return items;
}

function buildPLModalBody(type){
  let items = getPLItems(type, plDetailPeriod);
  const q = plDetailSearch.trim().toLowerCase();
  if(q) items = items.filter(i=>i.note.toLowerCase().includes(q));
  const total = items.reduce((a,i)=>a+Number(i.amount||0),0);
  const baseTitle = type==='income' ? 'รายรับ' : 'รายจ่าย';
  const periodLabels = { day:'วันนี้', month:'เดือนนี้', year:'ปีนี้', all:'ทั้งหมด', custom: fmtDateShort(plDetailCustomDate) };
  const color = type==='income' ? 'var(--green)' : 'var(--red)';
  const periodOptions = [['day','วัน'],['month','เดือน'],['year','ปี'],['all','ทั้งหมด'],['custom','กำหนดเอง']];
  const periodBar = `<div class="btnrow" style="margin-bottom:10px;">${periodOptions.map(([k,l])=>`<button type="button" class="btn ${plDetailPeriod===k?'primary':'ghost'} small" data-pl-period="${k}">${l}</button>`).join('')}</div>`;
  const dateBar = plDetailPeriod==='custom' ? `<div class="field" style="margin-bottom:10px;"><input type="date" id="plCustomDateInput" value="${plDetailCustomDate}"></div>` : '';
  const searchBar = `<div class="field" style="margin-bottom:10px;"><input id="plSearchInput" placeholder="🔍 ค้นหารายการ..." value="${escapeAttr(plDetailSearch)}"></div>`;
  return `
    <h3>${baseTitle}${periodLabels[plDetailPeriod]}</h3>
    ${periodBar}
    ${dateBar}
    ${searchBar}
    <div class="mono" style="font-size:20px;color:${color};margin-bottom:12px;">฿${fmtMoney(total)} รวม ${items.length} รายการ</div>
    ${items.length? items.map(i=>`
      <div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;">
        <div>
          <div style="font-weight:600;">${escapeHtml(i.note)}</div>
          <div class="rem-meta">${fmtDateShort(i.date)}</div>
        </div>
        <div class="mono" style="color:${color};">฿${fmtMoney(i.amount)}</div>
      </div>
    `).join('') : '<div class="empty">ไม่พบรายการ</div>'}
    <div class="btnrow" style="margin-top:12px;">
      <button type="button" class="btn ghost" id="cancelModal">ปิด</button>
    </div>
  `;
}

function wirePLModalHandlers(type){
  document.querySelectorAll('[data-pl-period]').forEach(b=>b.addEventListener('click', ()=>{
    plDetailPeriod = b.dataset.plPeriod;
    showModal(buildPLModalBody(type));
    wirePLModalHandlers(type);
  }));
  const dateInput = document.getElementById('plCustomDateInput');
  if(dateInput){
    dateInput.addEventListener('change', ()=>{
      plDetailCustomDate = dateInput.value || todayISO();
      showModal(buildPLModalBody(type));
      wirePLModalHandlers(type);
    });
  }
  const searchInput = document.getElementById('plSearchInput');
  if(searchInput){
    searchInput.addEventListener('input', ()=>{
      plDetailSearch = searchInput.value;
      const cursorPos = searchInput.selectionStart;
      showModal(buildPLModalBody(type));
      wirePLModalHandlers(type);
      const newInput = document.getElementById('plSearchInput');
      if(newInput){ newInput.focus(); newInput.setSelectionRange(cursorPos, cursorPos); }
    });
  }
}

  let panel = '';
  if(customersFilterOpen){
    const filterChips = [['all','ทั้งหมด'],['debt','มีหนี้'],['gas','มีถังค้าง'],['nophone','ไม่มีเบอร์โทร']];
    const sortOptions = [['name','ชื่อ'],['debt','ยอดหนี้'],['gas','ถังค้าง'],['recent','เพิ่มล่าสุด']];
    panel = `
      <div class="stamp-card" style="margin-bottom:12px;">

        <div class="btnrow" style="margin-bottom:10px;">${filterChips.map(([k,l])=>`<button class="btn ${customersFilterType===k?'primary':'ghost'} small" data-cust-filter="${k}">${l}</button>`).join('')}</div>
        <div class="rem-meta" style="margin-bottom:6px;font-weight:700;">เรียงตาม</div>

      </div>`;

  if(!state.customers.length) return toolRow + toggleBtn + panel + '<div class="empty">ยังไม่มีลูกค้า<br>แตะปุ่ม + มุมล่างขวาเพื่อเพิ่มลูกค้าใหม่<br>หรือนำเข้าหลายรายการพร้อมกันด้านบน</div>';

  const q = customerSearchQuery.trim().toLowerCase();

  else if(customersFilterType==='gas') list = list.filter(c=>Number(c.gasCylinders||0)>0);
  else if(customersFilterType==='nophone') list = list.filter(c=>!c.phone);
  if(customersSort==='debt') list.sort((a,b)=>Number(b.debt||0)-Number(a.debt||0));
  else if(customersSort==='gas') list.sort((a,b)=>Number(b.gasCylinders||0)-Number(a.gasCylinders||0));
  else if(customersSort==='recent') list.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  else list.sort((a,b)=>a.name.localeCompare(b.name,'th'));
  const listHtml = list.length? list.map(renderCustomerCard).join('') : '<div class="empty">ไม่พบลูกค้าที่ตรงกับเงื่อนไข</div>';
  return toolRow + searchBar + toggleBtn + panel + `<div class="rem-meta" style="margin-bottom:8px;">พบ ${list.length} คน</div>` + listHtml;
}

function exportCustomersCSV(){
  const headers = ['ชื่อ','เบอร์โทร','ที่อยู่','ถังแก๊สที่ยืม','ยอดค้างชำระ','หมายเหตุ','จำนวนครั้งที่สั่ง','ถังรวมสะสม','ยอดรวมสะสม','สั่งล่าสุด'];
  const csvEscape = v => `"${String(v==null?'':v).replace(/"/g,'""')}"`;
  const rows = state.customers.map(c=>{
    const stats = getCustomerStats(c.id);
    return [
      c.name, c.phone||'', c.address||'', c.gasCylinders||0, c.debt||0, c.notes||'',
      stats.count, stats.totalGas, stats.totalAmount, stats.lastDate||''
    ].map(csvEscape).join(',');
  });
  const csv = '\uFEFF' + headers.map(csvEscape).join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ลูกค้า_${todayISO()}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------------- SALES ---------------- */
function renderSales(){
  const periods = [['day','รายวัน'],['week','รายสัปดาห์'],['month','รายเดือน'],['year','รายปี']];
  const toggle = `<div class="chart-toggle">${periods.map(([k,l])=>`<button data-period="${k}" class="${k===salesPeriod?'active':''}">${l}</button>`).join('')}</div>`;
  const chart = `<div class="chart-wrap"><canvas id="salesChart" height="180"></canvas></div>`;
  const dailyList = renderDailyDeliveryList();

  const sortOptions = [['date','วันที่ล่าสุด'],['amount','จำนวนเงิน'],['name','ชื่อลูกค้า']];
  const sortBar = `<div class="btnrow" style="margin-bottom:12px;">${sortOptions.map(([k,l])=>`<button class="btn ${recentSalesSort===k?'primary':'ghost'} small" data-recent-sales-sort="${k}">${l}</button>`).join('')}</div>`;

  let recent = [...state.sales];
  if(recentSalesSort==='amount') recent.sort((a,b)=>Number(b.amount||0)-Number(a.amount||0));
  else if(recentSalesSort==='name') recent.sort((a,b)=>{
    const an = (state.customers.find(c=>c.id===a.customerId)||{}).name || a.note || '';
    const bn = (state.customers.find(c=>c.id===b.customerId)||{}).name || b.note || '';
    return an.localeCompare(bn,'th');
  });
  // "date" here is just a YYYY-MM-DD string with no time — sorting by date alone leaves same-day
  // entries in original push order (oldest first), so the newest sale of the day showed up at the
  // bottom of that day's cluster instead of the top. createdAt is a real ms timestamp set at push
  // time, so it breaks the tie correctly; older sales recorded before this fix fall back to 0.
  else recent.sort((a,b)=>{
    const dateCmp = b.date.localeCompare(a.date);
    if(dateCmp !== 0) return dateCmp;
    return (b.createdAt||0) - (a.createdAt||0);
  });
  recent = recent.slice(0,15);

  const list = recent.length? recent.map(s=>{
    const cust = state.customers.find(c=>c.id===s.customerId);
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-weight:600;">${cust? escapeHtml(cust.name) : (s.note||'ยอดขาย')}</div>
          <div class="rem-meta">${fmtDateShort(s.date)}</div>
        </div>
        <div class="mono" style="color:var(--green);font-size:16px;">+฿${fmtMoney(s.amount)}</div>
      </div>
      <div class="btnrow" style="margin-top:6px;">
        <button class="btn ghost small" data-edit-sale="${s.id}">แก้ไข</button>
        <button class="btn ghost small" data-bill-sale="${s.id}">🧾 บิล</button>
      </div>
    </div>`;
  }).join('') : '<div class="empty">ยังไม่มีรายการขาย</div>';

  return `${toggle}${chart}<h2 class="section-title">รายการล่าสุด</h2>${sortBar}${list}${dailyList}`;
}

function renderDailyDeliveryList(){
  const d = new Date(salesViewDate+'T00:00:00');
  const dayLabel = d.toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const daySales = state.sales.filter(s=>s.date===salesViewDate);
  const nav = `
    <div class="btnrow" style="align-items:center;margin-bottom:4px;">
      <button class="btn ghost small" id="prevDayBtn">‹ วันก่อน</button>
      <input type="date" id="dailyDatePicker" value="${salesViewDate}" style="padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-family:'Sarabun',sans-serif;">
      <button class="btn ghost small" id="nextDayBtn">วันถัดไป ›</button>
    </div>`;
  const rows = daySales.length ? daySales.map(s=>{
    const cust = state.customers.find(c=>c.id===s.customerId);
    const link = cust? mapsUrl(cust.address) : null;
    return `
    <div class="card" style="padding:10px 14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-weight:700;">${cust? escapeHtml(cust.name) : (s.note||'ไม่ระบุชื่อ')}</div>
        <div class="mono" style="color:var(--green);">฿${fmtMoney(s.amount)}</div>
      </div>
      <div class="btnrow" style="margin-top:6px;">
        ${Number(s.gasQty||0)>0? `<span class="tag gas">🛢️ ${s.gasQty} ถัง</span>` : ''}
        <span class="tag ${s.unpaid?'debt':'paid'}" data-toggle-unpaid="${s.id}" style="cursor:pointer;">${s.unpaid? '❗ ค้างจ่าย':'✓ จ่ายแล้ว'}</span>
        <span class="tag ${s.cylinderPending?'debt':'paid'}" data-toggle-cyl="${s.id}" style="cursor:pointer;">${s.cylinderPending? '❗ ค้างถัง':'✓ คืนถังแล้ว'}</span>
        <button class="btn ghost small" data-edit-sale="${s.id}">แก้ไข</button>
        <button class="btn ghost small" data-bill-sale="${s.id}">🧾 บิล</button>
        ${link? `<a class="maps-link" href="${link}" target="_blank" rel="noopener">🧭 นำทาง</a>` : ''}
      </div>
    </div>`;
  }).join('') : '<div class="empty">ยังไม่มีรายการส่งของในวันนี้</div>';

  return `<h2 class="section-title">รายชื่อที่ส่งวันที่ ${dayLabel}</h2>${nav}${rows}`;
}

function drawChart(){
  const canvas = document.getElementById('salesChart');
  if(!canvas) return;
  const {labels, values} = buildSeries(salesPeriod);
  if(window._salesChart) window._salesChart.destroy();
  window._salesChart = new Chart(canvas.getContext('2d'), {
    type:'bar',
    data:{ labels, datasets:[{ label:'ยอดขาย (บาท)', data:values, backgroundColor:'#DB6B2A', borderRadius:4 }] },
    options:{
      responsive:true,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ grid:{display:false}, ticks:{font:{family:'IBM Plex Mono'},color:'#5C6255'} },
        y:{ grid:{color:'#DDD6C2'}, ticks:{font:{family:'IBM Plex Mono'},color:'#5C6255'} }
      }
    }
  });
}

function buildSeries(period){
  const now = new Date();
  const labels=[], values=[];
  // same rule as the dashboard: ค้างจ่าย (unpaid) sales aren't counted until the debt is actually paid off
  if(period==='day'){
    for(let i=13;i>=0;i--){
      const d = new Date(now); d.setDate(d.getDate()-i);
      const key = d.toISOString().slice(0,10);
      labels.push(d.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit'}));
      values.push(state.sales.filter(s=>s.date===key && !s.unpaid).reduce((a,b)=>a+Number(b.amount),0));
    }
  } else if(period==='week'){
    for(let i=7;i>=0;i--){
      const end = new Date(now); end.setDate(end.getDate()-i*7);
      const start = new Date(end); start.setDate(start.getDate()-6);
      const startKey=start.toISOString().slice(0,10), endKey=end.toISOString().slice(0,10);
      labels.push(start.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit'}));
      values.push(state.sales.filter(s=>s.date>=startKey && s.date<=endKey && !s.unpaid).reduce((a,b)=>a+Number(b.amount),0));
    }
  } else if(period==='month'){
    for(let i=11;i>=0;i--){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const key = d.toISOString().slice(0,7);
      labels.push(d.toLocaleDateString('th-TH',{month:'short',year:'2-digit'}));
      values.push(state.sales.filter(s=>s.date.slice(0,7)===key && !s.unpaid).reduce((a,b)=>a+Number(b.amount),0));
    }
  } else {
    for(let i=4;i>=0;i--){
      const y = now.getFullYear()-i;
      labels.push(String(y));
      values.push(state.sales.filter(s=>s.date.slice(0,4)===String(y) && !s.unpaid).reduce((a,b)=>a+Number(b.amount),0));
    }
  }
  return {labels, values};
}

      <div class="field">
        <label style="display:flex;align-items:center;gap:8px;font-weight:400;"><input type="checkbox" id="f_pickup" style="width:auto;" ${editing && editing.pickup?'checked':''}> 🏪 ลูกค้ามารับเองที่ร้าน (มีส่วนลด)</label>
      </div>
      <div class="field">
        <label>จำนวนเงิน (บาท) *</label>
        <input type="number" min="0" step="0.01" id="f_amount" value="${editing? editing.amount : ''}">
        <button type="button" class="btn ghost small" id="useSuggestedPriceBtnSale" style="margin-top:6px;">💡 ใช้ราคาแนะนำ</button>

      </div>

      <div class="field">
        <label style="display:flex;align-items:center;gap:8px;font-weight:400;"><input type="checkbox" id="f_unpaid" style="width:auto;" ${editing && editing.unpaid?'checked':''}> ค้างจ่ายเงิน</label>
        <label style="display:flex;align-items:center;gap:8px;font-weight:400;margin-top:6px;"><input type="checkbox" id="f_cylpending" style="width:auto;" ${editing && editing.cylinderPending?'checked':''}> ค้างถัง (ยังไม่คืนถังเปล่า)</label>
      </div>
      <div class="btnrow">
        <button type="submit" class="btn primary">${editing? 'บันทึกการแก้ไข' : 'บันทึก'}</button>
        ${editing? `<button type="button" class="btn danger" id="deleteSaleBtn">ลบรายการนี้</button>` : ''}

      </div>

  function renderSaleCustSuggestions(){
    const q = custSearchInput.value.trim().toLowerCase();
    if(!q){ custSuggestBox.innerHTML=''; return; }
    const matches = state.customers.filter(c=>c.name.toLowerCase().includes(q)).slice(0,6);
    custSuggestBox.innerHTML = matches.length? matches.map(c=>`<div class="card" style="padding:8px 12px;cursor:pointer;margin-bottom:4px;" data-pick-cust="${c.id}">👤 ${escapeHtml(c.name)}${c.phone? ' · '+escapeHtml(c.phone):''}</div>`).join('') : '<div class="rem-meta">ไม่พบในระบบ — จะเพิ่มเป็นลูกค้าใหม่ชื่อนี้ให้อัตโนมัติ</div>';
    custSuggestBox.querySelectorAll('[data-pick-cust]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const picked = state.customers.find(c=>c.id===el.dataset.pickCust);
        document.getElementById('f_customer').value = el.dataset.pickCust;
        custSearchInput.value = picked.name;
        custSuggestBox.innerHTML = '';
      });
    });
  }
  custSearchInput.addEventListener('input', ()=>{
    document.getElementById('f_customer').value = '';
    renderSaleCustSuggestions();
  });

  document.getElementById('useSuggestedPriceBtnSale').addEventListener('click', ()=>{
    const b = readGasSizeInputs('sale');
    const pickup = document.getElementById('f_pickup').checked;
    document.getElementById('f_amount').value = computeSuggestedPrice(b, pickup);
  });
  if(editing){
    document.getElementById('deleteSaleBtn').addEventListener('click', ()=>{
      if(confirm('ลบรายการขายนี้ใช่หรือไม่? (ไม่กระทบยอดหนี้/ถังที่ปรับไว้แล้วในโปรไฟล์ลูกค้า)')){
        state.sales = state.sales.filter(s=>s.id!==editId);
        persistSales();
        closeModal();
        render();
      }
    });
  }
  document.getElementById('saleForm').addEventListener('submit', e=>{
    e.preventDefault();
    const amt = Number(document.getElementById('f_amount').value)||0;
    if(amt<=0){
      document.getElementById('amountError').style.display = 'block';
      document.getElementById('f_amount').focus();
      return;
    }
    let customerId = document.getElementById('f_customer').value || null;
    const typedName = custSearchInput.value.trim();
    if(!customerId && typedName){
      const exactMatch = state.customers.find(c=>c.name.trim().toLowerCase()===typedName.toLowerCase());
      if(exactMatch){
        customerId = exactMatch.id;
      } else {
        const newCust = { id: uid(), createdAt: new Date().toISOString(), name: typedName, phone:'', address:'', gasCylinders:0, debt:0, notes:'' };
        state.customers.push(newCust);
        persistCustomers();
        customerId = newCust.id;
      }
    }
    const breakdown = readGasSizeInputs('sale');
    let note = document.getElementById('f_note').value.trim();
    if(!customerId && !typedName && !note) note = 'ลูกค้าหน้าร้าน';
    const data = {
      date: document.getElementById('f_date').value || todayISO(),
      amount: amt,
      customerId,
      note,
      gasQty: sumGasBreakdown(breakdown),
      gasBreakdown: breakdown,
      pickup: document.getElementById('f_pickup').checked,
      unpaid: document.getElementById('f_unpaid').checked,
      cylinderPending: document.getElementById('f_cylpending').checked
    };
    if(editing){ Object.assign(editing, data); }
    else {
      state.sales.push({ id:uid(), ...data, createdAt: Date.now() });
      applyDeliveryToInventory(data.gasBreakdown, data.cylinderPending);
      if(customerId){
        const c = state.customers.find(x=>x.id===customerId);
        if(c){
          if(data.unpaid && amt>0) c.debt = Number(c.debt||0) + amt;
          if(data.cylinderPending && data.gasQty>0) addToCustomerGasBreakdown(c, breakdownToLineItems(breakdown));
          persistCustomers();
        }
      }
    }
    persistSales();
    closeModal();
    render();
  });
}

/* ---------------- RECEIPT IMAGE EXPORT (for thermal printers like Peripage) ---------------- */
async function exportReceiptImage(title, contentHtml, widthPx){
  const container = document.createElement('div');
  container.style.cssText = `position:fixed;left:-9999px;top:0;width:${widthPx}px;background:#ffffff;color:#000000;font-family:'IBM Plex Mono',monospace;padding:14px 10px;font-size:${widthPx>450?19:16}px;line-height:1.6;`;
  container.innerHTML = contentHtml;
  document.body.appendChild(container);
  try{
    const canvas = await html2canvas(container, { backgroundColor:'#ffffff', width: widthPx, useCORS:true });
    const filename = `${title}_${todayISO()}.jpg`;
    // try the native share sheet first (send straight to LINE/Messenger/etc); falls back to a
    // plain download + manual-save instructions if this device/browser can't share files
    const shared = await shareOrDownloadCanvas(canvas, filename);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
    const body = `
      <h3>${shared? '✅ แชร์รูปแล้ว' : '✅ สร้างรูปเสร็จแล้ว'}</h3>
      ${!shared? `<div class="rem-meta" style="margin-bottom:10px;line-height:1.6;">รูปถูกดาวน์โหลดไว้แล้ว กดปุ่ม "📤 แชร์" ด้านล่างเพื่อส่งไปยังแอปที่ต้องการ — ถ้าเครื่องนี้เปิดหน้าต่างแชร์ไม่ได้ ให้กดค้างที่รูปแล้วเลือก "บันทึกรูปภาพ"/ส่งต่อเองแทน</div>` : ''}
      <div style="text-align:center;background:#eee;padding:8px;border-radius:8px;">
        <img src="${dataUrl}" style="max-width:100%;border:1px solid var(--border);" alt="${escapeAttr(title)}">
      </div>
      <div class="btnrow" style="margin-top:12px;">
        <button type="button" class="btn primary" id="shareReceiptAgainBtn">📤 แชร์</button>
        <button type="button" class="btn ghost" id="cancelModal">ปิด</button>
      </div>
    `;
    showModal(body);
    const shareAgainBtn = document.getElementById('shareReceiptAgainBtn');
    if(shareAgainBtn) shareAgainBtn.addEventListener('click', ()=> shareOrDownloadCanvas(canvas, filename));
  }catch(e){
    console.error('export receipt failed', e);
    showSaveError('สร้างรูปภาพไม่สำเร็จ: ' + (e && e.message ? e.message : String(e)));
  }
  document.body.removeChild(container);
}

function buildDebtorsReceiptHtml(){

  debtors.sort((a,b)=> (Number(b.debt||0)+Number(b.gasCylinders||0)) - (Number(a.debt||0)+Number(a.gasCylinders||0)));
  const totalMoney = debtors.reduce((a,c)=>a+Number(c.debt||0),0);
  const totalGas = debtors.reduce((a,c)=>a+Number(c.gasCylinders||0),0);
  const dateStr = new Date().toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});
  let html = `<div style="text-align:center;font-weight:bold;font-size:1.15em;margin-bottom:8px;">=== รายชื่อลูกหนี้ ===</div>
  <div style="text-align:center;margin-bottom:18px;">${dateStr}</div>
  <div style="border-top:3px solid #000;margin-bottom:18px;"></div>`;
  if(!debtors.length){
    html += `<div style="text-align:center;">🎉 ไม่มีลูกหนี้ในตอนนี้</div>`;
  }
  // ☐ ชื่อ / หนี้เงิน / หนี้ถัง บรรทัดเดียว — ไว้ติ๊กปากกาตอนพิมพ์แปะสมุด, เส้นแบ่งเป็นเส้นทึบเพราะเส้นประบางเกินไปพิมพ์ไม่ค่อยติด
  debtors.forEach(c=>{
    const parts = [];
    if(Number(c.debt||0)>0) parts.push(`หนี้฿${fmtMoney(c.debt)}`);
    if(Number(c.gasCylinders||0)>0) parts.push(`ถังค้าง${c.gasCylinders}`);
    html += `<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:2px solid #000;">
      ☐ <b>${escapeHtml(c.name)}</b>${parts.length? ' / '+parts.join(' / ') : ''}
    </div>`;
  });
  html += `<div style="border-top:3px solid #000;margin-top:6px;padding-top:10px;font-weight:bold;">รวมหนี้: ฿${fmtMoney(totalMoney)} / รวมถังค้าง: ${totalGas} ใบ</div>
  <div style="text-align:center;margin-top:10px;font-size:0.85em;">— พิมพ์จากสมุดบัญชีร้าน —</div>`;
  // same font (Sarabun) + size as the ใบแจ้งหนี้ notice card, so this print export matches that look
  return `<div style="font-family:'Sarabun',sans-serif;font-size:2.2em;">${html}</div>`;
}

// ultra-short item format just for the printed Tasks list: ป/ธ single-letter brand + size + qty,

function compactGasBreakdown(b){
  const BRAND_CHAR = { ptt:'ป', regular:'ธ' };
  return breakdownToLineItems(b).map(item=> `${BRAND_CHAR[item.brand]||''}${item.size}กก ${item.qty} ถัง`).join(', ');

function buildTasksReceiptHtml(){

    html += `<div style="text-align:center;">ไม่มีงานส่งในขณะนี้</div>`;
  }
  // just ☐ ชื่อ | รายการ แบบย่อ — ☐ ไว้ให้ติ๊กปากกาตอนส่งเสร็จ, เส้นแบ่งเป็นเส้นทึบเพราะเส้นประบางเกินไปพิมพ์ไม่ค่อยติด

    const items = (t.gasBreakdown && sumGasBreakdown(t.gasBreakdown)>0) ? compactGasBreakdown(t.gasBreakdown) : '';
    html += `<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:2px solid #000;">
      ☐ <b>${escapeHtml(displayName)}</b>${items? ' | '+items : ''}
    </div>`;
  });

  return `<div style="font-size:2.2em;">${html}</div>`;
}

/* Thai baht amount-in-words, e.g. 1550 -> "หนึ่งพันห้าร้อยห้าสิบบาทถ้วน" */
function thaiBahtText(amount){
  const THAI_DIGITS = ['ศูนย์','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
  const THAI_POS = ['','สิบ','ร้อย','พัน','หมื่น','แสน'];
  function readGroup(numStr){
    numStr = numStr.replace(/^0+/, '');
    if(!numStr) return '';
    let out = '';
    const len = numStr.length;
    for(let i=0;i<len;i++){
      const digit = Number(numStr[i]);
      const pos = len - i - 1;
      if(digit===0) continue;
      if(pos===0) out += (digit===1 && len>1) ? 'เอ็ด' : THAI_DIGITS[digit];
      else if(pos===1) out += (digit===1) ? 'สิบ' : (digit===2) ? 'ยี่สิบ' : THAI_DIGITS[digit]+'สิบ';
      else out += THAI_DIGITS[digit] + (THAI_POS[pos]||'');
    }
    return out;
  }
  function readInt(numStr){
    numStr = numStr.replace(/^0+/, '') || '0';
    if(numStr==='0') return 'ศูนย์';
    let out = '';
    while(numStr.length > 6){
      out += readGroup(numStr.slice(0, numStr.length-6)) + 'ล้าน';
      numStr = numStr.slice(numStr.length-6);
    }
    out += readGroup(numStr);
    return out;
  }
  const num = Math.max(0, Number(amount||0));
  const intPart = Math.floor(num);
  const satang = Math.round((num - intPart) * 100);
  let text = readInt(String(intPart)) + 'บาท';
  text += satang>0 ? (readInt(String(satang)) + 'สตางค์') : 'ถ้วน';
  return text;
}

/* PromptPay EMV QR payload (standard Thai PromptPay spec: TLV fields + CRC16-CCITT) */
function crc16Promptpay(data){
  let crc = 0xFFFF;
  for(let i=0;i<data.length;i++){
    crc ^= (data.charCodeAt(i) << 8);
    for(let j=0;j<8;j++){
      crc = (crc & 0x8000) ? ((crc<<1) ^ 0x1021) : (crc<<1);
      crc &= 0xFFFF;
    }
  }
  return crc.toString(16).toUpperCase().padStart(4,'0');
}
function ppTlv(id, value){ return id + String(value.length).padStart(2,'0') + value; }
function formatPromptPayTarget(target){
  const digits = String(target||'').replace(/[^0-9]/g,'');
  if(digits.length>=13) return { type:'02', value: digits.slice(0,13) }; // citizen ID / tax ID / e-wallet ID
  const local = digits.replace(/^0/, '66');
  return { type:'01', value: local.padStart(13,'0') }; // mobile number -> 0066XXXXXXXXX
}
function buildPromptPayPayload(target, amount){
  const t = formatPromptPayTarget(target);
  const amt = Number(amount||0);
  const body = [
    ppTlv('00','01'),
    ppTlv('01', amt>0 ? '12' : '11'),
    ppTlv('29', ppTlv('00','A000000677010111') + ppTlv(t.type, t.value)),
    ppTlv('53','764'),
    amt>0 ? ppTlv('54', amt.toFixed(2)) : '',
    ppTlv('58','TH')
  ].join('');
  return body + ppTlv('63', crc16Promptpay(body + '6304'));
}

/* who to attribute a customer's printed bill address to, so it can be remembered without a full customer record */
function getDefaultBillAddress(record, kind){
  const cust = record.customerId ? state.customers.find(c=>c.id===record.customerId) : null;
  if(cust){
    if(cust.billAddress) return cust.billAddress;
    if(cust.address && !/^https?:\/\//i.test(cust.address)) return cust.address; // never prefill a Google Maps link/pin onto the printed bill
    return '';
  }
  const name = (kind==='task' ? record.customName : record.note) || '';
  if(!name) return '';
  try{
    const map = JSON.parse(localStorage.getItem('billAddressByName')||'{}');
    return map[name.trim().toLowerCase()] || '';
  }catch(e){ return ''; }
}
function saveBillAddress(record, kind, address){
  const cust = record.customerId ? state.customers.find(c=>c.id===record.customerId) : null;
  if(cust){
    cust.billAddress = address;
    persistCustomers();
    return;
  }
  const name = (kind==='task' ? record.customName : record.note) || '';
  if(!name) return;
  try{
    const map = JSON.parse(localStorage.getItem('billAddressByName')||'{}');
    map[name.trim().toLowerCase()] = address;
    localStorage.setItem('billAddressByName', JSON.stringify(map));
  }catch(e){}
}

/* quick pre-bill step: pick who's delivering (remembered across bills) + confirm the printed address (remembered per customer) */
function pickBillDetails(record, kind){
  return new Promise(resolve=>{

// tries the native share sheet first (so the user can pick LINE/Messenger/etc directly);
// falls back to a plain download if Web Share with files isn't supported on this device/browser
function shareOrDownloadCanvas(canvas, filename){
  return new Promise(resolve=>{
    canvas.toBlob(async blob=>{
      if(!blob){ resolve(false); return; }
      const file = new File([blob], filename, { type:'image/jpeg' });
      if(navigator.canShare && navigator.canShare({ files:[file] })){
        try{
          await navigator.share({ files:[file], title: filename });
          resolve(true);
          return;
        }catch(e){
          if(e && e.name==='AbortError'){ resolve(true); return; } // user closed the share sheet, not an error
          console.error('share failed, falling back to download', e);
        }
      }
      const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
      const a = document.createElement('a');
      a.href = dataUrl; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      resolve(false);
    }, 'image/jpeg', 0.95);
  });
}

async function generateAndShareBill(record, kind, triggerBtn){
  const originalLabel = triggerBtn ? triggerBtn.textContent : '';
  const billType = await chooseBillType();
  if(billType===null) return; // user cancelled
  const isNotice = billType==='notice';
  const details = await pickBillDetails(record, kind);
  if(details===null) return; // user cancelled
  const { senderName, address } = details;
  if(triggerBtn){ triggerBtn.textContent = '⏳ กำลังสร้าง...'; triggerBtn.disabled = true; }
  const widthPx = isNotice ? 420 : 480; // notice card targets ~105mm-wide Peripage A6 paper; receipt targets ~100mm
  const qrPayId = 'qrPay_' + uid();
  const qrLineId = 'qrLine_' + uid();
  const container = document.createElement('div');
  container.style.cssText = `position:fixed;left:-9999px;top:0;width:${widthPx}px;background:#ffffff;color:#232A22;font-family:'Sarabun',sans-serif;padding:14px;line-height:1.5;`;
  container.innerHTML = isNotice
    ? buildNoticeCardHtml(record, kind, senderName, address, qrPayId, qrLineId)
    : buildBillHtml(record, kind, senderName, address, qrPayId, qrLineId);
  document.body.appendChild(container);
  const docLabel = isNotice ? 'ใบแจ้งหนี้' : 'บิล';
  try{
    const amount = kind==='sale' ? Number(record.amount||0) : computeSuggestedPrice(record.gasBreakdown, false);
    const qrSize = isNotice ? 240 : 120; // notice card is printed small and taped outdoors — QR needs to stay scannable
    new QRCode(document.getElementById(qrPayId), { text: buildPromptPayPayload(SHOP_INFO.promptPayTarget, kind==='sale'? amount : 0), width:qrSize, height:qrSize });
    // the notice card only ever has the payment QR — LINE QR only exists in the regular receipt's markup
    if(!isNotice && SHOP_INFO.lineId){
      const lineQrEl = document.getElementById(qrLineId);
      if(lineQrEl) new QRCode(lineQrEl, { text: SHOP_INFO.lineId, width:qrSize, height:qrSize });
    }
    const canvas = await html2canvas(container, { backgroundColor:'#ffffff', width: widthPx, useCORS:true });
    const cust = record.customerId ? state.customers.find(c=>c.id===record.customerId) : null;
    const dateBase = kind==='sale' ? record.date : todayISO();
    const filename = `${docLabel}_${escapeFileName(cust? cust.name : (record.customName||'ลูกค้า'))}_${dateBase}.jpg`;
    const shared = await shareOrDownloadCanvas(canvas, filename);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
    const body = `
      <h3>${shared? `✅ แชร์${docLabel}แล้ว` : `✅ สร้าง${docLabel}เสร็จแล้ว`}</h3>
      ${!shared? `<div class="rem-meta" style="margin-bottom:10px;line-height:1.6;">รูป${docLabel}ถูกดาวน์โหลดไว้แล้ว กดปุ่ม "📤 แชร์" ด้านล่างเพื่อส่งไปยังแอปที่ต้องการ (LINE, Messenger ฯลฯ) — ถ้าเครื่องนี้เปิดหน้าต่างแชร์ไม่ได้ ให้กดค้างที่รูปแล้วเลือกส่งต่อเองแทน</div>` : ''}
      <div style="text-align:center;background:#eee;padding:8px;border-radius:8px;">
        <img src="${dataUrl}" style="max-width:100%;border:1px solid var(--border);" alt="${docLabel}">
      </div>
      <div class="btnrow" style="margin-top:12px;">
        <button type="button" class="btn primary" id="shareBillAgainBtn">📤 แชร์</button>
        <button type="button" class="btn ghost" id="cancelModal">ปิด</button>
      </div>
    `;
    showModal(body);
    const shareAgainBtn = document.getElementById('shareBillAgainBtn');
    if(shareAgainBtn) shareAgainBtn.addEventListener('click', ()=> shareOrDownloadCanvas(canvas, filename));
  }catch(e){
    console.error('bill export failed', e);
    showSaveError(`สร้าง${docLabel}ไม่สำเร็จ: ` + (e && e.message ? e.message : String(e)));
  } finally {
    document.body.removeChild(container);
    if(triggerBtn){ triggerBtn.textContent = originalLabel; triggerBtn.disabled = false; }
  }
}
