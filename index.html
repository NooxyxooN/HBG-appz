    <div class="mono" style="font-size:20px;color:var(--orange-dark);margin-bottom:12px;">${fmtMoney(grandTotal)} ถัง</div>
    ${items.length? items.map(i=>`
      <div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;">
        <div style="font-weight:600;">${i.size} kg — ${GAS_BRAND_LABELS[i.brand]}</div>
        <div class="mono" style="color:var(--orange-dark);">${i.qty} ถัง</div>
      </div>
    `).join('') : '<div class="empty">ยังไม่มีข้อมูลแยกขนาด/ยี่ห้อ</div>'}
    ${untracked>0? `<div class="rem-meta" style="margin-top:8px;">มีอีก ${untracked} ถังที่ยังไม่ได้ระบุขนาด/ยี่ห้อ (บันทึกไว้เป็นยอดรวมเฉยๆ จากตอนก่อนมีฟีเจอร์นี้) — เข้าไปแก้ไขโปรไฟล์ลูกค้าเพื่อระบุเพิ่มได้</div>` : ''}
    <div class="btnrow" style="margin-top:12px;">
      <button type="button" class="btn ghost" id="cancelModal">ปิด</button>
    </div>
  `;
  showModal(body);
}

function renderDebtorRow(c){
  const isExpanded = debtorExpandedIds.has(c.id);
  return `
  <div class="card" style="padding:10px 14px;">
    <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" data-toggle-debtor="${c.id}">
      <div style="font-weight:700;">👤 ${escapeHtml(c.name)}</div>
      <div style="display:flex;align-items:center;gap:8px;">
        ${Number(c.debt||0)>0? `<span class="tag debt">฿${fmtMoney(c.debt)}</span>`:''}
        ${Number(c.gasCylinders||0)>0? `<span class="tag gas">${c.gasCylinders} ถัง</span>`:''}
        <span style="color:var(--ink-soft);">${isExpanded?'▲':'▼'}</span>
      </div>
    </div>
    ${isExpanded? `<div style="margin-top:10px;border-top:1px dashed var(--border);padding-top:10px;">${renderCustomerCard(c, {showClearAll:true})}</div>` : ''}
  </div>`;
}

function renderDebtors(){
  let debtors = state.customers.filter(c=> Number(c.debt||0)>0 || Number(c.gasCylinders||0)>0);
  const totalMoney = debtors.reduce((a,c)=>a+Number(c.debt||0),0);
  const totalGas = debtors.reduce((a,c)=>a+Number(c.gasCylinders||0),0);

  const activeSummary = [];
  if(debtorsFilterType!=='all') activeSummary.push({debtOnly:'เฉพาะหนี้เงิน',gasOnly:'เฉพาะถังค้าง'}[debtorsFilterType]);
  const sortLabels = {total:'รวมหนักสุด',name:'ชื่อ',debt:'ยอดหนี้',gas:'ถังค้าง',recent:'ลูกค้ารายล่าสุด'};
  activeSummary.push('เรียงตาม'+sortLabels[debtorsSort]);
  const searchBar = `<div class="field" style="margin-bottom:10px;"><input id="debtorSearchInput" placeholder="🔍 ค้นหาชื่อหรือเบอร์โทร..." value="${escapeAttr(debtorSearchQuery)}"></div>`;
  const toggleBtn = `<div class="btnrow" style="margin-bottom:${debtorsFilterOpen?'10px':'12px'};">
    <button class="btn ${debtorsFilterOpen?'primary':'ghost'} small" id="toggleDebtorsFilter">⚙️ กรอง/เรียง ${debtorsFilterOpen?'▲':'▼'}</button>
    <button class="btn ghost small" id="exportDebtorsBtn">📤 Export พิมพ์</button>
    ${!debtorsFilterOpen? `<span class="rem-meta" style="align-self:center;">${activeSummary.join(' · ')}</span>` : ''}
  </div>`;

  let panel = '';
  if(debtorsFilterOpen){
    const filterChips = [['all','ทั้งหมด'],['debtOnly','เฉพาะหนี้เงิน'],['gasOnly','เฉพาะถังค้าง']];
    const sortOptions = [['total','รวมหนักสุด'],['name','ชื่อ'],['debt','ยอดหนี้'],['gas','ถังค้าง'],['recent','เพิ่มล่าสุด']];
    panel = `
      <div class="stamp-card" style="margin-bottom:12px;">
        <div class="rem-meta" style="margin-bottom:6px;font-weight:700;">กรอง</div>
        <div class="btnrow" style="margin-bottom:10px;">${filterChips.map(([k,l])=>`<button class="btn ${debtorsFilterType===k?'primary':'ghost'} small" data-debtor-filter="${k}">${l}</button>`).join('')}</div>
        <div class="rem-meta" style="margin-bottom:6px;font-weight:700;">เรียงตาม</div>
        <div class="btnrow">${sortOptions.map(([k,l])=>`<button class="btn ${debtorsSort===k?'primary':'ghost'} small" data-debtor-sort="${k}">${l}</button>`).join('')}</div>
      </div>`;
  }

  if(!debtors.length) return searchBar + toggleBtn + panel + '<div class="empty">🎉 ไม่มีลูกหนี้ในตอนนี้ (ทั้งเงินและถัง)</div>';

  const q = debtorSearchQuery.trim().toLowerCase();
  if(q){ debtors = debtors.filter(c=> c.name.toLowerCase().includes(q) || (c.phone||'').toLowerCase().includes(q)); }
  if(debtorsFilterType==='debtOnly') debtors = debtors.filter(c=>Number(c.debt||0)>0);
  else if(debtorsFilterType==='gasOnly') debtors = debtors.filter(c=>Number(c.gasCylinders||0)>0);

  if(debtorsSort==='name') debtors.sort((a,b)=>a.name.localeCompare(b.name,'th'));
  else if(debtorsSort==='debt') debtors.sort((a,b)=>Number(b.debt||0)-Number(a.debt||0));
  else if(debtorsSort==='gas') debtors.sort((a,b)=>Number(b.gasCylinders||0)-Number(a.gasCylinders||0));
  else if(debtorsSort==='recent') debtors.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  else debtors.sort((a,b)=> (Number(b.debt||0)+Number(b.gasCylinders||0)) - (Number(a.debt||0)+Number(a.gasCylinders||0)));

  const listHtml = debtors.length ? debtors.map(renderDebtorRow).join('') : '<div class="empty">ไม่พบลูกหนี้ที่ตรงกับเงื่อนไข</div>';
  return `
    ${searchBar}${toggleBtn}${panel}
    <div class="debtor-total">
      <span>ยอดหนี้รวมทั้งหมด</span>
      <span class="amt">฿${fmtMoney(totalMoney)}</span>
    </div>
    <div class="debtor-total" style="margin-top:-6px;background:var(--orange-dark);cursor:pointer;" data-show-gas-breakdown="1">
      <span>ถังค้างคืนรวมทั้งหมด (แตะดูรายละเอียด)</span>
      <span class="amt" style="color:#FFE0C2;">${fmtMoney(totalGas)} ถัง</span>
    </div>
    ${listHtml}
  `;
}

/* ---------------- TASKS (daily delivery checklist) ---------------- */
function renderTasks(){
  const intro = `<div class="rem-meta" style="margin-bottom:12px;line-height:1.6;">รายการนี้เป็นแค่ "เช็คลิสต์ส่งของวันนี้" ชั่วคราว พอกดเสร็จแล้วรายการจะหายไปเลย — ข้อมูลลูกค้าจริงยังอยู่ครบในแท็บ "ลูกค้า" เสมอ ไม่ปนกัน</div>`;

  // offer to turn on real phone notifications for new งานส่ง — only while this permission hasn't
  // been decided yet ('default'); once granted or denied there's nothing more to ask here
  let notifyBanner = '';
  if('Notification' in window){
    if(Notification.permission === 'default'){
      notifyBanner = `<div class="stamp-card" style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
        <div class="rem-meta" style="margin:0;">🔔 เปิดแจ้งเตือนตอนมีงานส่งใหม่เข้ามา (ขึ้นที่หน้าจอมือถือ ตอนแอปเปิด/ทำงานอยู่เบื้องหลัง)</div>
        <button class="btn primary small" id="enableTaskNotifyBtn">เปิดการแจ้งเตือน</button>
      </div>`;
    } else if(Notification.permission === 'denied'){
      notifyBanner = `<div class="rem-meta" style="margin-bottom:12px;">🔕 การแจ้งเตือนถูกปิดไว้ในเบราว์เซอร์ — ถ้าอยากเปิด ต้องไปเปิดเองในตั้งค่าเว็บไซต์นี้ของเบราว์เซอร์/มือถือ</div>`;
    }
  }

  // summary header: always reflects ALL of today's tasks regardless of the search/filter below,
  // so it answers "how many customers / how many tanks do I need to load onto the truck" at a glance
  const custCount = state.tasks.length;
  const totalQty = state.tasks.reduce((a,t)=>a+sumGasBreakdown(t.gasBreakdown),0);
  const summaryBar = state.tasks.length ? `
    <div class="debtor-total" data-show-tasks-breakdown="1" style="cursor:pointer;">
      <span>ลูกค้าที่สั่งวันนี้ ${custCount} ราย (แตะดูแยกยี่ห้อ)</span>
      <span class="amt">${fmtMoney(totalQty)} ถัง</span>
    </div>` : '';

  const filterLabels = {all:'ทั้งหมด', red:'🔴 ค้างนาน', yellow:'🟡 รอนาน', green:'🟢 ปกติ', paused:'🔵 พักไว้'};
  const sortLabels = {urgency:'ความเร่งรีบ', name:'ชื่อ', recent:'เพิ่มล่าสุด'};
  const activeSummary = [];
  if(tasksFilterType!=='all') activeSummary.push(filterLabels[tasksFilterType]);
  activeSummary.push('เรียงตาม'+sortLabels[tasksSort]);
  const searchBar = `<div class="field" style="margin-bottom:10px;"><input id="taskSearchInput" placeholder="🔍 ค้นหางานส่ง... (ชื่อ, ซอย, หมู่, จุดสังเกต)" value="${escapeAttr(taskSearchQuery)}"></div>`;
  const toggleBtn = `<div class="btnrow" style="margin-bottom:${tasksFilterOpen?'10px':'12px'};">
    <button class="btn ${tasksFilterOpen?'primary':'ghost'} small" id="toggleTasksFilter">⚙️ กรอง/เรียง ${tasksFilterOpen?'▲':'▼'}</button>
    <button class="btn ghost small" id="exportTasksBtn">📤 Export พิมพ์</button>
    ${!tasksFilterOpen? `<span class="rem-meta" style="align-self:center;">${activeSummary.join(' · ')}</span>` : ''}
  </div>`;

  let panel = '';
  if(tasksFilterOpen){
    const filterChips = [['all','ทั้งหมด'],['red','🔴 ค้างนาน'],['yellow','🟡 รอนาน'],['green','🟢 ปกติ'],['paused','🔵 พักไว้']];
    const sortOptions = [['urgency','ความเร่งรีบ'],['name','ชื่อ'],['recent','เพิ่มล่าสุด']];
    panel = `
      <div class="stamp-card" style="margin-bottom:12px;">
        <div class="rem-meta" style="margin-bottom:6px;font-weight:700;">กรองตามสถานะ</div>
        <div class="btnrow" style="margin-bottom:10px;">${filterChips.map(([k,l])=>`<button class="btn ${tasksFilterType===k?'primary':'ghost'} small" data-task-filter="${k}">${l}</button>`).join('')}</div>
        <div class="rem-meta" style="margin-bottom:6px;font-weight:700;">เรียงตาม</div>
        <div class="btnrow">${sortOptions.map(([k,l])=>`<button class="btn ${tasksSort===k?'primary':'ghost'} small" data-tasks-sort="${k}">${l}</button>`).join('')}</div>
      </div>`;
  }

  let list = [...state.tasks];
  const q = taskSearchQuery.trim().toLowerCase();
  if(q){
    // search matches name as well as ซอย/หมู่/จุดสังเกต — so searching e.g. "บ้านแม่โป่ง" surfaces
    // everyone tagged near there too, not just an exact customer-name match
    list = list.filter(t=>{
      const cust = t.customerId? state.customers.find(c=>c.id===t.customerId) : null;
      const name = cust? cust.name : (t.customName||'');
      const soi = cust? cust.soi : t.soi;
      const moo = cust? cust.moo : t.moo;
      const landmark = cust? cust.landmark : t.landmark;
      const haystack = [name, soi, moo, landmark].filter(Boolean).join(' ').toLowerCase();
      return haystack.includes(q);
    });
  }
  if(tasksFilterType!=='all'){ list = list.filter(t=> getTaskUrgencyState(t)===tasksFilterType); }
  const stateWeight = { red:0, yellow:1, green:2, paused:3 };
  if(tasksSort==='name') list.sort((a,b)=>{
    const an = (a.customerId? (state.customers.find(c=>c.id===a.customerId)||{}).name : a.customName) || '';
    const bn = (b.customerId? (state.customers.find(c=>c.id===b.customerId)||{}).name : b.customName) || '';
    return an.localeCompare(bn,'th');
  });
  // addedAt is set once at creation and never touched again — timerStartAt gets reset by "Activate"
  // (reactivating a paused task), so sorting by that instead made reactivated old tasks jump to the
  // top and look like they'd just been added, which is the bug being fixed here
  else if(tasksSort==='recent') list.sort((a,b)=> (b.addedAt||b.timerStartAt||0) - (a.addedAt||a.timerStartAt||0));
  else list.sort((a,b)=> stateWeight[getTaskUrgencyState(a)] - stateWeight[getTaskUrgencyState(b)]);

  if(!state.tasks.length) return intro + notifyBanner + '<div class="empty">ยังไม่มีงานส่งของวันนี้<br>แตะปุ่ม + เพื่อเพิ่มรายชื่อที่ต้องไปส่ง</div>';
  if(!list.length) return intro + notifyBanner + summaryBar + searchBar + toggleBtn + panel + '<div class="empty">ไม่พบงานที่ตรงกับเงื่อนไข</div>';

  const rows = list.map(t=>{
    const cust = t.customerId? state.customers.find(c=>c.id===t.customerId) : null;
    const displayName = cust? cust.name : (t.customName || 'ไม่ระบุชื่อ');
    const phone = cust? cust.phone : t.phone;
    const address = cust? cust.address : t.address;
    const navLink = mapsUrl(address);
    const urgencyState = getTaskUrgencyState(t);
    const startedAt = t.timerStartAt || Date.parse(t.createdAt) || Date.now();
    return `
    <div class="card rem-card">
      <div class="checkbox" data-complete-task="${t.id}" style="cursor:pointer;"></div>
      <div style="flex:1;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div class="rem-title"><span data-set-urgency="${t.id}" style="cursor:pointer;padding:2px 4px;margin:-2px -4px;border-radius:6px;" title="แตะเพื่อเปลี่ยนสถานะ">${getTaskUrgencyIcon(urgencyState)}</span> ${escapeHtml(displayName)}</div>
          ${navLink? `<a class="btn ghost small" href="${navLink}" target="_blank" rel="noopener" style="text-decoration:none;flex-shrink:0;">🧭 นำทาง</a>` : ''}
        </div>
        <div class="rem-meta">${getTaskUrgencyLabel(urgencyState)} · ${formatElapsed(startedAt)}</div>
        ${t.gasBreakdown && sumGasBreakdown(t.gasBreakdown)>0? `<div class="rem-meta">🛢️ ${gasBreakdownSummary(t.gasBreakdown)}</div>` : ''}
        ${phone? `<div class="rem-meta">📞 <a href="tel:${escapeAttr(phone)}" style="color:var(--orange-dark);font-weight:600;">${escapeHtml(phone)}</a></div>` : ''}
        ${t.note? `<div class="rem-meta">📝 ${escapeHtml(t.note)}</div>` : ''}
        <div class="btnrow">
          <button class="btn ghost small" data-edit-task="${t.id}">แก้ไข</button>
          <button class="btn ghost small" data-bill-task="${t.id}">🧾 บิล</button>
          ${urgencyState==='paused'? `<button class="btn primary small" style="background:var(--green);" data-reactivate-task="${t.id}">▶️ Activate</button>` : ''}
          <button class="btn danger small" data-del-task="${t.id}">ลบ</button>
          <button class="btn ghost small" data-add-task-reminder="${t.id}">🚨 เพิ่มแจ้งเตือน</button>
          <button class="btn primary small" data-complete-task="${t.id}" style="margin-left:auto;">✅ กดเมื่อส่งเสร็จ</button>
        </div>
      </div>
    </div>`;
  }).join('');
  return intro + notifyBanner + summaryBar + searchBar + toggleBtn + panel + rows;
}

  const editingCust = editing && editing.customerId? state.customers.find(c=>c.id===editing.customerId) : null;

    closeModal();
    render();

      </div>` : ''}
      <div class="rem-meta" style="margin-top:6px;">ถ้าติ๊กค้างจ่าย/ค้างถัง ระบบจะบวกยอดเข้าไปในโปรไฟล์ลูกค้าอัตโนมัติ ให้ไปดู/เคลียร์ทีหลังได้ที่แท็บลูกค้า — งานนี้จะหายไปจากรายการทันทีไม่ว่าจะติ๊กอะไรไว้ก็ตาม</div>
      <div class="btnrow">
        <button type="submit" class="btn primary">✅ ยืนยันส่งเสร็จ</button>
        <button type="button" class="btn ghost" id="cancelModal">ยกเลิก</button>
      </div>

    const b = window._lineBuilders['taskCompleteLine']||[];
    const pickup = document.getElementById('f_pickup').checked;
    document.getElementById('f_amount').value = computeSuggestedPrice(b, pickup);
  });
  document.getElementById('taskCompleteForm').addEventListener('submit', e=>{
    e.preventDefault();
    const breakdown = (window._lineBuilders['taskCompleteLine']||[]).slice();
    const gasQty = sumGasBreakdown(breakdown);
    const amt = Number(document.getElementById('f_amount').value)||0;
    const unpaid = document.getElementById('f_unpaid').checked;
    const cylinderPending = document.getElementById('f_cylpending').checked;
    const saveAsCustomer = isNewName && document.getElementById('f_saveAsCustomer') && document.getElementById('f_saveAsCustomer').checked;

    let finalCustomerId = t.customerId || null;

    if(saveAsCustomer){
      const newCust = {
        id: uid(),
        createdAt: new Date().toISOString(),
        name: displayName,
        phone: t.phone || '',
        address: t.address || '',
        gasCylindersBreakdown: cylinderPending? breakdownToLineItems(breakdown) : [],
        gasCylinders: cylinderPending? gasQty : 0,
        debt: unpaid? amt : 0,
        notes: t.note || ''
      };
      state.customers.push(newCust);
      persistCustomers();
      finalCustomerId = newCust.id;
    }

    if(amt>0 || gasQty>0){
      state.sales.push({
        id: uid(), date: todayISO(), amount: amt,
        customerId: finalCustomerId,
        note: finalCustomerId? '' : displayName,
        gasQty, gasBreakdown: breakdown, unpaid, cylinderPending,
        createdAt: Date.now()
      });
      persistSales();
    }
    if(gasQty>0) applyDeliveryToInventory(breakdown, cylinderPending);
    if(t.customerId && !saveAsCustomer){
      const c = state.customers.find(x=>x.id===t.customerId);
      if(c){
        if(unpaid && amt>0) c.debt = Number(c.debt||0) + amt;
        if(cylinderPending && gasQty>0) addToCustomerGasBreakdown(c, breakdownToLineItems(breakdown));
        persistCustomers();
      }
    }
    state.tasks = state.tasks.filter(x=>x.id!==taskId);
    persistTasks();
    closeModal();
    render();
  });
}

/* ---------------- REMINDERS ---------------- */
function getUpcomingReminders(limit){
  return [...state.reminders].filter(r=>!r.done || r.repeat!=='once')
    .sort((a,b)=>a.dueDate.localeCompare(b.dueDate))
    .slice(0, limit||999);
}

function renderReminders(){
  if(!state.reminders.length) return '<div class="empty">ยังไม่มีแจ้งเตือน<br>แตะปุ่ม + เพื่อเพิ่มแจ้งเตือนใหม่</div>';
  const sorted = [...state.reminders].sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  return sorted.map(renderReminderCard).join('');
}

function renderReminderCard(r){
  const overdue = !r.done && r.dueDate < todayISO();
  const repeatLabel = {once:'ครั้งเดียว',daily:'ทุกวัน',weekly:'ทุกสัปดาห์',yearly:'ทุกปี'}[r.repeat];
  const cust = state.customers.find(c=>c.id===r.customerId);
  return `
  <div class="card rem-card">
    <div class="checkbox ${r.done?'done':''} ${overdue?'overdue':''}" data-toggle-rem="${r.id}">${r.done?'✓':''}</div>
    <div style="flex:1;">
      <div class="rem-title">${escapeHtml(r.title)}</div>
      <div class="rem-meta ${overdue?'overdue':''}">${fmtDateShort(r.dueDate)} · ${repeatLabel}${cust? ' · '+escapeHtml(cust.name):''}${overdue?' · เลยกำหนด':''}</div>
      <div class="btnrow">
        <button class="btn danger small" data-del-rem="${r.id}">ลบ</button>
      </div>
    </div>
  </div>`;
}

function toggleReminder(id){
  const r = state.reminders.find(x=>x.id===id);
  if(!r) return;
  if(r.repeat==='once'){
    r.done = !r.done;
  } else {
    const d = new Date(r.dueDate+'T00:00:00');
    if(r.repeat==='daily') d.setDate(d.getDate()+1);
    if(r.repeat==='weekly') d.setDate(d.getDate()+7);
    if(r.repeat==='yearly') d.setFullYear(d.getFullYear()+1);
    r.dueDate = d.toISOString().slice(0,10);
  }
  persistReminders();
  render();
}

function showModal(innerHtml){

  document.getElementById('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeModal(); });

}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

/* ---------------- reusable line-item builder: pick ขนาด -> จำนวน -> ยี่ห้อ -> + then edit/remove below ---------------- */
window._lineBuilders = window._lineBuilders || {};
function lineItemBuilderHtml(prefix, initialItems){
  window._lineBuilders[prefix] = (initialItems || []).map(i=>({ size:String(i.size), brand:i.brand||'regular', qty:Number(i.qty||0) })).filter(i=>i.qty>0);
  return `
    <div class="field-row" style="align-items:flex-end;">
      <div class="field" style="flex:1;">
        <label style="font-size:11px;">ขนาด</label>
        <select id="${prefix}_size">${GAS_SIZES.map(sz=>`<option value="${sz}" ${sz==='15'?'selected':''}>${sz} kg</option>`).join('')}</select>
      </div>
      <div class="field" style="flex:1;">
        <label style="font-size:11px;">จำนวน</label>
        <input type="number" min="1" id="${prefix}_qty" placeholder="0">
      </div>
      <div class="field" style="flex:1;">
        <label style="font-size:11px;">ยี่ห้อ</label>
        <select id="${prefix}_brand">
          <option value="regular">ธรรมดา</option>
          <option value="ptt">🅿 ปตท</option>
        </select>
      </div>
      <button type="button" class="btn primary" data-add-line="${prefix}" style="margin-bottom:11px;">➕</button>
    </div>
    <div id="${prefix}_list" style="margin-top:8px;"></div>
  `;
}
function renderLineItemsBox(prefix){
  const box = document.getElementById(`${prefix}_list`);
  if(!box) return;
  const items = window._lineBuilders[prefix] || [];
  if(!items.length){ box.innerHTML = '<div class="rem-meta">ยังไม่ได้เพิ่มถัง</div>'; return; }
  box.innerHTML = items.map((l,i)=>`
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;margin-bottom:4px;">
      <div>🛢️ ${l.size} kg × ${l.qty} (${GAS_BRAND_LABELS[l.brand]})</div>
      <button type="button" class="btn danger small" data-remove-line-item="${prefix}|${i}">ลบ</button>
    </div>`).join('');
}
document.getElementById('modalRoot').addEventListener('click', e=>{
  const addBtn = e.target.closest('[data-add-line]');
  if(addBtn){
    const prefix = addBtn.dataset.addLine;
    const size = document.getElementById(`${prefix}_size`).value;
    const qty = Number(document.getElementById(`${prefix}_qty`).value)||0;
    const brand = document.getElementById(`${prefix}_brand`).value;
    if(qty>0){
      window._lineBuilders[prefix] = window._lineBuilders[prefix] || [];
      const existing = window._lineBuilders[prefix].find(l=>l.size===size && l.brand===brand);
      if(existing) existing.qty += qty; else window._lineBuilders[prefix].push({size, brand, qty});
      document.getElementById(`${prefix}_qty`).value = '';
      renderLineItemsBox(prefix);
    }
    return;
  }
  const removeBtn = e.target.closest('[data-remove-line-item]');
  if(removeBtn){
    const [prefix, idxStr] = removeBtn.dataset.removeLineItem.split('|');
    window._lineBuilders[prefix].splice(Number(idxStr), 1);
    renderLineItemsBox(prefix);
  }
});

    <form class="panel" id="dangerDeleteForm" novalidate>

        <button type="button" class="btn ghost" id="cancelModal">ยกเลิก</button>
      </div>
    </form>
  `;
  showModal(body);

function attachHandlers(){
  document.querySelectorAll('[data-goto-tab]').forEach(el=>el.addEventListener('click', ()=> switchTab(el.dataset.gotoTab)));
  const editPricesBtn = document.getElementById('editPricesBtn');
  if(editPricesBtn) editPricesBtn.addEventListener('click', openEditPricesForm);
  const editInventoryBtn = document.getElementById('editInventoryBtn');
  if(editInventoryBtn) editInventoryBtn.addEventListener('click', openEditInventoryForm);
  document.querySelectorAll('[data-edit-inv]').forEach(b=>b.addEventListener('click', ()=>openQuickInventoryEdit(b.dataset.editInv)));
  const addTransactionBtn = document.getElementById('addTransactionBtn');
  if(addTransactionBtn) addTransactionBtn.addEventListener('click', openTransactionForm);
  const openDailySummaryBtn = document.getElementById('openDailySummaryBtn');
  if(openDailySummaryBtn) openDailySummaryBtn.addEventListener('click', openDailySummaryModal);
  document.querySelectorAll('[data-show-pl]').forEach(el=>el.addEventListener('click', ()=>openPLDetailModal(el.dataset.showPl)));
  const dashboardSortSelect = document.getElementById('dashboardSortSelect');
  if(dashboardSortSelect) dashboardSortSelect.addEventListener('change', ()=>{ dashboardSort = dashboardSortSelect.value; render(); });
  document.querySelectorAll('[data-toggle-dash-cust]').forEach(el=>el.addEventListener('click', ()=>{
    const id = el.dataset.toggleDashCust;
    if(dashboardExpandedIds.has(id)) dashboardExpandedIds.delete(id); else dashboardExpandedIds.add(id);
    render();
  }));
  document.querySelectorAll('[data-toggle-debtor]').forEach(el=>el.addEventListener('click', ()=>{
    const id = el.dataset.toggleDebtor;
    if(debtorExpandedIds.has(id)) debtorExpandedIds.delete(id); else debtorExpandedIds.add(id);
    render();
  }));
  document.querySelectorAll('[data-show-gas-breakdown]').forEach(el=>el.addEventListener('click', openGasBreakdownModal));
  const toggleCustomersFilter = document.getElementById('toggleCustomersFilter');
  if(toggleCustomersFilter) toggleCustomersFilter.addEventListener('click', ()=>{ customersFilterOpen = !customersFilterOpen; render(); });
  document.querySelectorAll('[data-cust-filter]').forEach(b=>b.addEventListener('click', ()=>{ customersFilterType = b.dataset.custFilter; render(); }));
  document.querySelectorAll('[data-cust-sort]').forEach(b=>b.addEventListener('click', ()=>{ customersSort = b.dataset.custSort; render(); }));
  const toggleDebtorsFilter = document.getElementById('toggleDebtorsFilter');
  if(toggleDebtorsFilter) toggleDebtorsFilter.addEventListener('click', ()=>{ debtorsFilterOpen = !debtorsFilterOpen; render(); });
  const exportDebtorsBtn = document.getElementById('exportDebtorsBtn');
  if(exportDebtorsBtn) exportDebtorsBtn.addEventListener('click', ()=>openExportReceiptModal('debtors'));
  document.querySelectorAll('[data-debtor-filter]').forEach(b=>b.addEventListener('click', ()=>{ debtorsFilterType = b.dataset.debtorFilter; render(); }));
  document.querySelectorAll('[data-debtor-sort]').forEach(b=>b.addEventListener('click', ()=>{ debtorsSort = b.dataset.debtorSort; render(); }));
  const debtorSearchInput = document.getElementById('debtorSearchInput');
  if(debtorSearchInput) debtorSearchInput.addEventListener('input', ()=>{
    debtorSearchQuery = debtorSearchInput.value;
    const cursorPos = debtorSearchInput.selectionStart;
    render();
    const newInput = document.getElementById('debtorSearchInput');
    if(newInput){ newInput.focus(); newInput.setSelectionRange(cursorPos, cursorPos); }
  });
  const toggleTasksFilter = document.getElementById('toggleTasksFilter');
  if(toggleTasksFilter) toggleTasksFilter.addEventListener('click', ()=>{ tasksFilterOpen = !tasksFilterOpen; render(); });
  const exportTasksBtn = document.getElementById('exportTasksBtn');
  if(exportTasksBtn) exportTasksBtn.addEventListener('click', ()=>openExportReceiptModal('tasks'));
  document.querySelectorAll('[data-show-tasks-breakdown]').forEach(b=>b.addEventListener('click', showTasksBreakdownModal));
  document.querySelectorAll('[data-set-urgency]').forEach(b=>b.addEventListener('click', ()=>openTaskUrgencyPicker(b.dataset.setUrgency)));
  const enableTaskNotifyBtn = document.getElementById('enableTaskNotifyBtn');
  if(enableTaskNotifyBtn) enableTaskNotifyBtn.addEventListener('click', requestTaskNotificationPermission);
  document.querySelectorAll('[data-task-filter]').forEach(b=>b.addEventListener('click', ()=>{ tasksFilterType = b.dataset.taskFilter; render(); }));
  document.querySelectorAll('[data-clear-all-cust]').forEach(b=>b.addEventListener('click', ()=>{
    const c = state.customers.find(x=>x.id===b.dataset.clearAllCust);
    if(c && confirm(`เคลียร์หนี้และถังค้างของ "${c.name}" ทั้งหมดในครั้งเดียวใช่หรือไม่?`)){
      const clearedDebt = Number(c.debt||0);
      const clearedGas = Number(c.gasCylinders||0);
      const clearedItems = breakdownToLineItems(c.gasCylindersBreakdown||[]);
      if(clearedDebt>0){
        const noteParts = [`เคลียร์หนี้ครบ ฿${fmtMoney(clearedDebt)}`];
        if(clearedGas>0) noteParts.push(`คืนถัง ${clearedGas} ใบ`);
        state.sales.push({ id: uid(), date: todayISO(), amount: clearedDebt, customerId: c.id, note: noteParts.join(' + '), gasQty: 0, unpaid:false, cylinderPending:false, createdAt: Date.now() });
        persistSales();
      }
      c.debt = 0; c.gasCylinders = 0; c.gasCylindersBreakdown = [];
      persistCustomers();
      if(clearedItems.length){
        clearedItems.forEach(item=>{ inventoryAddEmpty(item.size, item.brand, item.qty); });
        persistInventory();
      }
      render();
    }
  }));
  document.querySelectorAll('[data-rank-sort]').forEach(b=>b.addEventListener('click', ()=>{ rankSort = b.dataset.rankSort; render(); }));
  document.querySelectorAll('[data-tasks-sort]').forEach(b=>b.addEventListener('click', ()=>{ tasksSort = b.dataset.tasksSort; render(); }));
  const taskSearchInput = document.getElementById('taskSearchInput');
  if(taskSearchInput) taskSearchInput.addEventListener('input', ()=>{
    taskSearchQuery = taskSearchInput.value;
    const cursorPos = taskSearchInput.selectionStart;
    render();
    const newInput = document.getElementById('taskSearchInput');
    if(newInput){ newInput.focus(); newInput.setSelectionRange(cursorPos, cursorPos); }
  });
  document.querySelectorAll('[data-quick-pay-purchase]').forEach(b=>b.addEventListener('click', ()=>openPurchaseQuickPayForm(b.dataset.quickPayPurchase)));
  document.querySelectorAll('[data-edit-purchase]').forEach(b=>b.addEventListener('click', ()=>openPurchaseForm(b.dataset.editPurchase)));
  document.querySelectorAll('[data-purchases-sort]').forEach(b=>b.addEventListener('click', ()=>{ purchasesSort = b.dataset.purchasesSort; render(); }));
  document.querySelectorAll('[data-clear-purchase]').forEach(b=>b.addEventListener('click', ()=>{
    if(confirm('เคลียร์รายการนี้ออกจากลิสต์ใช่หรือไม่? (บิลนี้จ่ายครบแล้ว — ยอดจะยังนับรวมในรายจ่ายหน้าแรกเหมือนเดิม แค่ไม่โชว์ในลิสต์นี้อีก ดูย้อนหลังได้ที่ "รายการที่เคลียร์แล้ว")')){
      const p = state.purchases.find(x=>x.id===b.dataset.clearPurchase);
      if(p){ p.archived = true; persistPurchases(); render(); }
    }
  }));
  const togglePurchaseArchive = document.getElementById('togglePurchaseArchive');
  if(togglePurchaseArchive) togglePurchaseArchive.addEventListener('click', ()=>{ purchasesArchiveOpen = !purchasesArchiveOpen; render(); });
  document.querySelectorAll('[data-restore-purchase]').forEach(b=>b.addEventListener('click', ()=>{
    const p = state.purchases.find(x=>x.id===b.dataset.restorePurchase);
    if(p){ p.archived = false; persistPurchases(); render(); }
  }));
  document.querySelectorAll('[data-del-purchase]').forEach(b=>b.addEventListener('click', ()=>{
    const p = state.purchases.find(x=>x.id===b.dataset.delPurchase);
    if(!p) return;
    openDangerousDeleteConfirm('ลบรายการรับถังถาวร', p.supplierName, ()=>{
      state.purchases = state.purchases.filter(x=>x.id!==p.id);
      persistPurchases(); render();
    });
  }));
  document.querySelectorAll('[data-complete-task]').forEach(b=>b.addEventListener('click', ()=>openTaskCompleteForm(b.dataset.completeTask)));
  document.querySelectorAll('[data-edit-task]').forEach(b=>b.addEventListener('click', ()=>openTaskForm(b.dataset.editTask)));
  document.querySelectorAll('[data-add-task-reminder]').forEach(b=>b.addEventListener('click', ()=>{
    const t = state.tasks.find(x=>x.id===b.dataset.addTaskReminder);
    if(!t) return;
    const cust = t.customerId? state.customers.find(c=>c.id===t.customerId) : null;
    const displayName = cust? cust.name : (t.customName || 'ไม่ระบุชื่อ');
    openReminderForm(`ส่งของให้ ${displayName}`, t.customerId || null);
  }));
  document.querySelectorAll('[data-reactivate-task]').forEach(b=>b.addEventListener('click', ()=>{
    const t = state.tasks.find(x=>x.id===b.dataset.reactivateTask);
    if(t){ t.timerStartAt = Date.now(); t.urgencyMode = 'auto'; persistTasks(); render(); }
  }));
  document.querySelectorAll('[data-del-task]').forEach(b=>b.addEventListener('click', ()=>{
    if(confirm('ลบงานนี้โดยไม่บันทึกการส่งใช่หรือไม่?')){
      state.tasks = state.tasks.filter(t=>t.id!==b.dataset.delTask);
      persistTasks(); render();
    }
  }));
  document.querySelectorAll('[data-period]').forEach(b=>{
    b.addEventListener('click', ()=>{ salesPeriod=b.dataset.period; render(); });
  });
  document.querySelectorAll('[data-recent-sales-sort]').forEach(b=>{
    b.addEventListener('click', ()=>{ recentSalesSort=b.dataset.recentSalesSort; render(); });
  });
  const datePicker = document.getElementById('dailyDatePicker');
  if(datePicker) datePicker.addEventListener('change', ()=>{ salesViewDate = datePicker.value || todayISO(); render(); });
  const prevDayBtn = document.getElementById('prevDayBtn');
  if(prevDayBtn) prevDayBtn.addEventListener('click', ()=>{
    const d = new Date(salesViewDate+'T00:00:00'); d.setDate(d.getDate()-1);
    salesViewDate = d.toISOString().slice(0,10); render();
  });
  const nextDayBtn = document.getElementById('nextDayBtn');
  if(nextDayBtn) nextDayBtn.addEventListener('click', ()=>{
    const d = new Date(salesViewDate+'T00:00:00'); d.setDate(d.getDate()+1);
    salesViewDate = d.toISOString().slice(0,10); render();
  });
  document.querySelectorAll('[data-toggle-unpaid]').forEach(b=>b.addEventListener('click', ()=>{
    const s = state.sales.find(x=>x.id===b.dataset.toggleUnpaid);
    if(s){ s.unpaid = !s.unpaid; persistSales(); render(); }
  }));
  document.querySelectorAll('[data-toggle-cyl]').forEach(b=>b.addEventListener('click', ()=>{
    const s = state.sales.find(x=>x.id===b.dataset.toggleCyl);
    if(s){ s.cylinderPending = !s.cylinderPending; persistSales(); render(); }
  }));
  const importOpenBtn = document.getElementById('openImportBtn');
  if(importOpenBtn) importOpenBtn.addEventListener('click', openImportForm);
  const exportCsvBtn = document.getElementById('exportCsvBtn');
  if(exportCsvBtn) exportCsvBtn.addEventListener('click', exportCustomersCSV);
  const exportBackupBtn = document.getElementById('exportBackupBtn');
  if(exportBackupBtn) exportBackupBtn.addEventListener('click', exportFullBackup);
  document.querySelectorAll('[data-edit-cust]').forEach(b=>b.addEventListener('click', ()=>openCustomerForm(b.dataset.editCust)));
  document.querySelectorAll('[data-toggle-map]').forEach(b=>b.addEventListener('click', ()=>{
    const id = b.dataset.toggleMap;
    if(expandedMapIds.has(id)) expandedMapIds.delete(id); else expandedMapIds.add(id);
    render();
  }));
  document.querySelectorAll('[data-pay-cust]').forEach(b=>b.addEventListener('click', ()=>openPaymentPrompt(b.dataset.payCust)));
  document.querySelectorAll('[data-return-cyl]').forEach(b=>b.addEventListener('click', ()=>openCylinderReturnPrompt(b.dataset.returnCyl)));
  document.querySelectorAll('[data-add-debt]').forEach(b=>b.addEventListener('click', ()=>openAddDebtPrompt(b.dataset.addDebt)));
  document.querySelectorAll('[data-reorder-cust]').forEach(b=>b.addEventListener('click', ()=>openSaleForm(b.dataset.reorderCust)));
  document.querySelectorAll('[data-edit-sale]').forEach(b=>b.addEventListener('click', ()=>openSaleForm(undefined, b.dataset.editSale)));
  document.querySelectorAll('[data-bill-sale]').forEach(b=>b.addEventListener('click', ()=>openSaleBillModal(b.dataset.billSale)));
  document.querySelectorAll('[data-bill-task]').forEach(b=>b.addEventListener('click', ()=>openTaskBillModal(b.dataset.billTask)));
  document.querySelectorAll('[data-toggle-history]').forEach(b=>b.addEventListener('click', ()=>{
    const id = b.dataset.toggleHistory;
    if(expandedHistoryIds.has(id)) expandedHistoryIds.delete(id); else expandedHistoryIds.add(id);
    render();
  }));
  const custSearchInput = document.getElementById('custSearchInput');
  if(custSearchInput) custSearchInput.addEventListener('input', ()=>{
    customerSearchQuery = custSearchInput.value;
    const cursorPos = custSearchInput.selectionStart;
    render();
    const newInput = document.getElementById('custSearchInput');
    if(newInput){ newInput.focus(); newInput.setSelectionRange(cursorPos, cursorPos); }
  });
  document.querySelectorAll('[data-del-cust]').forEach(b=>b.addEventListener('click', ()=>{
    const c = state.customers.find(x=>x.id===b.dataset.delCust);
    if(!c) return;
    openDangerousDeleteConfirm('ลบลูกค้าถาวร', c.name, ()=>{
      state.customers = state.customers.filter(x=>x.id!==c.id);
      persistCustomers(); render();
    });
  }));
  document.querySelectorAll('[data-toggle-rem]').forEach(b=>b.addEventListener('click', ()=>toggleReminder(b.dataset.toggleRem)));
  document.querySelectorAll('[data-del-rem]').forEach(b=>b.addEventListener('click', ()=>{
    if(confirm('ลบแจ้งเตือนนี้ใช่หรือไม่?')){
      state.reminders = state.reminders.filter(r=>r.id!==b.dataset.delRem);
      persistReminders(); render();
    }
  }));
}

/* ---------------- utils ---------------- */
function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }

init();

// register the PWA service worker (see sw.js) — silently no-ops if this file is opened directly
// as file:// instead of hosted over https, since service workers require a real secure origin
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* not hosted over https yet, that's fine */ });
  });
}
