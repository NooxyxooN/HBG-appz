      </div>
      <div id="taskCompleteCreditBox"></div>
      <div id="taskCompletePrachanatCreditBox"></div>
      <div class="field" style="margin-top:6px;padding-top:10px;border-top:1px dashed var(--border);">
        <label style="display:flex;align-items:center;gap:8px;font-weight:400;"><input type="checkbox" id="f_tapPrachanatNow" style="width:auto;"> 🪪 ลูกค้ากดบัตรประชารัฐจ่ายตอนนี้เลย (ยังไม่เคยกดล่วงหน้า)</label>
        <div id="taskCompleteTapPrachanatBox" style="display:none;margin-top:8px;">
          <label>จำนวนบัตร</label>
          <input type="text" inputmode="decimal" min="1" step="1" id="f_tapPrachanatCards" value="1">
          <div class="rem-meta" style="margin-top:4px;">ราคารวม ฿<span id="taskCompleteTapPrachanatTotal">80</span> — ใส่ "จำนวนเงินที่ได้รับ" ด้านบนเป็นราคาจริงของงานส่งนี้ตามปกติ ระบบจะหักจากยอดนี้ให้อัตโนมัติ ถ้ามีเหลือจะเก็บเป็นเครดิตไว้ใช้ครั้งหน้าให้เอง</div>
        </div>
      </div>
      <div class="field">
        <label style="display:flex;align-items:center;gap:8px;font-weight:400;"><input type="checkbox" id="f_tapThaiChuayNow" style="width:auto;"> 🎫 ลูกค้ากดสิทธิ์ไทยช่วยไทยจ่ายตอนนี้เลย (ยังไม่เคยกดล่วงหน้า)</label>
        <div id="taskCompleteTapThaiChuayBox" style="display:none;margin-top:8px;">
          <label>จำนวนเงิน (สูงสุด 334 บาท/ครั้ง)</label>
          <div class="btnrow">${[1,2,3,4,5].map(n=>`<button type="button" class="btn ghost small" data-tc-tap-times="${n}">×${n}</button>`).join('')}</div>
          <input type="text" inputmode="decimal" min="0" step="1" id="f_tapThaiChuayAmount" value="334" style="margin-top:6px;">
          <input type="hidden" id="f_tapThaiChuayTimes" value="1">
          <div class="rem-meta" style="margin-top:4px;">ใส่ "จำนวนเงินที่ได้รับ" ด้านบนเป็นราคาจริงของงานส่งนี้ตามปกติ ระบบจะหักจากยอดนี้ให้อัตโนมัติ ถ้ามีเหลือจะเก็บเป็นเครดิตไว้ใช้ครั้งหน้าให้เอง</div>
        </div>
      </div>
      <div class="field">
        <label style="display:flex;align-items:center;gap:8px;font-weight:400;"><input type="checkbox" id="f_unpaid" style="width:auto;"> ยังไม่จ่ายเงิน (ค้างจ่าย)</label>
        <label style="display:flex;align-items:center;gap:8px;font-weight:400;margin-top:6px;"><input type="checkbox" id="f_cylpending" style="width:auto;"> ยังไม่คืนถังเปล่า (ค้างถัง)</label>
      </div>
      ${isNewName? `
      <div class="field" style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);">
        <label style="display:flex;align-items:center;gap:8px;font-weight:400;"><input type="checkbox" id="f_saveAsCustomer" style="width:auto;" checked> ➕ บันทึก "${escapeHtml(displayName)}" เป็นลูกค้าใหม่ในระบบด้วย (เพื่อค้นหา/สั่งอีกรอบได้ทีหลัง)</label>
      </div>` : ''}
      <div class="rem-meta" style="margin-top:6px;">ถ้าติ๊กค้างจ่าย/ค้างถัง ระบบจะบวกยอดเข้าไปในโปรไฟล์ลูกค้าอัตโนมัติ ให้ไปดู/เคลียร์ทีหลังได้ที่แท็บลูกค้า — งานนี้จะหายไปจากรายการทันทีไม่ว่าจะติ๊กอะไรไว้ก็ตาม</div>
      <div class="btnrow">
        <button type="submit" class="btn primary">✅ ยืนยันส่งเสร็จ</button>
        <button type="button" class="btn ghost" id="cancelModal">ยกเลิก</button>
      </div>
    </form>`;
  showModal(body);
  renderLineItemsBox('taskCompleteLine');
  renderOtherLineItemsBox('taskCompleteOtherLine');
  (function renderTaskCompleteCreditBox(){
    const box = document.getElementById('taskCompleteCreditBox');
    if(!box) return;
    const credit = cust? Number(cust.thaiChuayCredit||0) : 0;
    if(credit<=0){ box.innerHTML=''; return; }
    box.innerHTML = `<div class="field">
      <label>🎫 ใช้เครดิตไทยช่วยไทย (มี ฿${fmtMoney(credit)})</label>
      <input type="text" inputmode="decimal" min="0" step="1" id="f_creditApplied" max="${credit}" placeholder="0">
      <div class="rem-meta" style="margin-top:2px;">ใส่จำนวนที่จะหักจากเครดิตแทนเงินสด — ไม่นับซ้ำเป็นรายรับอีกรอบ (นับไปแล้วตอนกดเครดิต)</div>
    </div>`;
  })();
  (function renderTaskCompletePrachanatCreditBox(){
    const box = document.getElementById('taskCompletePrachanatCreditBox');
    if(!box) return;
    const credit = cust? Number(cust.prachanatCredit||0) : 0;
    if(credit<=0){ box.innerHTML=''; return; }
    box.innerHTML = `<div class="field">
      <label>🪪 ใช้เครดิตบัตรประชารัฐ (มี ฿${fmtMoney(credit)})</label>
      <input type="text" inputmode="decimal" min="0" step="1" id="f_prachanatCreditApplied" max="${credit}" placeholder="0">
      <div class="rem-meta" style="margin-top:2px;">ใส่จำนวนที่จะหักจากเครดิตแทนเงินสด — ไม่นับซ้ำเป็นรายรับอีกรอบ (นับไปแล้วตอนกดเครดิต)</div>
    </div>`;
  })();
  // "กดตอนนี้เลย" taps — same idea as in openSaleForm: customer pays for THIS delivery by tapping a
  // benefit on the spot. Auto-applied against the residual owed (see submit handler below); any
  // leftover beyond the price gets banked as credit for next time instead of vanishing.
  const tapPrachanatCheckboxTC = document.getElementById('f_tapPrachanatNow');
  const tapPrachanatBoxTC = document.getElementById('taskCompleteTapPrachanatBox');
  const tapPrachanatCardsInputTC = document.getElementById('f_tapPrachanatCards');
  const tapPrachanatTotalElTC = document.getElementById('taskCompleteTapPrachanatTotal');
  function updateTCTapPrachanatTotal(){
    const cards = Math.max(1, Number(tapPrachanatCardsInputTC.value)||1);
    tapPrachanatTotalElTC.textContent = fmtMoney(cards*80);
  }
  tapPrachanatCheckboxTC.addEventListener('change', ()=>{
    tapPrachanatBoxTC.style.display = tapPrachanatCheckboxTC.checked? 'block' : 'none';
    updateTCTapPrachanatTotal();
  });
  tapPrachanatCardsInputTC.addEventListener('input', updateTCTapPrachanatTotal);
  const tapThaiChuayCheckboxTC = document.getElementById('f_tapThaiChuayNow');
  const tapThaiChuayBoxTC = document.getElementById('taskCompleteTapThaiChuayBox');
  tapThaiChuayCheckboxTC.addEventListener('change', ()=>{
    tapThaiChuayBoxTC.style.display = tapThaiChuayCheckboxTC.checked? 'block' : 'none';
  });
  document.querySelectorAll('[data-tc-tap-times]').forEach(b=>b.addEventListener('click', ()=>{
    const n = Number(b.dataset.tcTapTimes)||1;
    document.getElementById('f_tapThaiChuayAmount').value = 334 * n;
    document.getElementById('f_tapThaiChuayTimes').value = n;
  }));
  document.getElementById('useSuggestedPriceBtn').addEventListener('click', ()=>{
    const b = window._lineBuilders['taskCompleteLine']||[];
    const pickup = document.getElementById('f_pickup').checked;
    document.getElementById('f_amount').value = computeSuggestedPrice(b, pickup) + sumOtherLineItems('taskCompleteOtherLine');
  });
  document.getElementById('taskCompleteForm').addEventListener('submit', e=>{
    e.preventDefault();
    const breakdown = (window._lineBuilders['taskCompleteLine']||[]).slice();
    const otherItems = (window._otherLineBuilders['taskCompleteOtherLine']||[]).slice();
    const gasQty = sumGasBreakdown(breakdown);
    const amt = Number(document.getElementById('f_amount').value)||0;
    const pickup = document.getElementById('f_pickup').checked;
    const unpaid = document.getElementById('f_unpaid').checked;
    const cylinderPending = document.getElementById('f_cylpending').checked;
    const saveAsCustomer = isNewName && document.getElementById('f_saveAsCustomer') && document.getElementById('f_saveAsCustomer').checked;
    const creditInput = document.getElementById('f_creditApplied');
    const availableCredit = (cust && !saveAsCustomer)? Number(cust.thaiChuayCredit||0) : 0;
    const creditApplied = creditInput ? Math.max(0, Math.min(Number(creditInput.value)||0, availableCredit, amt)) : 0;
    const prachanatCreditInput = document.getElementById('f_prachanatCreditApplied');
    const availablePrachanatCredit = (cust && !saveAsCustomer)? Number(cust.prachanatCredit||0) : 0;
    const prachanatManualApplied = prachanatCreditInput ? Math.max(0, Math.min(Number(prachanatCreditInput.value)||0, availablePrachanatCredit, Math.max(0, amt - creditApplied))) : 0;
    const tapPrachanatNow = document.getElementById('f_tapPrachanatNow').checked;
    const tapPrachanatCards = tapPrachanatNow? Math.max(1, Number(document.getElementById('f_tapPrachanatCards').value)||1) : 0;
    const tapPrachanatAmount = tapPrachanatCards*80;
    const tapThaiChuayNow = document.getElementById('f_tapThaiChuayNow').checked;
    const tapThaiChuayAmount = tapThaiChuayNow? (Number(document.getElementById('f_tapThaiChuayAmount').value)||0) : 0;
    const tapThaiChuayTimes = tapThaiChuayNow? Math.max(1, Number(document.getElementById('f_tapThaiChuayTimes').value)||1) : 0;
    // same-day taps auto-apply against whatever's still owed after the manual redemptions above —
    // anything tapped beyond that is banked as leftover credit instead of vanishing (the bug: tapping
    // e.g. 8 ประชารัฐ cards ฿640 against a ฿500 delivery must leave ฿140 banked for next time)
    let runningResidual = Math.max(0, amt - creditApplied - prachanatManualApplied);
    const tapThaiChuayAutoApply = tapThaiChuayNow? Math.min(tapThaiChuayAmount, runningResidual) : 0;
    runningResidual -= tapThaiChuayAutoApply;
    const tapPrachanatAutoApply = tapPrachanatNow? Math.min(tapPrachanatAmount, runningResidual) : 0;
    runningResidual -= tapPrachanatAutoApply;
    const totalCreditApplied = creditApplied + tapThaiChuayAutoApply;
    const totalPrachanatCreditApplied = prachanatManualApplied + tapPrachanatAutoApply;
    const residual = runningResidual;

    let finalCustomerId = t.customerId || null;

    if(saveAsCustomer){
      const newCust = {
        id: uid(),
        createdAt: new Date().toISOString(),
        name: displayName,
        phone: t.phone || '',
        address: t.address || '',
        soi: t.soi || '',
        moo: t.moo || '',
        landmark: t.landmark || '',
        gasCylindersBreakdown: cylinderPending? breakdownToLineItems(breakdown) : [],
        gasCylinders: cylinderPending? gasQty : 0,
        debt: unpaid? residual : 0,
        notes: t.note || '',
        prachanatCredit: tapPrachanatNow? Math.max(0, tapPrachanatAmount - tapPrachanatAutoApply) : 0,
        prachanatCreditLog: tapPrachanatNow? [{ id: uid(), date: todayISO(), amount: tapPrachanatAmount, times: tapPrachanatCards, note: 'จ่ายด้วยบัตรประชารัฐตอนนี้เลย (ส่งแก๊ส)' }] : [],
        thaiChuayCredit: tapThaiChuayNow? Math.max(0, tapThaiChuayAmount - tapThaiChuayAutoApply) : 0,
        thaiChuayCreditLog: tapThaiChuayNow? [{ id: uid(), date: todayISO(), amount: tapThaiChuayAmount, times: tapThaiChuayTimes, note: 'จ่ายด้วยไทยช่วยไทยตอนนี้เลย (ส่งแก๊ส)' }] : []
      };
      state.customers.push(newCust);
      persistCustomers();
      finalCustomerId = newCust.id;
    }

    if(amt>0 || gasQty>0 || otherItems.length){
      state.sales.push({
        id: uid(), date: todayISO(), amount: amt, creditApplied: totalCreditApplied, prachanatCreditApplied: totalPrachanatCreditApplied,
        customerId: finalCustomerId,
        note: finalCustomerId? '' : displayName,
        gasQty, gasBreakdown: breakdown, otherItems, pickup, unpaid, cylinderPending,
        createdAt: Date.now()
      });
      persistSales();
    }
    if(gasQty>0){
      applyDeliveryToInventory(breakdown, cylinderPending);
      // ลูกค้าหน้าร้าน (pickup) มารับถังที่ร้านเองโดยตรง ไม่ได้ผ่านรถส่งของ — ไม่ควรหักถังในรถ
      if(!pickup) applyDeliveryToTruckStock(breakdown, cylinderPending);
    }
    if(t.customerId && !saveAsCustomer){
      adjustCustomerRemote(t.customerId, fresh=>{
        const updated = cloneCustomerForEdit(fresh);
        if(unpaid && residual>0) updated.debt = Number(updated.debt||0) + residual;
        if(creditApplied>0) updated.thaiChuayCredit = Math.max(0, Number(updated.thaiChuayCredit||0) - creditApplied);
        if(prachanatManualApplied>0) updated.prachanatCredit = Math.max(0, Number(updated.prachanatCredit||0) - prachanatManualApplied);
        if(tapThaiChuayNow){
          updated.thaiChuayCredit = Number(updated.thaiChuayCredit||0) + tapThaiChuayAmount - tapThaiChuayAutoApply;
          updated.thaiChuayCreditLog = [...(updated.thaiChuayCreditLog||[]), { id: uid(), date: todayISO(), amount: tapThaiChuayAmount, times: tapThaiChuayTimes, note: 'จ่ายด้วยไทยช่วยไทยตอนนี้เลย (ส่งแก๊ส)' }];
        }
        if(tapPrachanatNow){
          updated.prachanatCredit = Number(updated.prachanatCredit||0) + tapPrachanatAmount - tapPrachanatAutoApply;
          updated.prachanatCreditLog = [...(updated.prachanatCreditLog||[]), { id: uid(), date: todayISO(), amount: tapPrachanatAmount, times: tapPrachanatCards, note: 'จ่ายด้วยบัตรประชารัฐตอนนี้เลย (ส่งแก๊ส)' }];
        }
        if(cylinderPending && gasQty>0) addToCustomerGasBreakdown(updated, breakdownToLineItems(breakdown));
        return updated;
      }).then(()=>render());
    }
    // full tapped amount recognized as income now (same convention as the standalone top-up forms) —
    // regardless of saveAsCustomer, since that path banks the leftover directly on newCust above but
    // still needs the income side recorded the same way. The sale record's creditApplied/
    // prachanatCreditApplied already subtracts the applied portion from ITS OWN recognized income
    // (see getPLItems), so this doesn't double-count.
    if(tapThaiChuayNow || tapPrachanatNow){
      if(tapThaiChuayNow) state.transactions.push({ id: uid(), type:'income', date: todayISO(), amount: tapThaiChuayAmount, note: `เครดิตไทยช่วยไทย (กดตอนนี้เลย) — ${displayName}` });
      if(tapPrachanatNow) state.transactions.push({ id: uid(), type:'income', date: todayISO(), amount: tapPrachanatAmount, note: `เครดิตบัตรประชารัฐ (กดตอนนี้เลย) — ${displayName}` });
      persistTransactions();
    }
    state.tasks = state.tasks.filter(x=>x.id!==taskId);
    persistTasks();
    closeModal();
    render();
  });
}

  return [...state.reminders].filter(r=>!r.done || r.repeat!=='once')
    .sort((a,b)=>a.dueDate.localeCompare(b.dueDate))
    .slice(0, limit||999);
}

  if(!state.reminders.length) return '<div class="empty">ยังไม่มีแจ้งเตือน<br>แตะปุ่ม + เพื่อเพิ่มแจ้งเตือนใหม่</div>';

function toggleReminder(id){
  const r = state.reminders.find(x=>x.id===id);
  if(!r) return;
  if(r.repeat==='once'){
    r.done = !r.done;
  } else {
    const d = new Date(r.dueDate+'T00:00:00');
    if(r.repeat==='daily') d.setDate(d.getDate()+1);
    if(r.repeat==='weekly') d.setDate(d.getDate()+7);
    if(r.repeat==='yearly') d.setFullYear(d.getFullYear()+1);
    r.dueDate = d.toISOString().slice(0,10);
  }
  persistReminders();
  render();
}

// inline calculator: every numeric field in the app is a plain text input (see the global
// type="number" -> type="text" inputmode="decimal" swap) specifically so people can type a quick
// sum like "334*3" or "500-166" straight into any amount/quantity box. When the field loses focus,
// if (and only if) what's typed looks like a pure arithmetic expression (digits/+-*/()./space only,
// with at least one operator so a plain "334" is left alone) it gets evaluated and replaced with the
// result — e.g. "334*3" becomes "1002". Anything that isn't a clean expression (names, notes, etc.)
// is left completely untouched.
function evalInlineCalcExpr(raw){
  const expr = String(raw||'').trim();
  if(!expr) return null;
  if(!/^[0-9+\-*/().\s]+$/.test(expr)) return null; // must be ONLY digits/operators/parens/dots/spaces
  if(!/[+\-*/]/.test(expr)) return null; // must contain at least one operator, else it's just a plain number
  try{
    // safe: the regex above already guarantees the string can't contain anything besides digits,
    // arithmetic operators, parentheses, dots and whitespace, so this can't execute arbitrary code
    const result = Function('"use strict"; return (' + expr + ');')();
    if(typeof result !== 'number' || !isFinite(result)) return null;
    return Math.round(result * 100) / 100; // 2-decimal precision covers both baht amounts and tank counts
  }catch(e){ return null; }
}
document.addEventListener('focusout', e=>{
  const el = e.target;
  if(!el || el.tagName !== 'INPUT' || el.type !== 'text' || el.inputMode !== 'decimal') return;
  const computed = evalInlineCalcExpr(el.value);
  if(computed !== null) el.value = computed;
}, true);

function openDangerousDeleteConfirm(title, itemName, onConfirm){
  const body = `
    <h3>⚠️ ${title}</h3>
    <div class="rem-meta" style="margin-bottom:10px;line-height:1.6;color:var(--red);">การลบนี้ถาวร กู้คืนไม่ได้ กรุณาพิมพ์ชื่อ "<b>${escapeHtml(itemName)}</b>" ให้ตรงเป๊ะเพื่อยืนยัน</div>
    <form class="panel" id="dangerDeleteForm" novalidate>
      <div class="field"><input id="f_confirmName" placeholder="พิมพ์ชื่อให้ตรงกัน..." autocomplete="off"></div>
      <div class="btnrow">
        <button type="submit" class="btn danger" id="confirmDeleteBtn" disabled>ลบถาวร</button>
        <button type="button" class="btn ghost" id="cancelModal">ยกเลิก</button>
      </div>
    </form>
  `;
  showModal(body);
  const input = document.getElementById('f_confirmName');
  const btn = document.getElementById('confirmDeleteBtn');
  input.addEventListener('input', ()=>{
    btn.disabled = input.value.trim() !== itemName.trim();
  });
  document.getElementById('dangerDeleteForm').addEventListener('submit', e=>{
    e.preventDefault();
    if(input.value.trim() !== itemName.trim()) return;
    onConfirm();
    closeModal();
  });
}

/* ---------------- utils ---------------- */
function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }

  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* not hosted over https yet, that's fine */ });
  });
