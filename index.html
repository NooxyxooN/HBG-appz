function drawChart(){
  const canvas = document.getElementById('salesChart');
  if(!canvas) return;
  const {labels, values} = buildSeries(salesPeriod);
  if(window._salesChart) window._salesChart.destroy();
  window._salesChart = new Chart(canvas.getContext('2d'), {
    type:'bar',
    data:{ labels, datasets:[{ label:'ยอดขาย (บาท)', data:values, backgroundColor:'#DB6B2A', borderRadius:4 }] },
    options:{
      responsive:true,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ grid:{display:false}, ticks:{font:{family:'IBM Plex Mono'},color:'#5C6255'} },
        y:{ grid:{color:'#DDD6C2'}, ticks:{font:{family:'IBM Plex Mono'},color:'#5C6255'} }
      }
    }
  });
}

function buildSeries(period){
  const now = new Date();
  const labels=[], values=[];
  // same rule as the dashboard: ค้างจ่าย (unpaid) sales aren't counted until the debt is actually paid off
  if(period==='day'){
    for(let i=13;i>=0;i--){
      const d = new Date(now); d.setDate(d.getDate()-i);
      const key = d.toISOString().slice(0,10);
      labels.push(d.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit'}));
      values.push(state.sales.filter(s=>s.date===key && !s.unpaid).reduce((a,b)=>a+Number(b.amount),0));
    }
  } else if(period==='week'){
    for(let i=7;i>=0;i--){
      const end = new Date(now); end.setDate(end.getDate()-i*7);
      const start = new Date(end); start.setDate(start.getDate()-6);
      const startKey=start.toISOString().slice(0,10), endKey=end.toISOString().slice(0,10);
      labels.push(start.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit'}));
      values.push(state.sales.filter(s=>s.date>=startKey && s.date<=endKey && !s.unpaid).reduce((a,b)=>a+Number(b.amount),0));
    }
  } else if(period==='month'){
    for(let i=11;i>=0;i--){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const key = d.toISOString().slice(0,7);
      labels.push(d.toLocaleDateString('th-TH',{month:'short',year:'2-digit'}));
      values.push(state.sales.filter(s=>s.date.slice(0,7)===key && !s.unpaid).reduce((a,b)=>a+Number(b.amount),0));
    }
  } else {
    for(let i=4;i>=0;i--){
      const y = now.getFullYear()-i;
      labels.push(String(y));
      values.push(state.sales.filter(s=>s.date.slice(0,4)===String(y) && !s.unpaid).reduce((a,b)=>a+Number(b.amount),0));
    }
  }
  return {labels, values};
}

          <label>จำนวนเงิน (สูงสุด 334 บาท/ครั้ง)</label>
          <div class="btnrow">${[1,2,3,4,5].map(n=>`<button type="button" class="btn ghost small" data-sale-tap-times="${n}">×${n}</button>`).join('')}</div>
          <input type="text" inputmode="decimal" min="0" step="1" id="f_tapThaiChuayAmount" value="334" style="margin-top:6px;">
          <input type="hidden" id="f_tapThaiChuayTimes" value="1">
          <div class="rem-meta" style="margin-top:4px;">ใส่ "จำนวนเงิน" ด้านบนเป็นราคาจริงของรายการนี้ตามปกติ ระบบจะหักจากยอดนี้ให้อัตโนมัติ ถ้ามีเหลือจะเก็บเป็นเครดิตไว้ใช้ครั้งหน้าให้เอง</div>
        </div>
      </div>
      <div class="field"><label>รายละเอียด</label><input id="f_note" placeholder="เช่น ถังแก๊ส 15 กก." value="${editing? escapeAttr(editing.note||'') : ''}"></div>
      <div class="field">
        <label style="display:flex;align-items:center;gap:8px;font-weight:400;"><input type="checkbox" id="f_unpaid" style="width:auto;" ${editing && editing.unpaid?'checked':''}> ค้างจ่ายเงิน</label>
        <label style="display:flex;align-items:center;gap:8px;font-weight:400;margin-top:6px;"><input type="checkbox" id="f_cylpending" style="width:auto;" ${editing && editing.cylinderPending?'checked':''}> ค้างถัง (ยังไม่คืนถังเปล่า)</label>
      </div>
      <div class="btnrow">
        <button type="submit" class="btn primary">${editing? 'บันทึกการแก้ไข' : 'บันทึก'}</button>
        ${editing? `<button type="button" class="btn danger" id="deleteSaleBtn">ลบรายการนี้</button>` : ''}
        <button type="button" class="btn ghost" id="cancelModal">ยกเลิก</button>
      </div>
    </form>`;
  showModal(body);
  renderLineItemsBox('sale');
  renderOtherLineItemsBox('saleOtherLine');

  // shows a "ใช้เครดิตไทยช่วยไทย" field only when the currently-selected customer actually has a
  // banked credit balance (see openAddThaiChuayCreditPrompt) — capped so it can never exceed either
  // the credit on hand or the invoice amount itself
  function renderSaleCreditBox(custId){
    const box = document.getElementById('saleCreditBox');
    if(!box) return;
    const cust = custId? state.customers.find(c=>c.id===custId) : null;
    const credit = cust? Number(cust.thaiChuayCredit||0) : 0;
    if(credit<=0){ box.innerHTML=''; return; }
    const prevVal = editing? Number(editing.creditApplied||0) : 0;
    box.innerHTML = `<div class="field">
      <label>🎫 ใช้เครดิตไทยช่วยไทย (มี ฿${fmtMoney(credit)})</label>
      <input type="text" inputmode="decimal" min="0" step="1" id="f_creditApplied" max="${credit}" value="${prevVal||''}" placeholder="0">
      <div class="rem-meta" style="margin-top:2px;">ใส่จำนวนที่จะหักจากเครดิตแทนเงินสด — ไม่นับซ้ำเป็นรายรับอีกรอบ (นับไปแล้วตอนกดเครดิต)</div>
    </div>`;
  }
  renderSaleCreditBox(initialCustomerId);

  // same idea as renderSaleCreditBox, but for the separate บัตรประชารัฐ credit ledger
  // (see openAddPrachanatCreditPrompt) — kept as its own field/balance since the two programs
  // have different rules (฿80/card vs ฿334/day) and shouldn't be mixed into one number
  function renderSalePrachanatCreditBox(custId){
    const box = document.getElementById('salePrachanatCreditBox');
    if(!box) return;
    const cust = custId? state.customers.find(c=>c.id===custId) : null;
    const credit = cust? Number(cust.prachanatCredit||0) : 0;
    if(credit<=0){ box.innerHTML=''; return; }
    const prevVal = editing? Number(editing.prachanatCreditApplied||0) : 0;
    box.innerHTML = `<div class="field">
      <label>🪪 ใช้เครดิตบัตรประชารัฐ (มี ฿${fmtMoney(credit)})</label>
      <input type="text" inputmode="decimal" min="0" step="1" id="f_prachanatCreditApplied" max="${credit}" value="${prevVal||''}" placeholder="0">
      <div class="rem-meta" style="margin-top:2px;">ใส่จำนวนที่จะหักจากเครดิตแทนเงินสด — ไม่นับซ้ำเป็นรายรับอีกรอบ (นับไปแล้วตอนกดเครดิต)</div>
    </div>`;
  }
  renderSalePrachanatCreditBox(initialCustomerId);

  // "กดตอนนี้เลย" taps — customer pays for THIS sale using a benefit they tap on the spot, as
  // opposed to redeeming a balance banked in advance (see renderSaleCreditBox above). The amount
  // is already counted normally via f_amount (like cash), so this only appends an audit-log entry
  // on submit — auto-applied against the residual owed on THIS sale first, and whatever's left over
  // gets banked into the customer's credit balance for next time (see submit handler below) — the
  // full tapped amount is recognized as income immediately via state.transactions either way,
  // matching the same convention as the standalone "เพิ่มเครดิต" top-up forms.
  const tapPrachanatCheckbox = document.getElementById('f_tapPrachanatNow');
  const tapPrachanatBox = document.getElementById('saleTapPrachanatBox');
  const tapPrachanatCardsInput = document.getElementById('f_tapPrachanatCards');
  const tapPrachanatTotalEl = document.getElementById('saleTapPrachanatTotal');
  function updateSaleTapPrachanatTotal(){
    const cards = Math.max(1, Number(tapPrachanatCardsInput.value)||1);
    tapPrachanatTotalEl.textContent = fmtMoney(cards*80);
  }
  tapPrachanatCheckbox.addEventListener('change', ()=>{
    tapPrachanatBox.style.display = tapPrachanatCheckbox.checked? 'block' : 'none';
    updateSaleTapPrachanatTotal();
  });
  tapPrachanatCardsInput.addEventListener('input', updateSaleTapPrachanatTotal);

  const tapThaiChuayCheckbox = document.getElementById('f_tapThaiChuayNow');
  const tapThaiChuayBox = document.getElementById('saleTapThaiChuayBox');
  tapThaiChuayCheckbox.addEventListener('change', ()=>{
    tapThaiChuayBox.style.display = tapThaiChuayCheckbox.checked? 'block' : 'none';
  });
  document.querySelectorAll('[data-sale-tap-times]').forEach(b=>b.addEventListener('click', ()=>{
    const n = Number(b.dataset.saleTapTimes)||1;
    document.getElementById('f_tapThaiChuayAmount').value = 334 * n;
    document.getElementById('f_tapThaiChuayTimes').value = n;
  }));

  const custSearchInput = document.getElementById('f_saleCustSearch');
  const custSuggestBox = document.getElementById('saleCustSuggestions');
  function renderSaleCustSuggestions(){
    const q = custSearchInput.value.trim().toLowerCase();
    if(!q){ custSuggestBox.innerHTML=''; return; }
    const matches = state.customers.filter(c=>c.name.toLowerCase().includes(q)).slice(0,6);
    custSuggestBox.innerHTML = matches.length? matches.map(c=>`<div class="card" style="padding:8px 12px;cursor:pointer;margin-bottom:4px;" data-pick-cust="${c.id}">👤 ${escapeHtml(c.name)}${c.phone? ' · '+escapeHtml(c.phone):''}</div>`).join('') : '<div class="rem-meta">ไม่พบในระบบ — จะเพิ่มเป็นลูกค้าใหม่ชื่อนี้ให้อัตโนมัติ</div>';
    custSuggestBox.querySelectorAll('[data-pick-cust]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const picked = state.customers.find(c=>c.id===el.dataset.pickCust);
        document.getElementById('f_customer').value = el.dataset.pickCust;
        custSearchInput.value = picked.name;
        custSuggestBox.innerHTML = '';
        renderSaleCreditBox(el.dataset.pickCust);
        renderSalePrachanatCreditBox(el.dataset.pickCust);
      });
    });
  }
  custSearchInput.addEventListener('input', ()=>{
    document.getElementById('f_customer').value = '';
    renderSaleCreditBox(null);
    renderSalePrachanatCreditBox(null);
    renderSaleCustSuggestions();
  });

  document.getElementById('useSuggestedPriceBtnSale').addEventListener('click', ()=>{
    const b = window._lineBuilders['sale']||[];
    const pickup = document.getElementById('f_pickup').checked;
    document.getElementById('f_amount').value = computeSuggestedPrice(b, pickup) + sumOtherLineItems('saleOtherLine');
  });
  if(editing){
    document.getElementById('deleteSaleBtn').addEventListener('click', ()=>{
      if(confirm('ลบรายการขายนี้ใช่หรือไม่? (ไม่กระทบยอดหนี้/ถังที่ปรับไว้แล้วในโปรไฟล์ลูกค้า)')){
        state.sales = state.sales.filter(s=>s.id!==editId);
        persistSales();
        closeModal();
        render();
      }
    });
  }
  document.getElementById('saleForm').addEventListener('submit', e=>{
    e.preventDefault();
    const amt = Number(document.getElementById('f_amount').value)||0;
    if(amt<=0){
      document.getElementById('amountError').style.display = 'block';
      document.getElementById('f_amount').focus();
      return;
    }
    let customerId = document.getElementById('f_customer').value || null;
    const typedName = custSearchInput.value.trim();
    if(!customerId && typedName){
      const exactMatch = state.customers.find(c=>c.name.trim().toLowerCase()===typedName.toLowerCase());
      if(exactMatch){
        customerId = exactMatch.id;
      } else {
        const newCust = { id: uid(), createdAt: new Date().toISOString(), name: typedName, phone:'', address:'', gasCylinders:0, debt:0, notes:'' };
        state.customers.push(newCust);
        persistCustomers();
        customerId = newCust.id;
      }
    }
    const breakdown = (window._lineBuilders['sale']||[]).slice();
    const otherItems = (window._otherLineBuilders['saleOtherLine']||[]).slice();
    let note = document.getElementById('f_note').value.trim();
    if(!customerId && !typedName && !note) note = 'ลูกค้าหน้าร้าน';
    const creditInput = document.getElementById('f_creditApplied');
    const custForCredit = customerId? state.customers.find(c=>c.id===customerId) : null;
    const availableCredit = custForCredit? Number(custForCredit.thaiChuayCredit||0) : 0;
    const creditApplied = creditInput ? Math.max(0, Math.min(Number(creditInput.value)||0, availableCredit, amt)) : 0;
    const prachanatCreditInput = document.getElementById('f_prachanatCreditApplied');
    const availablePrachanatCredit = custForCredit? Number(custForCredit.prachanatCredit||0) : 0;
    const prachanatManualApplied = prachanatCreditInput ? Math.max(0, Math.min(Number(prachanatCreditInput.value)||0, availablePrachanatCredit, Math.max(0, amt - creditApplied))) : 0;
    const tapPrachanatNow = document.getElementById('f_tapPrachanatNow').checked;
    const tapPrachanatCards = tapPrachanatNow? Math.max(1, Number(document.getElementById('f_tapPrachanatCards').value)||1) : 0;
    const tapPrachanatAmount = tapPrachanatCards*80;
    const tapThaiChuayNow = document.getElementById('f_tapThaiChuayNow').checked;
    const tapThaiChuayAmount = tapThaiChuayNow? (Number(document.getElementById('f_tapThaiChuayAmount').value)||0) : 0;
    const tapThaiChuayTimes = tapThaiChuayNow? Math.max(1, Number(document.getElementById('f_tapThaiChuayTimes').value)||1) : 0;
    // same-day taps auto-apply against whatever's still owed AFTER the manual redemptions above —
    // any amount tapped beyond that gets banked as leftover credit (see adjustCustomerRemote below)
    // instead of silently vanishing, which was the bug: tapping e.g. 8 ประชารัฐ cards (฿640) against
    // a ฿500 sale must leave ฿140 banked for next time, not disappear
    let runningResidual = Math.max(0, amt - creditApplied - prachanatManualApplied);
    const tapThaiChuayAutoApply = tapThaiChuayNow? Math.min(tapThaiChuayAmount, runningResidual) : 0;
    runningResidual -= tapThaiChuayAutoApply;
    const tapPrachanatAutoApply = tapPrachanatNow? Math.min(tapPrachanatAmount, runningResidual) : 0;
    runningResidual -= tapPrachanatAutoApply;
    const totalCreditApplied = creditApplied + tapThaiChuayAutoApply;
    const totalPrachanatCreditApplied = prachanatManualApplied + tapPrachanatAutoApply;
    const data = {
      date: document.getElementById('f_date').value || todayISO(),
      amount: amt,
      creditApplied: totalCreditApplied,
      prachanatCreditApplied: totalPrachanatCreditApplied,
      customerId,
      note,
      gasQty: sumGasBreakdown(breakdown),
      gasBreakdown: breakdown,
      otherItems,
      pickup: document.getElementById('f_pickup').checked,
      unpaid: document.getElementById('f_unpaid').checked,
      cylinderPending: document.getElementById('f_cylpending').checked
    };
    if(editing){ Object.assign(editing, data); }
    else {
      state.sales.push({ id:uid(), ...data, createdAt: Date.now() });
      applyDeliveryToInventory(data.gasBreakdown, data.cylinderPending);
      // ถังบนรถ (truck stock) อ้างอิงเฉพาะหน้างานส่งเท่านั้น — การบันทึกยอดขายที่หน้านี้ไม่กระทบถังบนรถ
      if(customerId){
        adjustCustomerRemote(customerId, fresh=>{
          const updated = cloneCustomerForEdit(fresh);
          if(data.unpaid && runningResidual>0) updated.debt = Number(updated.debt||0) + runningResidual;
          if(creditApplied>0) updated.thaiChuayCredit = Math.max(0, Number(updated.thaiChuayCredit||0) - creditApplied);
          if(prachanatManualApplied>0) updated.prachanatCredit = Math.max(0, Number(updated.prachanatCredit||0) - prachanatManualApplied);
          if(tapThaiChuayNow){
            updated.thaiChuayCredit = Number(updated.thaiChuayCredit||0) + tapThaiChuayAmount - tapThaiChuayAutoApply;
            updated.thaiChuayCreditLog = [...(updated.thaiChuayCreditLog||[]), { id: uid(), date: todayISO(), amount: tapThaiChuayAmount, times: tapThaiChuayTimes, note: 'จ่ายด้วยไทยช่วยไทยตอนนี้เลย (ซื้อแก๊ส)' }];
          }
          if(tapPrachanatNow){
            updated.prachanatCredit = Number(updated.prachanatCredit||0) + tapPrachanatAmount - tapPrachanatAutoApply;
            updated.prachanatCreditLog = [...(updated.prachanatCreditLog||[]), { id: uid(), date: todayISO(), amount: tapPrachanatAmount, times: tapPrachanatCards, note: 'จ่ายด้วยบัตรประชารัฐตอนนี้เลย (ซื้อแก๊ส)' }];
          }
          if(data.cylinderPending && data.gasQty>0) addToCustomerGasBreakdown(updated, breakdownToLineItems(breakdown));
          return updated;
        }).then(()=>render());
        // full tapped amount is recognized as income NOW (same convention as the standalone
        // top-up forms) — the sale record's own creditApplied/prachanatCreditApplied already
        // subtracts the applied portion from ITS recognized income (see getPLItems), so this
        // doesn't double-count whatever portion just covered today's sale
        if(tapThaiChuayNow || tapPrachanatNow){
          const custName = custForCredit? custForCredit.name : (typedName||'ลูกค้า');
          if(tapThaiChuayNow) state.transactions.push({ id: uid(), type:'income', date: todayISO(), amount: tapThaiChuayAmount, note: `เครดิตไทยช่วยไทย (กดตอนนี้เลย) — ${custName}` });
          if(tapPrachanatNow) state.transactions.push({ id: uid(), type:'income', date: todayISO(), amount: tapPrachanatAmount, note: `เครดิตบัตรประชารัฐ (กดตอนนี้เลย) — ${custName}` });
          persistTransactions();
        }
      }
    }
    persistSales();
    closeModal();
    render();
  });
}

/* ---------------- RECEIPT IMAGE EXPORT (for thermal printers like Peripage) ---------------- */
async function exportReceiptImage(title, contentHtml, widthPx){
  const container = document.createElement('div');
  container.style.cssText = `position:fixed;left:-9999px;top:0;width:${widthPx}px;background:#ffffff;color:#000000;font-family:'IBM Plex Mono',monospace;padding:14px 10px;font-size:${widthPx>450?19:16}px;line-height:1.6;`;
  container.innerHTML = contentHtml;
  document.body.appendChild(container);
  try{
    const canvas = await html2canvas(container, { backgroundColor:'#ffffff', width: widthPx, useCORS:true });
    const filename = `${title}_${todayISO()}.jpg`;
    // try the native share sheet first (send straight to LINE/Messenger/etc); falls back to a
    // plain download + manual-save instructions if this device/browser can't share files
    const shared = await shareOrDownloadCanvas(canvas, filename);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
    const body = `
      <h3>${shared? '✅ แชร์รูปแล้ว' : '✅ สร้างรูปเสร็จแล้ว'}</h3>
      ${!shared? `<div class="rem-meta" style="margin-bottom:10px;line-height:1.6;">รูปถูกดาวน์โหลดไว้แล้ว กดปุ่ม "📤 แชร์" ด้านล่างเพื่อส่งไปยังแอปที่ต้องการ — ถ้าเครื่องนี้เปิดหน้าต่างแชร์ไม่ได้ ให้กดค้างที่รูปแล้วเลือก "บันทึกรูปภาพ"/ส่งต่อเองแทน</div>` : ''}
      <div style="text-align:center;background:#eee;padding:8px;border-radius:8px;">
        <img src="${dataUrl}" style="max-width:100%;border:1px solid var(--border);" alt="${escapeAttr(title)}">
      </div>
      <div class="btnrow" style="margin-top:12px;">
        <button type="button" class="btn primary" id="shareReceiptAgainBtn">📤 แชร์</button>
        <button type="button" class="btn ghost" id="cancelModal">ปิด</button>
      </div>
    `;
    showModal(body);
    const shareAgainBtn = document.getElementById('shareReceiptAgainBtn');
    if(shareAgainBtn) shareAgainBtn.addEventListener('click', ()=> shareOrDownloadCanvas(canvas, filename));
  }catch(e){
    console.error('export receipt failed', e);
    showSaveError('สร้างรูปภาพไม่สำเร็จ: ' + (e && e.message ? e.message : String(e)));
  }
  document.body.removeChild(container);
}

function buildDebtorsReceiptHtml(){
  let debtors = state.customers.filter(c=> Number(c.debt||0)>0 || Number(c.gasCylinders||0)>0);
  debtors.sort((a,b)=> (Number(b.debt||0)+Number(b.gasCylinders||0)) - (Number(a.debt||0)+Number(a.gasCylinders||0)));
  const totalMoney = debtors.reduce((a,c)=>a+Number(c.debt||0),0);
  const totalGas = debtors.reduce((a,c)=>a+Number(c.gasCylinders||0),0);
  const dateStr = new Date().toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});
  let html = `<div style="text-align:center;font-weight:bold;font-size:1.15em;margin-bottom:8px;">=== รายชื่อลูกหนี้ ===</div>
  <div style="text-align:center;margin-bottom:18px;">${dateStr}</div>
  <div style="border-top:3px solid #000;margin-bottom:18px;"></div>`;
  if(!debtors.length){
    html += `<div style="text-align:center;">🎉 ไม่มีลูกหนี้ในตอนนี้</div>`;
  }
  // ☐ ชื่อ / หนี้เงิน / หนี้ถัง บรรทัดเดียว — ไว้ติ๊กปากกาตอนพิมพ์แปะสมุด, เส้นแบ่งเป็นเส้นทึบเพราะเส้นประบางเกินไปพิมพ์ไม่ค่อยติด
  debtors.forEach(c=>{
    const parts = [];
    if(Number(c.debt||0)>0) parts.push(`หนี้฿${fmtMoney(c.debt)}`);
    if(Number(c.gasCylinders||0)>0) parts.push(`ถังค้าง${c.gasCylinders}`);
    html += `<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:2px solid #000;">
      ☐ <b>${escapeHtml(c.name)}</b>${parts.length? ' / '+parts.join(' / ') : ''}
    </div>`;
  });
  html += `<div style="border-top:3px solid #000;margin-top:6px;padding-top:10px;font-weight:bold;">รวมหนี้: ฿${fmtMoney(totalMoney)} / รวมถังค้าง: ${totalGas} ใบ</div>
  <div style="text-align:center;margin-top:10px;font-size:0.85em;">— พิมพ์จากสมุดบัญชีร้าน —</div>`;
  // same font (Sarabun) + size as the ใบแจ้งหนี้ notice card, so this print export matches that look
  return `<div style="font-family:'Sarabun',sans-serif;font-size:2.2em;">${html}</div>`;
}

// ultra-short item format just for the printed Tasks list: ป/ธ single-letter brand + size + qty,
// e.g. "ป15กก 1 ถัง, ธ4กก 1 ถัง" — separate from gasBreakdownSummary (used everywhere else) since
// this print export needs to stay as compact as possible
function compactGasBreakdown(b){
  const BRAND_CHAR = { ptt:'ป', regular:'ธ' };
  return breakdownToLineItems(b).map(item=> `${BRAND_CHAR[item.brand]||''}${item.size}กก ${item.qty} ถัง`).join(', ');
}
function buildTasksReceiptHtml(){
  const dateStr = new Date().toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});
  const timeStr = new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  const stateWeight = { red:0, yellow:1, green:2, paused:3 };
  let tasks = [...state.tasks].sort((a,b)=> stateWeight[getTaskUrgencyState(a)] - stateWeight[getTaskUrgencyState(b)]);
  let html = `<div style="text-align:center;font-weight:bold;font-size:1.15em;margin-bottom:8px;">=== งานส่งวันนี้ ===</div>
  <div style="text-align:center;margin-bottom:18px;">${dateStr} ${timeStr} น.</div>
  <div style="border-top:3px solid #000;margin-bottom:18px;"></div>`;
  if(!tasks.length){
    html += `<div style="text-align:center;">ไม่มีงานส่งในขณะนี้</div>`;
  }
  // just ☐ ชื่อ | รายการ แบบย่อ — ☐ ไว้ให้ติ๊กปากกาตอนส่งเสร็จ, เส้นแบ่งเป็นเส้นทึบเพราะเส้นประบางเกินไปพิมพ์ไม่ค่อยติด
  tasks.forEach(t=>{
    const cust = t.customerId? state.customers.find(c=>c.id===t.customerId) : null;

/* Thai baht amount-in-words, e.g. 1550 -> "หนึ่งพันห้าร้อยห้าสิบบาทถ้วน" */
function thaiBahtText(amount){
  const THAI_DIGITS = ['ศูนย์','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
  const THAI_POS = ['','สิบ','ร้อย','พัน','หมื่น','แสน'];
  function readGroup(numStr){
    numStr = numStr.replace(/^0+/, '');
    if(!numStr) return '';
    let out = '';
    const len = numStr.length;
    for(let i=0;i<len;i++){
      const digit = Number(numStr[i]);
      const pos = len - i - 1;
      if(digit===0) continue;
      if(pos===0) out += (digit===1 && len>1) ? 'เอ็ด' : THAI_DIGITS[digit];
      else if(pos===1) out += (digit===1) ? 'สิบ' : (digit===2) ? 'ยี่สิบ' : THAI_DIGITS[digit]+'สิบ';
      else out += THAI_DIGITS[digit] + (THAI_POS[pos]||'');
    }
    return out;
  }
  function readInt(numStr){
    numStr = numStr.replace(/^0+/, '') || '0';
    if(numStr==='0') return 'ศูนย์';
    let out = '';
    while(numStr.length > 6){
      out += readGroup(numStr.slice(0, numStr.length-6)) + 'ล้าน';
      numStr = numStr.slice(numStr.length-6);
    }
    out += readGroup(numStr);
    return out;
  }
  const num = Math.max(0, Number(amount||0));
  const intPart = Math.floor(num);
  const satang = Math.round((num - intPart) * 100);
  let text = readInt(String(intPart)) + 'บาท';
  text += satang>0 ? (readInt(String(satang)) + 'สตางค์') : 'ถ้วน';
  return text;
}

/* PromptPay EMV QR payload (standard Thai PromptPay spec: TLV fields + CRC16-CCITT) */
function crc16Promptpay(data){
  let crc = 0xFFFF;
  for(let i=0;i<data.length;i++){
    crc ^= (data.charCodeAt(i) << 8);
    for(let j=0;j<8;j++){
      crc = (crc & 0x8000) ? ((crc<<1) ^ 0x1021) : (crc<<1);
      crc &= 0xFFFF;
    }
  }
  return crc.toString(16).toUpperCase().padStart(4,'0');
}
function ppTlv(id, value){ return id + String(value.length).padStart(2,'0') + value; }
function formatPromptPayTarget(target){
  const digits = String(target||'').replace(/[^0-9]/g,'');
  if(digits.length>=13) return { type:'02', value: digits.slice(0,13) }; // citizen ID / tax ID / e-wallet ID
  const local = digits.replace(/^0/, '66');
  return { type:'01', value: local.padStart(13,'0') }; // mobile number -> 0066XXXXXXXXX
}
function buildPromptPayPayload(target, amount){
  const t = formatPromptPayTarget(target);
  const amt = Number(amount||0);
  const body = [
    ppTlv('00','01'),
    ppTlv('01', amt>0 ? '12' : '11'),
    ppTlv('29', ppTlv('00','A000000677010111') + ppTlv(t.type, t.value)),
    ppTlv('53','764'),
    amt>0 ? ppTlv('54', amt.toFixed(2)) : '',
    ppTlv('58','TH')
  ].join('');
  return body + ppTlv('63', crc16Promptpay(body + '6304'));
}

/* who to attribute a customer's printed bill address to, so it can be remembered without a full customer record */
function getDefaultBillAddress(record, kind){
  const cust = record.customerId ? state.customers.find(c=>c.id===record.customerId) : null;
  if(cust){
    if(cust.billAddress) return cust.billAddress;
    if(cust.address && !/^https?:\/\//i.test(cust.address)) return cust.address; // never prefill a Google Maps link/pin onto the printed bill
    return '';
  }
  const name = (kind==='task' ? record.customName : record.note) || '';
  if(!name) return '';
  try{
    const map = JSON.parse(localStorage.getItem('billAddressByName')||'{}');
    return map[name.trim().toLowerCase()] || '';
  }catch(e){ return ''; }
}
function saveBillAddress(record, kind, address){
  const cust = record.customerId ? state.customers.find(c=>c.id===record.customerId) : null;
  if(cust){
    cust.billAddress = address;
    persistCustomers();
    return;
  }
  const name = (kind==='task' ? record.customName : record.note) || '';
  if(!name) return;
  try{
    const map = JSON.parse(localStorage.getItem('billAddressByName')||'{}');
    map[name.trim().toLowerCase()] = address;
    localStorage.setItem('billAddressByName', JSON.stringify(map));
  }catch(e){}
}

// tries the native share sheet first (so the user can pick LINE/Messenger/etc directly);
// falls back to a plain download if Web Share with files isn't supported on this device/browser
function shareOrDownloadCanvas(canvas, filename){
  return new Promise(resolve=>{
    canvas.toBlob(async blob=>{
      if(!blob){ resolve(false); return; }
      const file = new File([blob], filename, { type:'image/jpeg' });
      if(navigator.canShare && navigator.canShare({ files:[file] })){
        try{
          await navigator.share({ files:[file], title: filename });
          resolve(true);
          return;
        }catch(e){
          if(e && e.name==='AbortError'){ resolve(true); return; } // user closed the share sheet, not an error
          console.error('share failed, falling back to download', e);
        }
      }
      const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
      const a = document.createElement('a');
      a.href = dataUrl; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      resolve(false);
    }, 'image/jpeg', 0.95);
  });
}

/* asks whether to generate the normal receipt or the door-notice card, before the sender/address step */
function chooseBillType(){
  return new Promise(resolve=>{
    const body = `
      <h3>เลือกประเภทเอกสาร</h3>
      <div class="btnrow" style="flex-direction:column;align-items:stretch;gap:8px;">
        <button type="button" class="btn primary" data-bill-type="receipt">🧾 ใบเสร็จรับเงิน (100x80mm)</button>
        <button type="button" class="btn primary" data-bill-type="receipt_small">🧾 ใบเสร็จเล็ก 100x53mm (ไม่มี QR, สำหรับ Peripage A6)</button>
        <button type="button" class="btn primary" data-bill-type="notice">📌 ใบปิดแจ้งหนี้ (ติดถังแก๊ส)</button>
      </div>
      <div class="btnrow" style="margin-top:12px;">
        <button type="button" class="btn ghost" id="cancelModal">ยกเลิก</button>
      </div>
    `;
    showModal(body);
    document.querySelectorAll('[data-bill-type]').forEach(b=>b.addEventListener('click', ()=>{
      const type = b.dataset.billType;
      closeModal();
      resolve(type);
    }));
    document.getElementById('cancelModal').addEventListener('click', ()=> resolve(null));
    const overlay = document.getElementById('overlay');
    if(overlay) overlay.addEventListener('click', e=>{ if(e.target.id==='overlay') resolve(null); });
  });
}

async function generateAndShareBill(record, kind, triggerBtn){
  const originalLabel = triggerBtn ? triggerBtn.textContent : '';
  const billType = await chooseBillType();
  if(billType===null) return; // user cancelled
  const isNotice = billType==='notice';
  const isCompactReceipt = billType==='receipt_small';
  const details = await pickBillDetails(record, kind);
  if(details===null) return; // user cancelled
  const { senderName, address } = details;
  if(triggerBtn){ triggerBtn.textContent = '⏳ กำลังสร้าง...'; triggerBtn.disabled = true; }
  const widthPx = isNotice ? 420 : 480; // notice card targets ~105mm-wide Peripage A6 paper; receipts target ~100mm
  const qrPayId = 'qrPay_' + uid();
  const qrLineId = 'qrLine_' + uid();
  const container = document.createElement('div');
  container.style.cssText = `position:fixed;left:-9999px;top:0;width:${widthPx}px;background:#ffffff;color:#232A22;font-family:'Sarabun',sans-serif;padding:14px;line-height:1.5;`;
  container.innerHTML = isNotice
    ? buildNoticeCardHtml(record, kind, senderName, address, qrPayId, qrLineId)
    : isCompactReceipt
      ? buildBillHtmlCompact(record, kind, senderName, address)
      : buildBillHtml(record, kind, senderName, address, qrPayId, qrLineId);
  document.body.appendChild(container);
  const docLabel = isNotice ? 'ใบแจ้งหนี้' : 'บิล';
  try{
    const amount = kind==='sale' ? Number(record.amount||0) : computeSuggestedPrice(record.gasBreakdown, false) + sumOtherItemsTotal(record.otherItems);
    const qrSize = isNotice ? 240 : 120; // notice card is printed small and taped outdoors — QR needs to stay scannable
    // the compact 100x53mm receipt has no QR section in its markup at all — skip QR generation entirely
    if(!isCompactReceipt){
      new QRCode(document.getElementById(qrPayId), { text: buildPromptPayPayload(SHOP_INFO.promptPayTarget, kind==='sale'? amount : 0), width:qrSize, height:qrSize });
      // the notice card only ever has the payment QR — LINE QR only exists in the regular receipt's markup
      if(!isNotice && SHOP_INFO.lineId){
        const lineQrEl = document.getElementById(qrLineId);
        if(lineQrEl) new QRCode(lineQrEl, { text: SHOP_INFO.lineId, width:qrSize, height:qrSize });
      }
    }
    const canvas = await html2canvas(container, { backgroundColor:'#ffffff', width: widthPx, useCORS:true });
    const cust = record.customerId ? state.customers.find(c=>c.id===record.customerId) : null;
    const dateBase = kind==='sale' ? record.date : todayISO();
    const filename = `${docLabel}_${escapeFileName(cust? cust.name : (record.customName||'ลูกค้า'))}_${dateBase}.jpg`;
    const shared = await shareOrDownloadCanvas(canvas, filename);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
    const body = `
      <h3>${shared? `✅ แชร์${docLabel}แล้ว` : `✅ สร้าง${docLabel}เสร็จแล้ว`}</h3>
      ${!shared? `<div class="rem-meta" style="margin-bottom:10px;line-height:1.6;">รูป${docLabel}ถูกดาวน์โหลดไว้แล้ว กดปุ่ม "📤 แชร์" ด้านล่างเพื่อส่งไปยังแอปที่ต้องการ (LINE, Messenger ฯลฯ) — ถ้าเครื่องนี้เปิดหน้าต่างแชร์ไม่ได้ ให้กดค้างที่รูปแล้วเลือกส่งต่อเองแทน</div>` : ''}
      <div style="text-align:center;background:#eee;padding:8px;border-radius:8px;">
        <img src="${dataUrl}" style="max-width:100%;border:1px solid var(--border);" alt="${docLabel}">
      </div>
      <div class="btnrow" style="margin-top:12px;">
        <button type="button" class="btn primary" id="shareBillAgainBtn">📤 แชร์</button>
        <button type="button" class="btn ghost" id="cancelModal">ปิด</button>
      </div>
    `;
    showModal(body);
    const shareAgainBtn = document.getElementById('shareBillAgainBtn');
    if(shareAgainBtn) shareAgainBtn.addEventListener('click', ()=> shareOrDownloadCanvas(canvas, filename));
  }catch(e){
    console.error('bill export failed', e);
    showSaveError(`สร้าง${docLabel}ไม่สำเร็จ: ` + (e && e.message ? e.message : String(e)));
  } finally {
    document.body.removeChild(container);
    if(triggerBtn){ triggerBtn.textContent = originalLabel; triggerBtn.disabled = false; }
  }
}

/* ---------------- ถังบนรถ (truck stock) — a manual per-size/brand counter for how many tanks got
   physically loaded onto the delivery vehicle today, so the driver can check at a glance whether
   there's enough on board to cover the day's remaining route without recounting the truck bed.
   Persisted like every other collection (state.truckStock), so it stays in sync across devices. ---------------- */
function computeTodayTasksGasBreakdown(){
  const totals = {};
  state.tasks.forEach(t=>{
    breakdownToLineItems(t.gasBreakdown||{}).forEach(item=>{
      if(!item.qty) return;
      const key = item.size+'_'+item.brand;
      if(!totals[key]) totals[key] = { size:item.size, brand:item.brand, qty:0 };
      totals[key].qty += item.qty;
    });
  });
  return Object.values(totals).filter(i=>i.qty>0);
}
function truckStockFullTotal(){ return (state.truckStock||[]).reduce((a,i)=>a+Number(i.full||0),0); }
function truckStockEmptyTotal(){ return (state.truckStock||[]).reduce((a,i)=>a+Number(i.empty||0),0); }
function truckStockTotal(){ return truckStockFullTotal() + truckStockEmptyTotal(); }
// checks one task's ordered breakdown against what's currently loaded on the truck (FULL tanks
// only — an empty on the truck can't fulfill a new order) per size/brand. Compares against the
// truck's current total only (doesn't reserve stock across multiple pending tasks), so it's a
// "does the truck even have enough of this variant right now" check rather than a full route plan.
function getTruckStockShortfall(breakdown){
  const items = breakdownToLineItems(breakdown||[]);
  const shortfalls = [];
  items.forEach(item=>{
    if(!item.qty) return;
    const entry = (state.truckStock||[]).find(l=>l.size===item.size && l.brand===item.brand);
    const have = entry? Number(entry.full||0) : 0;
    if(have < item.qty) shortfalls.push({ size:item.size, brand:item.brand, need:item.qty, have });
  });
  return shortfalls;
}
// checks every task on today's งานส่ง list against the truck's current stock, for the "⚠️ ถังในรถ
// ไม่พอ" summary shown inside the ถังบนรถ modal (see openTruckStockModal) rather than cluttering
// every individual task card
function getAllTaskTruckShortfalls(){
  return state.tasks
    .map(t=>({ t, shortfall: getTruckStockShortfall(t.gasBreakdown) }))
    .filter(x=>x.shortfall.length);
}
// full tanks render normally; empty ones render faded/grayscale so anyone glancing at the bar (not
// just the driver) can tell full vs. empty apart at a glance without opening the modal
function truckStockIconsHtml(size){
  const items = state.truckStock||[];
  const icons = [];
  items.forEach(i=>{
    for(let k=0;k<Number(i.full||0);k++) icons.push(iconImgHtml(tankIconSrc(i.brand, i.size), size||24));
    for(let k=0;k<Number(i.empty||0);k++) icons.push(iconImgHtml(tankIconSrc(i.brand, i.size), size||24, 'filter:grayscale(1) brightness(0.85);opacity:0.7;'));
  });
  return icons.join('');
}

        </div>

// เพิ่ม / เพิ่มตามลูกค้า always add FULL tanks (that's what gets loaded onto the truck before heading
// out) — the empty count only grows automatically via applyDeliveryToTruckStock when a delivery completes
function addToTruckStock(items){
  state.truckStock = state.truckStock || [];
  items.forEach(item=>{
    if(!item.qty) return;
    const existing = state.truckStock.find(l=>l.size===item.size && l.brand===item.brand);
    if(existing) existing.full = Number(existing.full||0) + item.qty;
    else state.truckStock.push({ size:item.size, brand:item.brand, full:item.qty, empty:0 });
  });
  persistTruckStock();
}
// used by "ตั้งเต็มตามยอดลูกค้าวันนี้" — sets (not adds) the FULL count per size/brand to match
// today's aggregated customer order totals, so tapping it again after the task list changes
// re-syncs to the current total instead of stacking on top of whatever was already there
function setTruckStockFullFromCustomers(items){
  state.truckStock = state.truckStock || [];
  items.forEach(item=>{
    let existing = state.truckStock.find(l=>l.size===item.size && l.brand===item.brand);
    if(!existing){ existing = { size:item.size, brand:item.brand, full:0, empty:0 }; state.truckStock.push(existing); }
    existing.full = item.qty;
  });
  persistTruckStock();
}
// mirrors applyDeliveryToInventory but for the truck's own on-board stock: a delivered full tank
// leaves the truck's "full" count, and (unless the customer's empty is still pending pickup) comes
// right back onto the truck as an "empty" — this is what fades that tank's icon to gray in the bar
function applyDeliveryToTruckStock(breakdown, cylinderPending){
  if(!breakdown) return;
  state.truckStock = state.truckStock || [];
  breakdownToLineItems(breakdown).forEach(item=>{
    if(!item.qty) return;
    let entry = state.truckStock.find(l=>l.size===item.size && l.brand===item.brand);
    if(!entry){ entry = { size:item.size, brand:item.brand, full:0, empty:0 }; state.truckStock.push(entry); }
    entry.full = Math.max(0, Number(entry.full||0) - item.qty);
    if(!cylinderPending) entry.empty = Number(entry.empty||0) + item.qty;
  });
  persistTruckStock();
}

  showModal(body);

        persistTruckStock();
        refreshTruckStockModal();
        render();
      }
      return;
    }
    // ◀▶ ย้ายถังทีละใบข้ามฟาก เต็ม<->เปล่า — เช่น เอาถังเปล่าที่เพิ่งได้คืนจากลูกค้ามาเติมลมใหม่กลายเป็นเต็ม
    // หรือถังเต็มที่ส่งไปแล้วแต่ลืมกดส่งเสร็จ ให้ย้ายเป็นเปล่าเอง โดยไม่ต้องกดลบ/เพิ่มทีละใบ
    const moveBtn = e.target.closest('[data-truck-move]');
    if(moveBtn){
      const [size, brand, dir] = moveBtn.dataset.truckMove.split('_');
      const entry = state.truckStock.find(l=>l.size===size && l.brand===brand);
      if(entry){
        if(dir==='toFull' && Number(entry.empty||0)>0){
          entry.empty -= 1;
          entry.full = Number(entry.full||0) + 1;
        } else if(dir==='toEmpty' && Number(entry.full||0)>0){
          entry.full -= 1;
          entry.empty = Number(entry.empty||0) + 1;
        } else {
          return;
        }
        persistTruckStock();
        refreshTruckStockModal();
        render();
      }
    }
  });
}

// captures the truck's current GPS position (one-shot, no tracking/watch) and reopens the route
// plot using that as the reference point instead of the fixed shop location — for "how far/which
// way from HERE, right now" rather than "from the shop"
function pinTruckLocationAndPlot(){
  if(!navigator.geolocation){
    alert('เบราว์เซอร์/อุปกรณ์นี้ไม่รองรับการหาตำแหน่งปัจจุบัน (GPS)');
    return;
  }
  const btn = document.getElementById('routePlotPinAgainBtn') || document.getElementById('routePlotPinBtn') || document.getElementById('pinTruckLocationBtn');
  const originalText = btn? btn.textContent : '';
  if(btn){ btn.disabled = true; btn.textContent = '📍 กำลังหาตำแหน่ง...'; }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      truckPinCoord = { lat: pos.coords.latitude, lng: pos.coords.longitude, at: Date.now() };
      routePlotUseTruckPin = true;
      openRoutePlotModal();
    },
    ()=>{
      if(btn){ btn.disabled = false; btn.textContent = originalText; }
      alert('หาตำแหน่งรถตอนนี้ไม่ได้ — ลองเปิดสิทธิ์ตำแหน่งที่ตั้ง (Location) ให้เบราว์เซอร์ก่อน แล้วลองใหม่');
    },
    { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
  );
}
// pins the truck's current position (one-shot GPS) purely to power the "distance" sort chip in the
// Tasks tab list — separate entry point from pinTruckLocationAndPlot (which also opens the SVG

function openRoutePlotModal(){
  const useTruckPin = routePlotUseTruckPin && !!truckPinCoord;
  const ref = useTruckPin ? truckPinCoord : state.shopCoord;
  if(!ref){ openSetShopCoordForm(); return; }
  const refLabel = useTruckPin ? `🚚 รถ (${new Date(truckPinCoord.at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})})` : '🏠 ร้าน';
  const stops = [];
  const noCoordStops = [];
  state.tasks.forEach(t=>{
    const cust = t.customerId? state.customers.find(c=>c.id===t.customerId) : null;
    const name = cust? cust.name : (t.customName||'ไม่ระบุชื่อ');
    const address = cust? cust.address : t.address;
    const coord = coordFromAddress(address);
    if(coord){
      const dist = haversineKm(ref, coord);
      const bearing = bearingDeg(ref, coord);
      stops.push({ t, name, dist, bearing, urgency: getTaskUrgencyState(t), navLink: mapsUrl(address) });
    } else {
      noCoordStops.push({ t, name });
    }
  });
  stops.sort((a,b)=>a.dist-b.dist);
  const maxDist = Math.max(1, ...stops.map(s=>s.dist));
  const R = 128; // plot radius in svg units, center at (150,150)
  const urgencyColor = { red:'#B23A2E', yellow:'#D8A32C', green:'#3F8F5B', paused:'#7A8BA0' };
  const points = stops.map((s,i)=>{
    const r = (s.dist/maxDist) * R;
    const rad = s.bearing * Math.PI/180;
    const x = 150 + r*Math.sin(rad);
    const y = 150 - r*Math.cos(rad);
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="7" fill="${urgencyColor[s.urgency]||'#888'}" stroke="#fff" stroke-width="1.5"><title>${escapeAttr(s.name)} — ${s.dist.toFixed(1)} กม.</title></circle>
      <text x="${x.toFixed(1)}" y="${(y-11).toFixed(1)}" font-size="9" text-anchor="middle" fill="#333">${i+1}</text>`;
  }).join('');
  const ringRadii = [R*0.33, R*0.66, R];
  const rings = ringRadii.map(r=>`<circle cx="150" cy="150" r="${r.toFixed(1)}" fill="none" stroke="#ddd" stroke-width="1"></circle>
    <text x="${(150+r+2).toFixed(1)}" y="153" font-size="8" fill="#aaa">${(maxDist*(r/R)).toFixed(1)}กม.</text>`).join('');
  const svg = `<svg viewBox="0 0 300 300" style="width:100%;max-width:340px;display:block;margin:0 auto;background:#fafaf7;border-radius:8px;">
    ${rings}
    <text x="150" y="14" font-size="11" text-anchor="middle" fill="#999">เหนือ N</text>
    <text x="150" y="292" font-size="11" text-anchor="middle" fill="#999">ใต้ S</text>
    <text x="8" y="154" font-size="11" fill="#999">ตต W</text>
    <text x="272" y="154" font-size="11" fill="#999">ตอ E</text>
    <circle cx="150" cy="150" r="9" fill="var(--orange-dark, #C1541F)" stroke="#fff" stroke-width="2"></circle>
    <text x="150" y="168" font-size="9" text-anchor="middle" fill="#333">${refLabel}</text>
    ${points}
  </svg>`;
  // group by 8-point compass sector, sorted nearest-first within each sector, so the list directly
  // answers "which direction should I head first" — pair with the plot above for a visual double-check
  const bySector = {};
  stops.forEach(s=>{
    const sector = bearingToSector(s.bearing);
    if(!bySector[sector]) bySector[sector] = [];
    bySector[sector].push(s);
  });
  const sectorOrder = COMPASS_SECTORS.filter(s=>bySector[s]);
  const listHtml = sectorOrder.map(sector=>`
    <div class="rem-meta" style="font-weight:700;margin:10px 0 4px;">🧭 ทิศ${sector} (${bySector[sector].length} ราย)</div>
    ${bySector[sector].map(s=>`
      <div class="card" style="padding:8px 12px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;gap:8px;">
        <div>${getTaskUrgencyIcon(s.urgency)} <b>${escapeHtml(s.name)}</b> <span class="rem-meta">~${s.dist.toFixed(1)} กม.</span></div>
        ${s.navLink? `<a class="btn ghost small" href="${s.navLink}" target="_blank" rel="noopener" style="text-decoration:none;flex-shrink:0;">🧭</a>` : ''}
      </div>`).join('')}
  `).join('');
  const noCoordHtml = noCoordStops.length? `
    <div class="rem-meta" style="margin-top:12px;line-height:1.6;">⚠️ ${noCoordStops.length} รายไม่มีพิกัดที่อ่านได้ (ที่อยู่เป็นข้อความ ไม่ใช่ลิงก์ Google Maps) เลยวางบนแผนผังไม่ได้: ${noCoordStops.map(x=>escapeHtml(x.name)).join(', ')} — ลองแก้โปรไฟล์ลูกค้าแล้ววางลิงก์ Google Maps แทนที่อยู่ข้อความ จะช่วยให้ระบบคำนวณทิศทางให้ได้</div>` : '';
  const body = `
    <h3>🧭 แผนผังเส้นทางวันนี้ (offline)</h3>
    <div class="rem-meta" style="margin-bottom:10px;line-height:1.6;">ประมาณทิศทาง/ระยะทางเป็นเส้นตรงจาก${useTruckPin? 'ตำแหน่งรถที่ปักไว้':'ร้าน'} ไม่ใช่ระยะทางถนนจริง — ใช้ดูคร่าวๆ ว่าควรไปทางไหนก่อน</div>
    ${stops.length? svg : '<div class="empty">ยังไม่มีงานส่งที่มีพิกัดให้วางบนแผนผัง</div>'}
    ${listHtml}
    ${noCoordHtml}
    <div class="btnrow" style="margin-top:12px;">
      ${useTruckPin
        ? `<button type="button" class="btn primary small" id="routePlotPinAgainBtn">📍 ปักหมุดรถใหม่อีกครั้ง</button><button type="button" class="btn ghost small" id="routePlotUseShopBtn">🏠 ใช้พิกัดร้านแทน</button>`
        : `<button type="button" class="btn primary small" id="routePlotPinBtn">📍 ปักหมุดรถตอนนี้</button><button type="button" class="btn ghost small" id="changeShopCoordBtn">📍 แก้พิกัดร้าน</button>`}
      <button type="button" class="btn ghost" id="cancelModal">ปิด</button>
    </div>
  `;
  showModal(body);
  if(useTruckPin){
    document.getElementById('routePlotPinAgainBtn').addEventListener('click', pinTruckLocationAndPlot);
    document.getElementById('routePlotUseShopBtn').addEventListener('click', ()=>{ routePlotUseTruckPin = false; openRoutePlotModal(); });
  } else {
    document.getElementById('routePlotPinBtn').addEventListener('click', pinTruckLocationAndPlot);
    document.getElementById('changeShopCoordBtn').addEventListener('click', openSetShopCoordForm);
  }
}

function openGasBreakdownModal(){
  const totals = {}; // key "size|brand" -> {size,brand,qty}
  state.customers.forEach(c=>{
    breakdownToLineItems(c.gasCylindersBreakdown||[]).forEach(item=>{
      const key = item.size+'|'+item.brand;
      if(!totals[key]) totals[key] = { size:item.size, brand:item.brand, qty:0 };
      totals[key].qty += item.qty;

  let items = Object.values(totals).filter(i=>i.qty>0);
  items.sort((a,b)=> Number(a.size)-Number(b.size) || a.brand.localeCompare(b.brand));

// true if this customer picked up NEW debt (cash and/or cylinder) on the given date — used by the
// "ของวันนี้ / เลือกวัน" debtors filter. Looks at state.sales directly (unpaid / cylinderPending
// entries are how every debt-creating flow — Sale form, Task-complete, เพิ่มยอดหนี้ — logs it) rather
// than customer.debt (which is just a running balance with no per-day breakdown)
function customerHasNewDebtOnDate(customerId, dateStr){
  return state.sales.some(s=> s.customerId===customerId && s.date===dateStr && (s.unpaid || s.cylinderPending));
}
function renderDebtors(){
  let debtors = state.customers.filter(c=> Number(c.debt||0)>0 || Number(c.gasCylinders||0)>0);
  const totalMoney = debtors.reduce((a,c)=>a+Number(c.debt||0),0);
  const totalGas = debtors.reduce((a,c)=>a+Number(c.gasCylinders||0),0);

  const activeSummary = [];
  if(debtorsFilterType!=='all') activeSummary.push({debtOnly:'เฉพาะหนี้เงิน',gasOnly:'เฉพาะถังค้าง'}[debtorsFilterType]);

  else if(debtorsDateFilter==='custom') activeSummary.push('หนี้ใหม่วันที่ '+fmtDateShort(debtorsCustomDate));
  const sortLabels = {total:'รวมหนักสุด',name:'ชื่อ',debt:'ยอดหนี้',gas:'ถังค้าง',recent:'ลูกค้ารายล่าสุด'};

  const searchBar = `<div class="field" style="margin-bottom:10px;"><input id="debtorSearchInput" placeholder="🔍 ค้นหาชื่อหรือเบอร์โทร..." value="${escapeAttr(debtorSearchQuery)}"></div>`;

    ${!debtorsFilterOpen? `<span class="rem-meta" style="align-self:center;">${activeSummary.join(' · ')}</span>` : ''}
  </div>`;

  let panel = '';
  if(debtorsFilterOpen){
    const filterChips = [['all','ทั้งหมด'],['debtOnly','เฉพาะหนี้เงิน'],['gasOnly','เฉพาะถังค้าง']];
    const dateChips = [['all','ทั้งหมด'],['today','ของวันนี้'],['custom','เลือกวัน']];
    const sortOptions = [['total','รวมหนักสุด'],['name','ชื่อ'],['debt','ยอดหนี้'],['gas','ถังค้าง'],['recent','เพิ่มล่าสุด']];
    panel = `
      <div class="stamp-card" style="margin-bottom:12px;">
        <div class="rem-meta" style="margin-bottom:6px;font-weight:700;">กรอง</div>
        <div class="btnrow" style="margin-bottom:10px;">${filterChips.map(([k,l])=>`<button class="btn ${debtorsFilterType===k?'primary':'ghost'} small" data-debtor-filter="${k}">${l}</button>`).join('')}</div>
        <div class="rem-meta" style="margin-bottom:6px;font-weight:700;">กรองตามวันที่เป็นหนี้ใหม่</div>
        <div class="btnrow" style="margin-bottom:${debtorsDateFilter==='custom'?'8px':'10px'};">${dateChips.map(([k,l])=>`<button class="btn ${debtorsDateFilter===k?'primary':'ghost'} small" data-debtor-date-filter="${k}">${l}</button>`).join('')}</div>
        ${debtorsDateFilter==='custom'? `<div class="field" style="margin-bottom:10px;"><input type="date" id="debtorCustomDateInput" value="${debtorsCustomDate}"></div>` : ''}
        <div class="rem-meta" style="margin-bottom:6px;font-weight:700;">เรียงตาม</div>
        <div class="btnrow">${sortOptions.map(([k,l])=>`<button class="btn ${debtorsSort===k?'primary':'ghost'} small" data-debtor-sort="${k}">${l}</button>`).join('')}</div>
      </div>`;
  }

  if(!debtors.length) return searchBar + toggleBtn + panel + '<div class="empty">🎉 ไม่มีลูกหนี้ในตอนนี้ (ทั้งเงินและถัง)</div>';

  if(debtorsSort==='name') debtors.sort((a,b)=>a.name.localeCompare(b.name,'th'));
  else if(debtorsSort==='debt') debtors.sort((a,b)=>Number(b.debt||0)-Number(a.debt||0));
  else if(debtorsSort==='gas') debtors.sort((a,b)=>Number(b.gasCylinders||0)-Number(a.gasCylinders||0));
  else if(debtorsSort==='recent') debtors.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  else debtors.sort((a,b)=> (Number(b.debt||0)+Number(b.gasCylinders||0)) - (Number(a.debt||0)+Number(a.gasCylinders||0)));

  const listHtml = debtors.length ? debtors.map(renderDebtorRow).join('') : '<div class="empty">ไม่พบลูกหนี้ที่ตรงกับเงื่อนไข</div>';
  return `
    ${searchBar}${toggleBtn}${panel}
    <div class="debtor-total">
      <span>ยอดหนี้รวมทั้งหมด</span>
      <span class="amt">฿${fmtMoney(totalMoney)}</span>
    </div>
    <div class="debtor-total" style="margin-top:-6px;background:var(--orange-dark);cursor:pointer;" data-show-gas-breakdown="1">
      <span>ถังค้างคืนรวมทั้งหมด (แตะดูรายละเอียด)</span>
      <span class="amt" style="color:#FFE0C2;">${fmtMoney(totalGas)} ถัง</span>
    </div>
    ${listHtml}
  `;
}

/* ---------------- TASKS (daily delivery checklist) ---------------- */
// per-device display toggle (localStorage, like billSenderName/prachanatStaffName) so the shop
// owner can turn the 🪪 ประชารัฐ icon on the Tasks tab off if it gets too cluttered — defaults to on
function getShowPrachanatTaskIcon(){ return localStorage.getItem('showPrachanatTaskIcon') !== '0'; }
function setShowPrachanatTaskIcon(v){ localStorage.setItem('showPrachanatTaskIcon', v? '1':'0'); }
function renderTasks(){
  const intro = `<div class="rem-meta" style="margin-bottom:12px;line-height:1.6;">รายการนี้เป็นแค่ "เช็คลิสต์ส่งของวันนี้" ชั่วคราว พอกดเสร็จแล้วรายการจะหายไปเลย — ข้อมูลลูกค้าจริงยังอยู่ครบในแท็บ "ลูกค้า" เสมอ ไม่ปนกัน</div>`;

  // offer to turn on real phone notifications for new งานส่ง — only while this permission hasn't
  // been decided yet ('default'); once granted or denied there's nothing more to ask here
  let notifyBanner = '';
  if('Notification' in window){
    if(Notification.permission === 'default'){
      notifyBanner = `<div class="stamp-card" style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
        <div class="rem-meta" style="margin:0;">🔔 เปิดแจ้งเตือนตอนมีงานส่งใหม่เข้ามา (ขึ้นที่หน้าจอมือถือ ตอนแอปเปิด/ทำงานอยู่เบื้องหลัง)</div>
        <button class="btn primary small" id="enableTaskNotifyBtn">เปิดการแจ้งเตือน</button>
      </div>`;
    } else if(Notification.permission === 'denied'){
      notifyBanner = `<div class="rem-meta" style="margin-bottom:12px;">🔕 การแจ้งเตือนถูกปิดไว้ในเบราว์เซอร์ — ถ้าอยากเปิด ต้องไปเปิดเองในตั้งค่าเว็บไซต์นี้ของเบราว์เซอร์/มือถือ</div>`;
    }
  }

  // summary header: always reflects ALL of today's tasks regardless of the search/filter below,
  // so it answers "how many customers / how many tanks do I need to load onto the truck" at a glance
  const custCount = state.tasks.length;
  const totalQty = state.tasks.reduce((a,t)=>a+sumGasBreakdown(t.gasBreakdown),0);
  const summaryBar = state.tasks.length ? `
    <div class="debtor-total" data-show-tasks-breakdown="1" style="cursor:pointer;">
      <span>ลูกค้าที่สั่งวันนี้ ${custCount} ราย (แตะดูแยกยี่ห้อ)</span>
      <span class="amt">${fmtMoney(totalQty)} ถัง</span>
    </div>` : '';

  // "ถังบนรถ" — manual tally of tanks physically loaded onto the delivery vehicle today; tap to
  // add/remove/clear (see openTruckStockModal). Shown even with 0 so the driver always has quick access.
  const truckShortfalls = getAllTaskTruckShortfalls();
  const truckBar = `
    <div class="debtor-total" data-open-truck-stock="1" style="cursor:pointer;flex-wrap:wrap;gap:8px;align-items:center;">
      <span>🚚 ถังบนรถ${truckShortfalls.length? ` <span style="color:var(--red);font-weight:700;">⚠️ ${truckShortfalls.length} ราย</span>` : ''}</span>
      <span style="display:flex;flex-wrap:wrap;gap:2px;flex:1;min-width:80px;">${truckStockIconsHtml(26) || '<span class="rem-meta" style="color:#B9BCB2;">ยังไม่มี</span>'}</span>
      <div style="text-align:right;">
        <div class="amt" style="line-height:1.2;">${fmtMoney(truckStockTotal())} ถัง</div>
        <div style="font-size:11px;color:#B9BCB2;">เต็ม ${fmtMoney(truckStockFullTotal())} · เปล่า ${fmtMoney(truckStockEmptyTotal())}</div>
      </div>
    </div>`;

  const filterLabels = {all:'ทั้งหมด', red:'🔴 ค้างนาน', yellow:'🟡 รอนาน', green:'🟢 ปกติ', paused:'🔵 พักไว้'};
  const sortLabels = {urgency:'ความเร่งรีบ', name:'ชื่อ', recent:'เพิ่มล่าสุด', landmark:'จุดสังเกต/สิ่งที่นึกถึง', distance:'ระยะใกล้-ไกล (จากที่ปักหมุด)'};
  const activeSummary = [];
  if(tasksFilterType!=='all') activeSummary.push(filterLabels[tasksFilterType]);
  activeSummary.push('เรียงตาม'+sortLabels[tasksSort]);
  const searchBar = `<div class="field" style="margin-bottom:10px;"><input id="taskSearchInput" placeholder="🔍 ค้นหางานส่ง... (ชื่อ, ซอย, หมู่, จุดสังเกต)" value="${escapeAttr(taskSearchQuery)}"></div>`;
  const toggleBtn = `<div class="btnrow" style="margin-bottom:${tasksFilterOpen?'10px':'12px'};">
    <button class="btn ${tasksFilterOpen?'primary':'ghost'} small" id="toggleTasksFilter">⚙️ กรอง/เรียง ${tasksFilterOpen?'▲':'▼'}</button>
    <button class="btn ghost small" id="exportTasksBtn">📤 Export พิมพ์</button>
    <button class="btn ghost small" id="openRoutePlotBtn">🧭 แผนผังเส้นทาง</button>
    <button class="btn ghost small" id="pinTruckLocationBtn">📍 ปักหมุดรถตอนนี้</button>
    ${!tasksFilterOpen? `<span class="rem-meta" style="align-self:center;">${activeSummary.join(' · ')}</span>` : ''}
  </div>`;

  let panel = '';
  if(tasksFilterOpen){
    const filterChips = [['all','ทั้งหมด'],['red','🔴 ค้างนาน'],['yellow','🟡 รอนาน'],['green','🟢 ปกติ'],['paused','🔵 พักไว้']];
    const sortOptions = [['urgency','ความเร่งรีบ'],['name','ชื่อ'],['recent','เพิ่มล่าสุด'],['landmark','จุดสังเกต'],['distance','📍 ระยะใกล้-ไกล']];
    panel = `
      <div class="stamp-card" style="margin-bottom:12px;">
        <div class="rem-meta" style="margin-bottom:6px;font-weight:700;">กรองตามสถานะ</div>
        <div class="btnrow" style="margin-bottom:10px;">${filterChips.map(([k,l])=>`<button class="btn ${tasksFilterType===k?'primary':'ghost'} small" data-task-filter="${k}">${l}</button>`).join('')}</div>
        <div class="rem-meta" style="margin-bottom:6px;font-weight:700;">เรียงตาม</div>
        <div class="btnrow">${sortOptions.map(([k,l])=>`<button class="btn ${tasksSort===k?'primary':'ghost'} small" data-tasks-sort="${k}">${l}</button>`).join('')}</div>
        ${tasksSort==='distance'? `<div class="rem-meta" style="margin-top:6px;">📍 ปักไว้เมื่อ ${truckPinCoord? new Date(truckPinCoord.at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}) : '-'} <button type="button" class="btn ghost small" id="refreshTruckPinBtn" style="margin-left:6px;">🔄 ปักหมุดใหม่</button></div>` : ''}
        <div class="rem-meta" style="margin:10px 0 6px;font-weight:700;">แสดงผล</div>
        <div class="btnrow"><button class="btn ${getShowPrachanatTaskIcon()?'primary':'ghost'} small" id="togglePrachanatTaskIcon">🪪 ไอคอนบัตรประชารัฐข้างปุ่มนำทาง ${getShowPrachanatTaskIcon()?'(เปิดอยู่)':'(ปิดอยู่)'}</button></div>
      </div>`;
  }

  let list = [...state.tasks];
  const q = taskSearchQuery.trim().toLowerCase();
  if(q){
    // search matches name as well as ซอย/หมู่/จุดสังเกต — so searching e.g. "บ้านแม่โป่ง" surfaces
    // everyone tagged near there too, not just an exact customer-name match
    list = list.filter(t=>{
      const cust = t.customerId? state.customers.find(c=>c.id===t.customerId) : null;
      const name = cust? cust.name : (t.customName||'');
      const soi = cust? cust.soi : t.soi;
      const moo = cust? cust.moo : t.moo;
      const landmark = cust? cust.landmark : t.landmark;
      const haystack = [name, soi, moo, landmark].filter(Boolean).join(' ').toLowerCase();
      return haystack.includes(q);
    });
  }
  if(tasksFilterType!=='all'){ list = list.filter(t=> getTaskUrgencyState(t)===tasksFilterType); }
  const stateWeight = { red:0, yellow:1, green:2, paused:3 };
  if(tasksSort==='name') list.sort((a,b)=>{
    const an = (a.customerId? (state.customers.find(c=>c.id===a.customerId)||{}).name : a.customName) || '';
    const bn = (b.customerId? (state.customers.find(c=>c.id===b.customerId)||{}).name : b.customName) || '';
    return an.localeCompare(bn,'th');
  });
  // addedAt is set once at creation and never touched again — timerStartAt gets reset by "Activate"
  // (reactivating a paused task), so sorting by that instead made reactivated old tasks jump to the
  // top and look like they'd just been added, which is the bug being fixed here
  else if(tasksSort==='recent') list.sort((a,b)=> (b.addedAt||b.timerStartAt||0) - (a.addedAt||a.timerStartAt||0));
  // groups tasks by จุดสังเกต/สิ่งที่นึกถึง text (so stops near the same landmark end up next to each
  // other in the list) — blank/unset landmarks sort to the bottom since there's nothing to group by
  else if(tasksSort==='landmark') list.sort((a,b)=>{
    const aCust = a.customerId? state.customers.find(c=>c.id===a.customerId) : null;
    const bCust = b.customerId? state.customers.find(c=>c.id===b.customerId) : null;
    const al = (aCust? aCust.landmark : a.landmark) || '';
    const bl = (bCust? bCust.landmark : b.landmark) || '';
    if(!al && !bl) return 0;
    if(!al) return 1;
    if(!bl) return -1;
    return al.localeCompare(bl,'th');
  });
  // sort by straight-line distance from wherever the truck was pinned (see pinTruckLocationAndPlot/
  // selectDistanceTasksSort) — stops with no readable coordinate (plain-text address, not a Google
  // Maps link) sort to the bottom since there's nothing to measure
  else if(tasksSort==='distance' && truckPinCoord) list.sort((a,b)=>{
    const aCust = a.customerId? state.customers.find(c=>c.id===a.customerId) : null;
    const bCust = b.customerId? state.customers.find(c=>c.id===b.customerId) : null;
    const aCoord = coordFromAddress(aCust? aCust.address : a.address);
    const bCoord = coordFromAddress(bCust? bCust.address : b.address);
    const aDist = aCoord? haversineKm(truckPinCoord, aCoord) : Infinity;
    const bDist = bCoord? haversineKm(truckPinCoord, bCoord) : Infinity;
    return aDist - bDist;
  });
  else list.sort((a,b)=> stateWeight[getTaskUrgencyState(a)] - stateWeight[getTaskUrgencyState(b)]);

  if(!state.tasks.length) return intro + notifyBanner + truckBar + '<div class="empty">ยังไม่มีงานส่งของวันนี้<br>แตะปุ่ม + เพื่อเพิ่มรายชื่อที่ต้องไปส่ง</div>';
  if(!list.length) return intro + notifyBanner + summaryBar + truckBar + searchBar + toggleBtn + panel + '<div class="empty">ไม่พบงานที่ตรงกับเงื่อนไข</div>';

  const rows = list.map(t=>{
    const cust = t.customerId? state.customers.find(c=>c.id===t.customerId) : null;
    const displayName = cust? cust.name : (t.customName || 'ไม่ระบุชื่อ');
    const phone = cust? cust.phone : t.phone;
    const address = cust? cust.address : t.address;
    const navLink = mapsUrl(address);
    const urgencyState = getTaskUrgencyState(t);
    const truckShortfall = t.gasBreakdown? getTruckStockShortfall(t.gasBreakdown) : [];
    // old-debt badge — quick red flag next to the name so the driver knows before knocking on the
    // door; kept short (money + cylinder count only, no wording) so it doesn't crowd the card
    const oldDebtParts = [];
    if(cust){
      if(Number(cust.debt||0)>0) oldDebtParts.push(`-${fmtMoney(cust.debt)}`);
      if(Number(cust.gasCylinders||0)>0) oldDebtParts.push(`ค้าง${cust.gasCylinders}ถัง`);
    }
    const oldDebtBadge = oldDebtParts.length? ` <span style="color:var(--red);font-size:11px;font-weight:700;">${oldDebtParts.join(' ')}</span>` : '';
    const hasPrachanatCredit = cust && Number(cust.prachanatCredit||0)>0 && getShowPrachanatTaskIcon();
    // per user's request: drop the urgency wording/elapsed-time text (the colored emoji next to
    // the name is enough on its own) and show ซอย/หมู่/จุดสังเกต here instead, same text size
    const taskSoi = cust? cust.soi : t.soi;
    const taskMoo = cust? cust.moo : t.moo;
    const taskLandmark = cust? cust.landmark : t.landmark;
    // only computed/shown while sorted by distance, so it doesn't clutter the card the rest of the time
    let cardDistKm = null;
    if(tasksSort==='distance' && truckPinCoord){
      const coord = coordFromAddress(address);
      if(coord) cardDistKm = haversineKm(truckPinCoord, coord);
    }
    return `
    <div class="card rem-card">
      <div class="checkbox" data-complete-task="${t.id}" style="cursor:pointer;"></div>
      <div style="flex:1;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div class="rem-title"><span data-set-urgency="${t.id}" style="cursor:pointer;padding:2px 4px;margin:-2px -4px;border-radius:6px;" title="แตะเพื่อเปลี่ยนสถานะ">${getTaskUrgencyIcon(urgencyState)}</span> ${escapeHtml(displayName)}${truckShortfall.length? ` <span title="ถังในรถไม่พอสำหรับลูกค้านี้">⚠️</span>` : ''}${oldDebtBadge}</div>
          <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;">
            ${cardDistKm!=null? `<span class="tag gas" style="font-size:11px;">📍~${cardDistKm.toFixed(1)}กม.</span>` : ''}
            ${hasPrachanatCredit? `<span title="มีเครดิตบัตรประชารัฐ ฿${fmtMoney(cust.prachanatCredit)}">🪪</span>` : ''}
            ${navLink? `<a class="btn ghost small" href="${navLink}" target="_blank" rel="noopener" style="text-decoration:none;">🧭 นำทาง</a>` : ''}
          </div>
        </div>
        <div class="rem-meta">ซอย ${taskSoi? escapeHtml(taskSoi) : '-'} · หมู่ ${taskMoo? escapeHtml(taskMoo) : '-'} · 🏠 ${taskLandmark? escapeHtml(taskLandmark) : '-'}</div>
        ${t.gasBreakdown && sumGasBreakdown(t.gasBreakdown)>0? `<div class="rem-meta">${gasBrandIconsHtml(t.gasBreakdown, 16) || '🛢️'} ${gasBreakdownSummary(t.gasBreakdown)}</div>` : ''}
        ${truckShortfall.length? `<div class="rem-meta" style="color:var(--red);font-weight:600;">⚠️ ถังในรถไม่พอ: ${truckShortfall.map(s=>`${GAS_BRAND_LABELS[s.brand]} ${s.size}kg ขาด ${s.need-s.have} (มี ${s.have}/${s.need})`).join(', ')}</div>` : ''}
        ${t.otherItems && t.otherItems.length? `<div class="rem-meta">🧰 ${otherItemsSummary(t.otherItems)}</div>` : ''}
        ${phone? `<div class="rem-meta">📞 <a href="tel:${escapeAttr(phone)}" style="color:var(--orange-dark);font-weight:600;">${escapeHtml(phone)}</a></div>` : ''}
        ${t.note? `<div class="rem-meta">📝 ${escapeHtml(t.note)}</div>` : ''}
        <div class="btnrow">
          <button class="btn ghost small" data-edit-task="${t.id}">แก้ไข</button>
          <button class="btn ghost small" data-bill-task="${t.id}">🧾 บิล</button>
          ${urgencyState==='paused'? `<button class="btn primary small" style="background:var(--green);" data-reactivate-task="${t.id}">▶️ Activate</button>` : ''}
          <button class="btn danger small" data-del-task="${t.id}">ลบ</button>
          <button class="btn ghost small" data-add-task-reminder="${t.id}">🚨 เพิ่มแจ้งเตือน</button>
          <button class="btn primary small" data-complete-task="${t.id}" style="margin-left:auto;">✅ กดเมื่อส่งเสร็จ</button>
        </div>
      </div>
    </div>`;
  }).join('');
  return intro + notifyBanner + summaryBar + truckBar + searchBar + toggleBtn + panel + rows;
}

// when a task is linked to an existing customer, their phone/address/soi/moo/landmark live on the
// CUSTOMER record, not the task — this renders a read-only summary of that data so it never looks
// like it "disappeared" just because the editable copies are hidden in this form
function taskCustInfoBlockHtml(cust){
  if(!cust) return '';
  return `
    <div class="rem-meta">📞 ${cust.phone? escapeHtml(cust.phone) : 'ไม่มีเบอร์'} · 📍 ${cust.address? escapeHtml(cust.address) : 'ไม่มีที่อยู่/ลิงก์แผนที่'}</div>
    <div class="rem-meta">ซอย ${cust.soi? escapeHtml(cust.soi) : '-'} · หมู่ ${cust.moo? escapeHtml(cust.moo) : '-'} · จุดสังเกต ${cust.landmark? escapeHtml(cust.landmark) : '-'}</div>
  `;
}

function openTaskForm(editId){
  const editing = editId? state.tasks.find(t=>t.id===editId) : null;
  const editingCust = editing && editing.customerId? state.customers.find(c=>c.id===editing.customerId) : null;
  const initialName = editingCust? editingCust.name : (editing? (editing.customName||'') : '');
  const soiOptions = getKnownFieldValues('soi');
  const mooOptions = getKnownFieldValues('moo');
  const landmarkOptions = getKnownFieldValues('landmark');
  const initialUrgencyMode = (editing && editing.urgencyMode) ? editing.urgencyMode : 'auto';
  const body = `
    <h3>${editing? 'แก้ไขงานส่งของ' : 'เพิ่มงานส่งของ'}</h3>

      <div class="field">
        <label>ชื่อลูกค้า *</label>

        <input type="hidden" id="f_taskCustomerId" value="${editingCust? editingCust.id : ''}">
        <div id="taskCustSuggestions" style="margin-top:6px;"></div>
      </div>
      <div class="field"><label>ถังที่จะส่ง</label>${lineItemBuilderHtml('taskLine', editing? breakdownToLineItems(editing.gasBreakdown) : [])}</div>
      <div class="field"><label>สินค้าอื่นๆ (ถ้ามี)</label>${otherProductLineBuilderHtml('taskOtherLine', editing? (editing.otherItems||[]) : [])}</div>
      <div id="existingCustInfoBlock" class="stamp-card" style="margin-bottom:10px;${editingCust? '':'display:none;'}">
        <div class="rem-meta" style="font-weight:700;margin-bottom:4px;">ข้อมูลลูกค้า (ไม่ได้หายไปไหน — แก้ไขได้ที่หน้าลูกค้าโดยตรง)</div>
        <div id="existingCustInfoContent">${taskCustInfoBlockHtml(editingCust)}</div>
        <button type="button" class="btn ghost small" id="editLinkedCustBtn" style="margin-top:6px;">✏️ แก้ไขข้อมูลลูกค้าคนนี้</button>
      </div>
      <div id="newCustomerFields" style="${editingCust? 'display:none;':''}">
        <div class="field-row">
          <div class="field"><label>เบอร์โทร (ถ้ามี)</label><input id="f_taskPhone" value="${editing? escapeAttr(editing.phone||''):''}"></div>
          <div class="field"><label>ที่อยู่/ลิงก์แผนที่ (ถ้ามี)</label><input id="f_taskAddress" value="${editing? escapeAttr(editing.address||''):''}"></div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>ซอย (ตัวเลข หรือ ตัวเลข/ตัวเลข เช่น 3/3)</label>
            <input id="f_taskSoi" list="taskSoiList" inputmode="numeric" pattern="[0-9/]*" oninput="this.value=this.value.replace(/[^0-9/]/g,'')" value="${editing? escapeAttr(stripSoiChars(editing.soi)):''}" placeholder="เช่น 5 หรือ 3/3" autocomplete="off">
            <datalist id="taskSoiList">${soiOptions.map(v=>`<option value="${escapeAttr(v)}">`).join('')}</datalist>
          </div>
          <div class="field">
            <label>หมู่ (ตัวเลขเท่านั้น)</label>
            <input id="f_taskMoo" list="taskMooList" inputmode="numeric" pattern="[0-9]*" oninput="this.value=this.value.replace(/[^0-9]/g,'')" value="${editing? escapeAttr(stripToDigits(editing.moo)):''}" placeholder="เช่น 3" autocomplete="off">
            <datalist id="taskMooList">${mooOptions.map(v=>`<option value="${escapeAttr(v)}">`).join('')}</datalist>
          </div>
        </div>
        <div class="field">
          <label>สิ่งที่นึกถึง / จุดสังเกต</label>
          <input id="f_taskLandmark" list="taskLandmarkList" value="${editing? escapeAttr(editing.landmark||''):''}" placeholder="เช่น บ้านสีฟ้า ตรงข้ามวัด" autocomplete="off">
          <datalist id="taskLandmarkList">${landmarkOptions.map(v=>`<option value="${escapeAttr(v)}">`).join('')}</datalist>

        <label>ความเร่งรีบ</label>
        <button type="button" id="taskUrgencyBtn" class="btn ghost" style="width:100%;">⚙️ ${TASK_URGENCY_FORM_LABELS[initialUrgencyMode]}</button>

          <div class="btnrow" style="flex-direction:column;align-items:stretch;gap:6px;">
            <button type="button" class="btn ghost" data-pick-task-urgency="auto">🟢🟡🔴 อัตโนมัติ (ไล่สีตามเวลาที่รอ)</button>
            <button type="button" class="btn ghost" data-pick-task-urgency="green">🟢 เขียว (กำหนดเอง)</button>
            <button type="button" class="btn ghost" data-pick-task-urgency="yellow">🟡 เหลือง (กำหนดเอง)</button>
            <button type="button" class="btn ghost" data-pick-task-urgency="red">🔴 แดง (กำหนดเอง)</button>
            <button type="button" class="btn ghost" data-pick-task-urgency="paused">🔵 พักไว้ก่อน (รอ activate)</button>
          </div>
        </div>
      </div>
      <div class="field"><label>หมายเหตุ</label><input id="f_taskNote" placeholder="เช่น โทรก่อนไปส่ง" value="${editing? escapeAttr(editing.note||''):''}"></div>
      <div id="taskFormError" class="rem-meta" style="color:var(--red);display:none;">กรุณากรอกชื่อลูกค้าก่อนบันทึก</div>
      <div class="btnrow">
        <button type="submit" class="btn primary">${editing? 'บันทึกการแก้ไข':'เพิ่มเข้ารายการส่ง'}</button>
        ${editing? `<button type="button" class="btn danger" id="deleteTaskBtn">ลบงานนี้</button>` : ''}
        <button type="button" class="btn ghost" id="cancelModal">ยกเลิก</button>
      </div>
    </form>`;
  showModal(body);
  renderLineItemsBox('taskLine');
  renderOtherLineItemsBox('taskOtherLine');

  // button-only urgency picker — emoji only appear once the popover opens. Kept form-local (no
  // showModal/closeModal calls, which would wipe out the rest of this very form since the app
  // only supports one modal at a time).
  const urgencyBtn = document.getElementById('taskUrgencyBtn');
  const urgencyHiddenInput = document.getElementById('f_taskUrgencyMode');
  if(urgencyBtn){
    urgencyBtn.addEventListener('click', ()=>{
      let pop = document.getElementById('taskUrgencyPopover');
      if(pop){ pop.remove(); return; }
      pop = document.createElement('div');
      pop.id = 'taskUrgencyPopover';
      pop.style.cssText = 'margin-top:8px;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--paper);';
      pop.innerHTML = `
        <div class="rem-meta" style="margin-bottom:8px;">เลือกสีเองได้ตามใจ แต่ระบบยังนับเวลาที่รอต่อเนื่องอยู่เสมอ (โชว์ให้ดูใต้ชื่อ) — 🟢 ≤30 นาที · 🟡 30 นาที-2ชม.30นาที · 🔴 2ชม.30นาทีขึ้นไป คือเกณฑ์เริ่มต้นถ้าเลือก "อัตโนมัติ"</div>
        <div class="btnrow" style="flex-direction:column;align-items:stretch;gap:6px;">
          <button type="button" class="btn ghost" data-pick-task-urgency="auto">🟢🟡🔴 อัตโนมัติ (ไล่สีตามเวลาที่รอ)</button>
          <button type="button" class="btn ghost" data-pick-task-urgency="green">🟢 เขียว (กำหนดเอง)</button>
          <button type="button" class="btn ghost" data-pick-task-urgency="yellow">🟡 เหลือง (กำหนดเอง)</button>
          <button type="button" class="btn ghost" data-pick-task-urgency="red">🔴 แดง (กำหนดเอง)</button>
          <button type="button" class="btn ghost" data-pick-task-urgency="paused">🔵 พักไว้ก่อน (รอ activate)</button>
        </div>`;
      urgencyBtn.insertAdjacentElement('afterend', pop);
      pop.querySelectorAll('[data-pick-task-urgency]').forEach(b=>b.addEventListener('click', ()=>{
        const val = b.dataset.pickTaskUrgency;
        urgencyHiddenInput.value = val;
        urgencyBtn.textContent = `⚙️ ${TASK_URGENCY_FORM_LABELS[val]}`;
        pop.remove();
      }));
    });
  }

  const nameInput = document.getElementById('f_taskCustName');
  const suggestBox = document.getElementById('taskCustSuggestions');
  const newFieldsDiv = document.getElementById('newCustomerFields');
  const custInfoBlock = document.getElementById('existingCustInfoBlock');
  const custInfoContent = document.getElementById('existingCustInfoContent');
  const editLinkedCustBtn = document.getElementById('editLinkedCustBtn');
  if(editLinkedCustBtn){
    editLinkedCustBtn.addEventListener('click', ()=>{
      const cid = document.getElementById('f_taskCustomerId').value;
      if(cid){ closeModal(); openCustomerForm(cid); }
    });
  }
  function renderSuggestions(){
    const q = nameInput.value.trim().toLowerCase();
    if(!q){ suggestBox.innerHTML=''; return; }
    const matches = state.customers.filter(c=>c.name.toLowerCase().includes(q)).slice(0,6);
    suggestBox.innerHTML = matches.length? matches.map(c=>`<div class="card" style="padding:8px 12px;cursor:pointer;margin-bottom:4px;" data-pick-cust="${c.id}">👤 ${escapeHtml(c.name)}${c.phone? ' · '+escapeHtml(c.phone):''}</div>`).join('') : '<div class="rem-meta">ไม่พบในระบบ — จะเพิ่มเป็นลูกค้าใหม่ชื่อนี้</div>';
    suggestBox.querySelectorAll('[data-pick-cust]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const picked = state.customers.find(c=>c.id===el.dataset.pickCust);
        document.getElementById('f_taskCustomerId').value = el.dataset.pickCust;
        nameInput.value = picked.name;
        suggestBox.innerHTML = '';
        newFieldsDiv.style.display = 'none';
        custInfoContent.innerHTML = taskCustInfoBlockHtml(picked);
        custInfoBlock.style.display = '';
      });
    });
  }
  nameInput.addEventListener('input', ()=>{
    document.getElementById('f_taskCustomerId').value = '';
    newFieldsDiv.style.display = '';
    custInfoBlock.style.display = 'none';
    renderSuggestions();
  });

  if(editing){
    document.getElementById('deleteTaskBtn').addEventListener('click', ()=>{
      if(confirm('ลบงานนี้ใช่หรือไม่?')){
        state.tasks = state.tasks.filter(t=>t.id!==editId);
        persistTasks(); closeModal(); render();
      }
    });
  }

  document.getElementById('taskForm').addEventListener('submit', e=>{
    e.preventDefault();
    const typedName = document.getElementById('f_taskCustName').value.trim();
    if(!typedName){
      document.getElementById('taskFormError').style.display = 'block';
      document.getElementById('f_taskCustName').focus();
      return;
    }
    let customerId = document.getElementById('f_taskCustomerId').value || null;
    // fallback: if they typed a full name matching an existing customer exactly but never clicked the suggestion, link it anyway instead of creating a duplicate
    if(!customerId){
      const exactMatch = state.customers.find(c=>c.name.trim().toLowerCase()===typedName.toLowerCase());
      if(exactMatch) customerId = exactMatch.id;
    }
    const data = {
      customerId,
      customName: customerId? null : typedName,
      phone: customerId? '' : document.getElementById('f_taskPhone').value.trim(),
      address: customerId? '' : document.getElementById('f_taskAddress').value.trim(),
      soi: customerId? '' : stripSoiChars(document.getElementById('f_taskSoi').value),
      moo: customerId? '' : stripToDigits(document.getElementById('f_taskMoo').value),
      landmark: customerId? '' : document.getElementById('f_taskLandmark').value.trim(),
      urgencyMode: document.getElementById('f_taskUrgencyMode').value,
      gasBreakdown: (window._lineBuilders['taskLine']||[]).slice(),
      otherItems: (window._otherLineBuilders['taskOtherLine']||[]).slice(),
      note: document.getElementById('f_taskNote').value.trim()
    };
    if(editing){ Object.assign(editing, data); }
    else { state.tasks.push({ id: uid(), createdAt: todayISO(), timerStartAt: Date.now(), addedAt: Date.now(), ...data }); }
    persistTasks();
    closeModal();
    render();
  });
}

function openTaskCompleteForm(taskId){
  const t = state.tasks.find(x=>x.id===taskId);
  if(!t) return;
  const cust = t.customerId? state.customers.find(c=>c.id===t.customerId) : null;

  const body = `

      <div class="field"><label>ถังที่ส่งจริง</label>${lineItemBuilderHtml('taskCompleteLine', breakdownToLineItems(t.gasBreakdown))}</div>
