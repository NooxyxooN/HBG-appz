<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCGbRb6h1lGf7JpqLoVT-giA0L1xydeC5A",
    authDomain: "hbgas-3758e.firebaseapp.com",
    projectId: "hbgas-3758e",
    storageBucket: "hbgas-3758e.firebasestorage.app",
    messagingSenderId: "113248645317",
    appId: "1:113248645317:web:0223507d7e6428d72c00ac",
    measurementId: "G-CWB6BPZ19M"
  };

  const COLLECTION = 'gasShopData';
  let app, db, fbError = null;
  try{
    app = initializeApp(firebaseConfig);
    db = getFirestore(app);
  }catch(e){
    fbError = e;
    console.error('Firebase init failed', e);
  }

  window.fbGetOnce = async function(key){
    if(fbError) throw fbError;
    const snap = await getDoc(doc(db, COLLECTION, key));
    return snap.exists() ? snap.data().items : null;
  };
  window.fbSet = async function(key, items){
    if(fbError) throw fbError;
    await setDoc(doc(db, COLLECTION, key), { items, updatedAt: Date.now() });
  };
  window.fbListen = function(key, cb){
    if(fbError) return;
    return onSnapshot(doc(db, COLLECTION, key), snap=>{
      if(snap.exists()) cb(snap.data().items);
    }, err=>{
      console.error('fbListen error', key, err);
      if(window.showSaveError) window.showSaveError('เชื่อมต่อฐานข้อมูลแบบเรียลไทม์ไม่สำเร็จ: ' + err.message);
    });
  };
  // atomically adjusts ONE item inside a collection document (e.g. one customer's debt/gas
  // cylinders) against whatever is currently on the server, instead of the caller's local (possibly
  // stale) cached copy of the whole array — this is what prevents two devices editing around the
  // same time from silently discarding each other's change (last write wins on the whole doc otherwise)
  window.fbAdjustItem = async function(key, itemId, mutatorFn){
    if(fbError) throw fbError;
    const ref = doc(db, COLLECTION, key);
    return runTransaction(db, async (tx)=>{
      const snap = await tx.get(ref);
      const items = snap.exists() ? (snap.data().items || []) : [];
      const idx = items.findIndex(x=>x.id===itemId);
      if(idx===-1) throw new Error('ไม่พบรายการนี้ในฐานข้อมูล (อาจถูกลบไปแล้วจากอีกเครื่อง)');
      const updated = mutatorFn({ ...items[idx] });
      items[idx] = updated;
      tx.set(ref, { items, updatedAt: Date.now() });
      return updated;
    });
  };

  window._fbReadyResolve();
</script>

<script>
/* ---------------- storage ---------------- */
function fbReadyOrTimeout(){
  if(!window._fbReadyRaced){
    window._fbReadyRaced = Promise.race([
      window.fbReady,
      new Promise((_,rej)=> setTimeout(()=> rej(new Error('เชื่อมต่อฐานข้อมูล Firebase ไม่สำเร็จ (หมดเวลารอ) ลองรีเฟรชหน้าใหม่')), 8000))
    ]);
  }
  return window._fbReadyRaced;
}
async function loadData(key, fallback){
  try{
    await fbReadyOrTimeout();
    const items = await window.fbGetOnce(key);
    return (items !== null && items !== undefined) ? items : fallback;
  }
  catch(e){
    console.error('load failed', key, e);
    showSaveError('โหลดข้อมูลไม่สำเร็จ (' + key + '): ' + (e && e.message ? e.message : String(e)));
    return fallback;
  }
}
async function saveData(key, value){
  try{
    await fbReadyOrTimeout();
    await window.fbSet(key, value);
    hideSaveError();
  }
  catch(e){
    console.error('storage save failed', key, e);
    showSaveError('บันทึกไม่สำเร็จ: ' + (e && e.message ? e.message : String(e)));
  }
}
// safe starting point for a customer mutator function passed to adjustCustomerRemote — deep-clones
// the gasCylindersBreakdown array so in-place helpers like addToCustomerGasBreakdown never risk
// touching anything shared with other in-flight reads
function cloneCustomerForEdit(fresh){
  return { ...fresh, gasCylindersBreakdown: Array.isArray(fresh.gasCylindersBreakdown) ? fresh.gasCylindersBreakdown.map(x=>({...x})) : [] };
}
// applies a debt/gas-cylinder change to ONE customer against the latest server data via a Firestore
// transaction (see window.fbAdjustItem) instead of read-modify-write on the whole locally-cached
// customers array — this is what actually prevents two devices completing deliveries around the
// same time from silently clobbering each other's debt update ("new debt didn't add to old debt")
async function adjustCustomerRemote(customerId, mutatorFn){
  try{
    await fbReadyOrTimeout();
    const updated = await window.fbAdjustItem('customers', customerId, mutatorFn);
    const local = state.customers.find(c=>c.id===customerId);
    if(local && updated) Object.assign(local, updated);
    hideSaveError();
    return updated;
  }catch(e){
    console.error('adjustCustomerRemote failed', customerId, e);
    showSaveError('ปรับยอดลูกค้าไม่สำเร็จ: ' + (e && e.message ? e.message : String(e)));
    return null;
  }
}
function showSaveError(msg){
  let el = document.getElementById('saveErrorBanner');
  if(!el){
    el = document.createElement('div');
    el.id = 'saveErrorBanner';
    el.style.cssText = 'position:fixed;top:56px;left:8px;right:8px;z-index:40;background:#B23A2E;color:#fff;padding:10px 14px;border-radius:8px;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.25);';
    document.body.appendChild(el);
  }
  el.textContent = '⚠️ ' + msg;
}
function hideSaveError(){
  const el = document.getElementById('saveErrorBanner');
  if(el) el.remove();
}

let state = { customers: [], sales: [], reminders: [], tasks: [], purchases: [], transactions: [], gasPrices: {4:0,7:0,15:0,48:0}, pickupDiscount: {4:10,7:10,15:20,48:20}, inventory: emptyInventory(), dailySummaries: {}, otherProducts: [], truckStock: [], inventoryAdjustments: [], shopCoord: null, loaded:false };

  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'2-digit'});

function mapsUrl(addr){
  if(!addr) return null;
  if(/^https?:\/\//i.test(addr)) return addr;
  return 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(addr);
}
function embedMapUrl(addr){
  if(!addr) return null;
  if(/^https?:\/\//i.test(addr)) return null; // can't reliably embed an arbitrary pasted link, only plain addresses/coords
  return 'https://maps.google.com/maps?q=' + encodeURIComponent(addr) + '&output=embed';
}
function extractLatLngFromMapsUrl(url){
  if(!url) return null;
  let m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m) return `${m[1]},${m[2]}`;
  m = url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m) return `${m[1]},${m[2]}`;
  const d3 = url.match(/!3d(-?\d+\.\d+)/);
  const d4 = url.match(/!4d(-?\d+\.\d+)/);
  if(d3 && d4) return `${d3[1]},${d4[1]}`;
  return null;
}
// returns {lat,lng} if this address is a pasted Google Maps link with an extractable coordinate,
// or if it's literally just "lat,lng" text — otherwise null (plain text addresses like "หลังวัด...
// ซอย 3" have no coordinate, so those stops just won't be plottable on the route sketch)
function coordFromAddress(addr){
  if(!addr) return null;
  const direct = addr.trim().match(/^(-?\d+\.\d+),\s*(-?\d+\.\d+)$/);
  if(direct) return { lat: Number(direct[1]), lng: Number(direct[2]) };
  const extracted = extractLatLngFromMapsUrl(addr);
  if(extracted){
    const [lat, lng] = extracted.split(',').map(Number);
    return { lat, lng };
  }
  return null;
}
// haversine straight-line distance in km — an estimate, not a driving distance, but enough to
// answer "roughly how far, and which direction" without needing turn-by-turn routing/map tiles
function haversineKm(a, b){
  const R = 6371;
  const dLat = (b.lat-a.lat) * Math.PI/180;
  const dLng = (b.lng-a.lng) * Math.PI/180;
  const lat1 = a.lat * Math.PI/180, lat2 = b.lat * Math.PI/180;
  const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1-h));
}
// compass bearing in degrees (0=north, 90=east, ...) from point a to point b
function bearingDeg(a, b){
  const lat1 = a.lat * Math.PI/180, lat2 = b.lat * Math.PI/180;
  const dLng = (b.lng-a.lng) * Math.PI/180;
  const y = Math.sin(dLng) * Math.cos(lat2);
  const x = Math.cos(lat1)*Math.sin(lat2) - Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLng);
  return (Math.atan2(y, x) * 180/Math.PI + 360) % 360;
}
const COMPASS_SECTORS = ['เหนือ','ตะวันออกเฉียงเหนือ','ตะวันออก','ตะวันออกเฉียงใต้','ใต้','ตะวันตกเฉียงใต้','ตะวันตก','ตะวันตกเฉียงเหนือ'];
function bearingToSector(deg){
  return COMPASS_SECTORS[Math.round(deg/45) % 8];
}

// keep a customer's detailed borrowed-cylinder breakdown (by size+brand) in sync with the flat gasCylinders total
function addToCustomerGasBreakdown(c, items){
  if(!items || !items.length) return;
  if(!Array.isArray(c.gasCylindersBreakdown)) c.gasCylindersBreakdown = [];
  items.forEach(item=>{
    const qty = Number(item.qty||0);
    if(qty<=0) return;
    const existing = c.gasCylindersBreakdown.find(l=>l.size===item.size && l.brand===item.brand);
    if(existing) existing.qty += qty; else c.gasCylindersBreakdown.push({ size:item.size, brand:item.brand, qty });
  });
  c.gasCylinders = sumGasBreakdown(c.gasCylindersBreakdown);
}
function removeFromCustomerGasBreakdown(c, items){
  if(!items || !items.length) return;
  if(!Array.isArray(c.gasCylindersBreakdown)) c.gasCylindersBreakdown = [];
  items.forEach(item=>{
    const qty = Number(item.qty||0);
    if(qty<=0) return;
    const existing = c.gasCylindersBreakdown.find(l=>l.size===item.size && l.brand===item.brand);
    if(existing) existing.qty = Math.max(0, existing.qty - qty);
  });
  c.gasCylindersBreakdown = c.gasCylindersBreakdown.filter(l=>l.qty>0);
  c.gasCylinders = Math.max(0, sumGasBreakdown(c.gasCylindersBreakdown));
}

function getCustomerStats(customerId){
  const orders = state.sales.filter(s=>s.customerId===customerId).sort((a,b)=>b.date.localeCompare(a.date));
  const totalAmount = orders.reduce((a,b)=>a+Number(b.amount||0),0);
  const totalGas = orders.reduce((a,b)=>a+Number(b.gasQty||0),0);
  return { orders, totalAmount, totalGas, count: orders.length, lastDate: orders.length? orders[0].date : null };
}

// estimates a customer's delivery cycle (average days between orders) from real delivery history,
// so we can guess roughly when they'll need gas again without waiting for them to call in. Needs
// at least 3 actual deliveries (2 gaps) to say anything — with a brand-new install this will just
// return null for everyone until a few months of orders build up, which is expected and fine.
// Only counts sales with gasQty>0 (an actual delivery), so payment/debt-clearing entries (which
// also live in state.sales but carry no gas) don't get treated as delivery events.
function getCustomerCycleInfo(customerId){
  const dates = [...new Set(
    state.sales.filter(s=>s.customerId===customerId && Number(s.gasQty||0)>0).map(s=>s.date)
  )].sort();
  if(dates.length < 3) return null;
  const gaps = [];
  for(let i=1;i<dates.length;i++){
    const days = Math.round((Date.parse(dates[i]) - Date.parse(dates[i-1])) / 86400000);
    if(days>0) gaps.push(days);
  }
  if(gaps.length < 2) return null;
  const avgDays = gaps.reduce((a,b)=>a+b,0) / gaps.length;
  const variance = gaps.reduce((a,g)=>a+Math.pow(g-avgDays,2),0) / gaps.length;
  const stdev = Math.sqrt(variance);
  const isRegular = stdev <= avgDays * 0.6; // loose sanity guard — skip customers who order too erratically to predict
  const lastDate = dates[dates.length-1];
  const nextExpectedMs = Date.parse(lastDate) + Math.round(avgDays)*86400000;
  const daysUntilNext = Math.round((nextExpectedMs - Date.now()) / 86400000);
  return {
    ordersCount: dates.length,
    avgDays: Math.round(avgDays),
    lastDate,
    nextExpectedDate: new Date(nextExpectedMs).toISOString().slice(0,10),
    daysUntilNext,
    isRegular
  };
}

/* ---------------- Customer tier — automatic (no manual assignment needed), based on recent spend
   + order frequency, per user's request "ยอดซื้อสะสม/ความถี่". Thresholds are starting defaults;
   adjust here if they don't match real customer behavior once there's more data to look at.
   'new'      -> 🆕  (fewer than 2 sales on record — not enough history to judge yet)
   'inactive' -> 👤 greyed out (used to order, but nothing in the last 90 days — same faded
                 grayscale/opacity treatment already used for empty tanks on ถังบนรถ, for visual
                 consistency across the app)
   'diamond'  -> 👑  (big spender in the last 6 months, OR orders very often)
   'regular'  -> 👤  (the same default icon as before — unchanged, no special treatment) ---------------- */
const CUSTOMER_TIER_INACTIVE_DAYS = 90;
const CUSTOMER_TIER_DIAMOND_SPEND_180D = 5000; // baht spent in the last ~6 months
const CUSTOMER_TIER_DIAMOND_MAX_AVG_DAYS = 20; // or orders on average at least this often
function getCustomerTier(customerId){
  const salesAll = state.sales.filter(s=>s.customerId===customerId);
  if(salesAll.length < 2) return 'new';
  const lastDate = salesAll.reduce((max,s)=> (s.date||'') > max? s.date : max, salesAll[0].date||'');
  const daysSinceLast = Math.round((Date.now() - Date.parse(lastDate)) / 86400000);
  if(!isNaN(daysSinceLast) && daysSinceLast > CUSTOMER_TIER_INACTIVE_DAYS) return 'inactive';
  const cutoffMs = Date.now() - 180*86400000;
  const recentSpend = salesAll.filter(s=>Date.parse(s.date)>=cutoffMs).reduce((a,s)=>a+Number(s.amount||0),0);
  const cycle = getCustomerCycleInfo(customerId);
  if(recentSpend >= CUSTOMER_TIER_DIAMOND_SPEND_180D || (cycle && cycle.avgDays<=CUSTOMER_TIER_DIAMOND_MAX_AVG_DAYS)) return 'diamond';
  return 'regular';
}
// line-art outline person (white body, grey stroke) for the "inactive" tier — deliberately NOT a
// filled emoji like the other tiers, so it reads as "faded/hollow" at a glance rather than just a
// dimmed version of the same icon
const INACTIVE_TIER_ICON_SVG = `<svg width="15" height="15" viewBox="0 0 24 24" fill="#fff" stroke="#9a9a9a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;"><circle cx="12" cy="8" r="4"></circle><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"></path></svg>`;
function customerTierIconHtml(customerId){
  const tier = getCustomerTier(customerId);
  if(tier==='new') return '🆕';
  if(tier==='diamond') return '👑';
  if(tier==='inactive') return `<span title="ลูกค้าเก่าที่หายไปนาน (ไม่ได้สั่งเกิน 90 วัน)">${INACTIVE_TIER_ICON_SVG}</span>`;

}

  return { lastDate, daysSinceLast };
}

function computeDailySummary(dateStr){
  const salesToday = state.sales.filter(s=>s.date===dateStr);
  // only cash actually collected counts as income — unpaid (ค้างจ่าย) sales get counted later,
  // on the day the debt is actually paid off (openPaymentPrompt records that as its own sale entry)
  const saleAmount = salesToday.filter(s=>!s.unpaid).reduce((a,s)=>a+Number(s.amount||0),0);
  const newDebtToday = salesToday.filter(s=>s.unpaid).reduce((a,s)=>a+Number(s.amount||0),0);
  const purchaseExpense = state.purchases.filter(p=>p.date===dateStr).reduce((a,p)=>a+Number(p.billAmount||0),0);
  const txIncome = state.transactions.filter(t=>t.type==='income' && t.date===dateStr).reduce((a,t)=>a+Number(t.amount||0),0);
  const txExpense = state.transactions.filter(t=>t.type==='expense' && t.date===dateStr).reduce((a,t)=>a+Number(t.amount||0),0);
  const totalIncome = saleAmount + txIncome;
  const totalExpense = purchaseExpense + txExpense;
  let fullTotal = 0, emptyTotal = 0;
  GAS_SIZES.forEach(sz=>{
    const reg = (state.inventory[sz] && state.inventory[sz].regular) || {full:0,empty:0};
    const ptt = (state.inventory[sz] && state.inventory[sz].ptt) || {full:0,empty:0};
    fullTotal += Number(reg.full||0) + Number(ptt.full||0);
    emptyTotal += Number(reg.empty||0) + Number(ptt.empty||0);
  });
  const borrowedTotal = state.customers.reduce((a,c)=>a+Number(c.gasCylinders||0),0);
  const newCustomersToday = state.customers.filter(c=>(c.createdAt||'').slice(0,10)===dateStr).length;
  return {
    date: dateStr,
    income: totalIncome,
    expense: totalExpense,
    profit: totalIncome - totalExpense,
    newDebtToday,
    fullTotal,
    emptyTotal,
    borrowedTotal,
    newCustomersToday,
    salesCountToday: salesToday.length,
    savedAt: new Date().toISOString()
  };
}
function trySaveDailySummaryIfDue(){
  // recomputes and overwrites today's snapshot every time this runs (page load + the 60s interval),
  // starting from 00:00 — i.e. continuously all day, not just after a fixed evening cutoff. This
  // naturally stops updating once the date rolls over past midnight, since dateStr becomes
  // tomorrow's date and yesterday's snapshot is left as its last save (the "freeze" happens on its
  // own from the date change, not from a time-of-day gate).
  const dateStr = todayISO();
  state.dailySummaries[dateStr] = computeDailySummary(dateStr);
  persistDailySummaries();
}
// lets the shop owner force a fresh recompute for any day (today or history) straight from current
// sales/purchases/transactions data — the fix for a stale/wrong snapshot that already got saved.
// Does NOT navigate anywhere itself — callers re-render whichever daily-summary view is currently open.
function recomputeDailySummary(dateStr){
  state.dailySummaries[dateStr] = computeDailySummary(dateStr);
  persistDailySummaries();
}
// live breakdown of tanks sold on a given date, by size/brand — computed on demand from state.sales
// (not frozen into the snapshot) so it always reflects any later edits/deletions to that day's sales
function dailySummaryTanksSoldBreakdown(dateStr){
  const totals = {};
  state.sales.filter(s=>s.date===dateStr).forEach(s=>{
    breakdownToLineItems(s.gasBreakdown||[]).forEach(item=>{
      if(!item.qty) return;
      const key = item.size+'_'+item.brand;
      if(!totals[key]) totals[key] = { size:item.size, brand:item.brand, qty:0 };
      totals[key].qty += item.qty;
    });
  });
  return Object.values(totals).filter(i=>i.qty>0);
}
function dailySummaryTanksSoldTotal(dateStr){
  return dailySummaryTanksSoldBreakdown(dateStr).reduce((a,i)=>a+i.qty,0);
}

function ensureInventorySlot(sz, brand){
  if(!state.inventory[sz]) state.inventory[sz] = { regular:{full:0,empty:0}, ptt:{full:0,empty:0} };
  if(!state.inventory[sz][brand]) state.inventory[sz][brand] = { full:0, empty:0 };
  return state.inventory[sz][brand];
}
// call when full cylinders arrive at the shop (e.g. restock from supplier)
function inventoryAddFull(sz, brand, qty){
  if(qty<=0) return;
  const slot = ensureInventorySlot(sz, brand);
  slot.full = Math.max(0, Number(slot.full||0) + qty);
}
// call when a full cylinder leaves the shop (delivered to a customer)
function inventoryRemoveFull(sz, brand, qty){
  if(qty<=0) return;
  const slot = ensureInventorySlot(sz, brand);
  slot.full = Math.max(0, Number(slot.full||0) - qty);
}
// call when an empty cylinder comes back to the shop (customer exchange or return)
function inventoryAddEmpty(sz, brand, qty){
  if(qty<=0) return;
  const slot = ensureInventorySlot(sz, brand);
  slot.empty = Math.max(0, Number(slot.empty||0) + qty);
}
// call when an empty cylinder leaves the shop (handed to supplier in a full-for-empty exchange)
function inventoryRemoveEmpty(sz, brand, qty){
  if(qty<=0) return;
  const slot = ensureInventorySlot(sz, brand);
  slot.empty = Math.max(0, Number(slot.empty||0) - qty);
}
// apply the effect of a delivery breakdown (e.g. from a sale or completed task) on shop stock
function applyDeliveryToInventory(breakdown, cylinderPending){
  if(!breakdown) return;
  breakdownToLineItems(breakdown).forEach(item=>{
    inventoryRemoveFull(item.size, item.brand, item.qty);
    if(!cylinderPending) inventoryAddEmpty(item.size, item.brand, item.qty); // immediate exchange: empty comes back right away
    // if cylinderPending, the empty stays out with the customer (tracked via customer.gasCylinders) until returned
  });
  persistInventory();
}
// apply the effect of a restock purchase on shop stock (supplier delivers full cylinders).
// most suppliers do a straight full-for-empty swap on delivery, so by default we also draw down
// the matching empty-cylinder stock per brand/size — pass exchangeEmpty:false to skip this
// (e.g. a one-off purchase of extra tanks with no empties handed back)
function applyPurchaseToInventory(breakdown, exchangeEmpty){
  if(!breakdown) return;
  breakdownToLineItems(breakdown).forEach(item=>{
    inventoryAddFull(item.size, item.brand, item.qty);
    if(exchangeEmpty) inventoryRemoveEmpty(item.size, item.brand, item.qty);
  });
  persistInventory();
}

function getBreakdownQty(entry){

function readGasSizeInputs(prefix, includeBrand){

function sumGasBreakdown(b){
  if(!b) return 0;

function computeSuggestedPrice(b, selfPickup){

    return b.reduce((a,item)=>{
      const unitPrice = Number(state.gasPrices[item.size]||0) - (selfPickup? Number(state.pickupDiscount[item.size]||0) : 0);
      return a + Number(item.qty||0) * Math.max(0, unitPrice);
    }, 0);
  }
  return GAS_SIZES.reduce((a,sz)=>{
    const unitPrice = Number(state.gasPrices[sz]||0) - (selfPickup? Number(state.pickupDiscount[sz]||0) : 0);
    return a + getBreakdownQty(b[sz]) * Math.max(0, unitPrice);
  }, 0);
}
function gasBreakdownSummary(b){

// normalize any breakdown (array or size-keyed object) into a flat array of {size,brand,qty}
function breakdownToLineItems(b){

/* Urgency system: auto-escalates by elapsed time since timerStartAt, unless manually pinned */
const URGENCY_AUTO_ICONS = { green:'🟢', yellow:'🟡', red:'🔴' };
// used by the compact circle+popover urgency picker in the Add/Edit Task form
const TASK_URGENCY_FORM_ICONS = { auto:'🟢🟡🔴', green:'🟢', yellow:'🟡', red:'🔴', paused:'🔵' };
const TASK_URGENCY_FORM_LABELS = { auto:'อัตโนมัติ (ไล่สีตามเวลาที่รอ)', green:'เขียว (กำหนดเอง)', yellow:'เหลือง (กำหนดเอง)', red:'แดง (กำหนดเอง)', paused:'พักไว้ก่อน (รอ activate)' };
const URGENCY_AUTO_LABELS = { green:'ปกติ (≤30 นาที)', yellow:'รอมานาน (30 นาที - 2ชม.30นาที)', red:'ค้างนาน (2ชม.30นาทีขึ้นไป)' };
function getTaskUrgencyState(t){
  if(t.urgencyMode === 'paused') return 'paused';
  if(t.urgencyMode === 'green' || t.urgencyMode === 'yellow' || t.urgencyMode === 'red') return t.urgencyMode;
  const startedAt = t.timerStartAt || Date.parse(t.createdAt) || Date.now();
  const elapsedMin = (Date.now() - startedAt) / 60000;
  if(elapsedMin >= 150) return 'red';
  if(elapsedMin > 30) return 'yellow';
  return 'green';
}
function getTaskUrgencyIcon(state_){ return state_==='paused' ? '🔵' : URGENCY_AUTO_ICONS[state_]; }
function getTaskUrgencyLabel(state_){ return state_==='paused' ? 'พักไว้ (รอ activate)' : URGENCY_AUTO_LABELS[state_]; }
// quick popup to change a task's status color by tapping its emoji directly, without opening
// the full edit form
function openTaskUrgencyPicker(taskId){
  const t = state.tasks.find(x=>x.id===taskId);
  if(!t) return;
  const current = t.urgencyMode || 'auto';
  const options = [
    ['auto','🟢🟡🔴 อัตโนมัติ (ไล่สีตามเวลาที่รอ)'],
    ['green','🟢 เขียว (กำหนดเอง)'],
    ['yellow','🟡 เหลือง (กำหนดเอง)'],
    ['red','🔴 แดง (กำหนดเอง)'],
    ['paused','🔵 พักไว้ก่อน (รอ activate)']
  ];
  const body = `
    <h3>เปลี่ยนสถานะ</h3>
    <div class="btnrow" style="flex-direction:column;align-items:stretch;gap:8px;">
      ${options.map(([k,l])=>`<button type="button" class="btn ${current===k?'primary':'ghost'}" data-set-urgency-val="${k}" style="text-align:left;">${l}</button>`).join('')}
    </div>
    <div class="btnrow" style="margin-top:14px;">
      <button type="button" class="btn ghost" id="cancelModal">ปิด</button>
    </div>
  `;
  showModal(body);
  document.querySelectorAll('[data-set-urgency-val]').forEach(b=>b.addEventListener('click', ()=>{
    const val = b.dataset.setUrgencyVal;
    const wasPaused = t.urgencyMode === 'paused';
    t.urgencyMode = val;
    if(val==='auto' && wasPaused) t.timerStartAt = Date.now(); // matches "Activate": restart the clock
    persistTasks();
    closeModal();
    render();
  }));
}
function formatElapsed(startMs){
  const min = Math.floor((Date.now() - startMs) / 60000);
  if(min < 1) return 'เมื่อสักครู่';
  if(min < 60) return `${min} นาทีที่แล้ว`;
  const h = Math.floor(min/60), m = min%60;
  return m>0 ? `${h} ชม. ${m} นาทีที่แล้ว` : `${h} ชม.ที่แล้ว`;
}

/* ---------------- real phone notifications for new งานส่ง (while the app is open/backgrounded) ----
   This is a "local" notification (Notification API / service worker showNotification), not a true
   push message — it only fires while this browser tab or installed PWA is running somewhere in the
   background. Getting notifications even when the app is fully closed would need a server component
   (Firebase Cloud Messaging + a Cloud Function watching Firestore) which is a much bigger project. */
function getNotifiedTaskIds(){
  // returns null specifically when this device has never initialized the feature yet, so the
  // caller can tell "never run before" apart from "ran before, currently zero new tasks"
  try{
    const raw = localStorage.getItem('notifiedTaskIds');
    if(raw===null) return null;
    return new Set(JSON.parse(raw));
  }catch(e){ return null; }
}
function saveNotifiedTaskIds(idsSet){
  try{ localStorage.setItem('notifiedTaskIds', JSON.stringify([...idsSet])); }
  catch(e){ /* localStorage unavailable — notifications just won't dedupe across reloads */ }
}
function showLocalNotification(title, body){
  if('serviceWorker' in navigator && navigator.serviceWorker.controller){
    navigator.serviceWorker.ready.then(reg=>{
      reg.showNotification(title, { body, icon:'icon-192.png', badge:'icon-192.png', tag:'hbg-new-task' });
    }).catch(()=>{ try{ new Notification(title, { body, icon:'icon-192.png' }); }catch(e){} });
  } else {
    try{ new Notification(title, { body, icon:'icon-192.png' }); }catch(e){ /* not supported here */ }
  }
}
function notifyNewTasks(){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  let notified = getNotifiedTaskIds();
  if(notified===null){
    // first time this feature has ever run on this device — baseline to whatever tasks already
    // exist right now instead of firing a notification flood for old tasks all at once
    saveNotifiedTaskIds(new Set(state.tasks.map(t=>t.id)));
    return;
  }
  const newTasks = state.tasks.filter(t=>!notified.has(t.id));
  if(!newTasks.length) return;
  newTasks.forEach(t=>notified.add(t.id));
  saveNotifiedTaskIds(notified);
  if(newTasks.length===1){
    const t = newTasks[0];
    const cust = t.customerId? state.customers.find(c=>c.id===t.customerId) : null;
    const name = cust? cust.name : (t.customName||'ไม่ระบุชื่อ');
    const items = (t.gasBreakdown && sumGasBreakdown(t.gasBreakdown)>0) ? compactGasBreakdown(t.gasBreakdown) : '';
    showLocalNotification('🆕 งานส่งใหม่', `${name}${items? ' | '+items : ''}`);
  } else {
    showLocalNotification('🆕 งานส่งใหม่', `มีงานส่งใหม่เพิ่ม ${newTasks.length} รายการ`);
  }
}
function requestTaskNotificationPermission(){
  if(!('Notification' in window)) return;
  Notification.requestPermission().then(()=>{
    notifyNewTasks(); // establishes the "already seen" baseline right away so granting permission
                       // doesn't immediately fire notifications for tasks that already existed
    render();
  });
}

/* ---------------- PURCHASES (incoming stock from suppliers) ---------------- */
function getLatestCostPerUnit(){
  const result = {};
  const sorted = [...state.purchases].sort((a,b)=>b.date.localeCompare(a.date));
  GAS_SIZES.forEach(sz=>{
    const found = sorted.find(p=> p.costPerUnit && Number(p.costPerUnit[sz]||0)>0);
    result[sz] = found ? Number(found.costPerUnit[sz]) : null;
  });
  return result;
}

// weighted-average all-in cost per cylinder (purchase cost + driver tip), weighted by quantity across all recorded purchases
function getWeightedAvgCostPerUnit(){
  const result = {};
  GAS_SIZES.forEach(sz=>{
    let totalQty = 0, totalCost = 0;
    state.purchases.forEach(p=>{
      const qty = getBreakdownQty(p.breakdown && p.breakdown[sz]);
      const cost = Number((p.costPerUnit && p.costPerUnit[sz]) || 0);
      if(qty>0 && cost>0){
        const tip = p.tipPaid ? Number(p.tipPerCylinder||0) : 0;
        totalQty += qty;
        totalCost += qty * (cost + tip);
      }
    });
    result[sz] = totalQty>0 ? (totalCost/totalQty) : null;
  });
  return result;
}

function getSupplierNames(){
  const names = new Set();
  state.purchases.forEach(p=>{ if(p.supplierName) names.add(p.supplierName); });
  return [...names].sort((a,b)=>a.localeCompare(b,'th'));
}

// collects every distinct ซอย/หมู่/จุดสังเกต value ever typed (across both customers and walk-in
// tasks) so the input fields can offer them back as a native <datalist> dropdown — same pattern as
// the supplier-name autocomplete above — instead of making you retype the same soi/moo/landmark
// for every new person who happens to live in the same area
function stripToDigits(v){ return (v||'').toString().replace(/[^0-9]/g,''); }
// ซอยบางที่เขียนแบบ "3/3", "1/3" (ซอยย่อย) — เลยอนุญาตให้มี "/" ปนกับตัวเลขได้ ต่างจากหมู่ที่เป็นตัวเลขล้วน
function stripSoiChars(v){ return (v||'').toString().replace(/[^0-9/]/g,''); }

function getKnownFieldValues(field){
  const values = new Set();
  state.customers.forEach(c=>{ if(c[field]) values.add(c[field]); });
  state.tasks.forEach(t=>{ if(t[field]) values.add(t[field]); });
  return [...values].sort((a,b)=>a.localeCompare(b,'th'));
}

function getLatestCostForSupplier(supplierName){
  const match = [...state.purchases]
    .filter(p=> p.supplierName.trim().toLowerCase() === supplierName.trim().toLowerCase() && p.costPerUnit)
    .sort((a,b)=>b.date.localeCompare(a.date))[0];
  return match ? { cost: match.costPerUnit, tipPaid: match.tipPaid||false, tipPerCylinder: match.tipPerCylinder||0 } : null;
}

function getPurchasePaymentStatus(p){
  let cash = Number(p.paidCash||0);
  let transfer = Number(p.paidTransfer||0);
  // backward compatibility with older records that only had paid + paymentMethod
  if(cash===0 && transfer===0 && p.paid){
    if(p.paymentMethod==='transfer') transfer = Number(p.billAmount||0);
    else cash = Number(p.billAmount||0);
  }
  const billAmount = Number(p.billAmount||0);
  const paidTotal = cash + transfer;
  const remaining = Math.max(0, billAmount - paidTotal);
  // a bill of ฿0 means the amount hasn't been filled in yet, not that it's "paid" — don't treat it as settled
  const isPaid = billAmount > 0 && remaining <= 0;
  const noBillAmount = billAmount <= 0;
  return { cash, transfer, paidTotal, remaining, isPaid, noBillAmount, billAmount };
}

function renderPurchaseRow(p, s, isArchived){

      <div class="rem-meta" style="margin-top:4px;">${gasBreakdownSummary(p.breakdown) || 'ไม่ระบุจำนวนถัง'} · บิล ฿${fmtMoney(p.billAmount||0)}</div>
      ${p.costPerUnit && GAS_SIZES.some(sz=>Number(p.costPerUnit[sz]||0)>0) ? `<div class="rem-meta">ทุน/ถัง: ${GAS_SIZES.filter(sz=>Number(p.costPerUnit[sz]||0)>0).map(sz=>`${sz}kg ฿${fmtMoney(p.costPerUnit[sz])}`).join(', ')}</div>` : ''}
      ${p.tipPaid && Number(p.tipPerCylinder||0)>0 ? `<div class="rem-meta">ทิปเด็กส่ง: ฿${fmtMoney(p.tipPerCylinder)}/ถัง × ${sumGasBreakdown(p.breakdown)} ถัง = ฿${fmtMoney(p.tipPerCylinder*sumGasBreakdown(p.breakdown))}</div>` : ''}
      <div class="btnrow" style="margin-top:8px;">
        ${s.noBillAmount? `<span class="tag" style="background:#eee;">⚪ ยังไม่ระบุยอดบิล</span>` : `<span class="tag ${s.isPaid?'paid':'debt'}" ${!s.isPaid && !isArchived? `data-quick-pay-purchase="${p.id}" style="cursor:pointer;"`:''}>${s.isPaid? '✓ จ่ายครบแล้ว' : '❗ ค้าง ฿'+fmtMoney(s.remaining)}</span>`}
        ${s.cash>0? `<span class="tag">💵 สด ฿${fmtMoney(s.cash)}</span>`:''}
        ${s.transfer>0? `<span class="tag">🏦 โอน ฿${fmtMoney(s.transfer)}</span>`:''}
      </div>
      ${p.note? `<div class="rem-meta" style="margin-top:6px;">📝 ${escapeHtml(p.note)}</div>` : ''}
      <div class="btnrow" style="margin-top:8px;">
        ${isArchived? `
          <button class="btn ghost small" data-restore-purchase="${p.id}">↩️ นำกลับมาโชว์</button>
        ` : `
          <button class="btn ghost small" data-edit-purchase="${p.id}">แก้ไข</button>
          ${s.isPaid? `<button class="btn primary small" style="background:var(--green);" data-clear-purchase="${p.id}">✅ เคลียร์ว่าจ่ายหมดแล้ว</button>` : ''}
        `}
        <button class="btn danger small" data-del-purchase="${p.id}">ลบถาวร</button>
      </div>
    </div>`;
}

function renderPurchases(){
  const active = state.purchases.filter(p=>!p.archived);
  const archived = state.purchases.filter(p=>p.archived);
  const statuses = active.map(p=>({ p, s: getPurchasePaymentStatus(p) }));
  const unpaid = statuses.filter(x=>!x.s.isPaid);
  const unpaidTotal = unpaid.reduce((a,x)=>a+x.s.remaining,0);
  const summary = active.length ? `
    <div class="debtor-total">
      <span>บิลที่ยังค้างชำระ (${unpaid.length} ใบ)</span>
      <span class="amt">฿${fmtMoney(unpaidTotal)}</span>
    </div>` : '';

  const archiveToggle = archived.length ? `<div class="btnrow" style="margin-bottom:${purchasesArchiveOpen?'10px':'14px'};">
    <button class="btn ${purchasesArchiveOpen?'primary':'ghost'} small" id="togglePurchaseArchive">📦 รายการที่เคลียร์แล้ว (${archived.length}) ${purchasesArchiveOpen?'▲':'▼'}</button>
  </div>` : '';
  let archivePanel = '';
  if(purchasesArchiveOpen && archived.length){
    const sortedArchived = [...archived].sort((a,b)=>b.date.localeCompare(a.date));
    archivePanel = `<div class="rem-meta" style="margin-bottom:8px;">รายการเหล่านี้ยังนับรวมในยอดรายจ่ายหน้าแรกตามปกติ แค่ไม่โชว์ในลิสต์หลักด้านล่างเฉยๆ</div>` +
      sortedArchived.map(p=>renderPurchaseRow(p, getPurchasePaymentStatus(p), true)).join('');
  }

  if(!active.length) return archiveToggle + archivePanel + '<div class="empty">ยังไม่มีรายการรับถังจากซัพพลายเออร์ที่ต้องจัดการ<br>แตะปุ่ม + เพื่อเพิ่มรายการ</div>';

  const sortOptions = [['date','วันที่'],['amount','จำนวนเงิน'],['gas','จำนวนถัง']];
  const sortBar = `<div class="btnrow" style="margin-bottom:12px;">${sortOptions.map(([k,l])=>`<button class="btn ${purchasesSort===k?'primary':'ghost'} small" data-purchases-sort="${k}">เรียงตาม ${l}</button>`).join('')}</div>`;

  let sorted = [...statuses];
  if(purchasesSort==='amount') sorted.sort((a,b)=>Number(b.p.billAmount||0)-Number(a.p.billAmount||0));
  else if(purchasesSort==='gas') sorted.sort((a,b)=>sumGasBreakdown(b.p.breakdown)-sumGasBreakdown(a.p.breakdown));
  else sorted.sort((a,b)=>b.p.date.localeCompare(a.p.date));

  const rows = sorted.map(({p,s})=>renderPurchaseRow(p, s, false)).join('');
  return archiveToggle + archivePanel + summary + sortBar + rows;
}

        <div class="field"><label>🏦 จ่ายโอน (บาท)</label><input type="text" inputmode="decimal" min="0" step="0.01" id="f_paidTransfer" value="${existingStatus? existingStatus.transfer : 0}"></div>

    document.getElementById('tipAmountField').style.display = this.checked ? '' : 'none';
  });
  const supplierInput = document.getElementById('f_supplier');
  const supplierCostHint = document.getElementById('supplierCostHint');
  function tryAutoFillSupplierCost(){
    // don't override what's already being edited on an existing record
    if(editing) return;
    const name = supplierInput.value.trim();
    if(!name) { supplierCostHint.style.display = 'none'; return; }
    const remembered = getLatestCostForSupplier(name);
    if(remembered){
      GAS_SIZES.forEach(sz=>{
        const costEl = document.getElementById(`purchaseCost_${sz}`);
        if(costEl && Number(remembered.cost[sz]||0)>0) costEl.value = remembered.cost[sz];
      });
      if(remembered.tipPaid){
        document.getElementById('f_tipPaid').checked = true;
        document.getElementById('tipAmountField').style.display = '';
        document.getElementById('f_tipPerCylinder').value = remembered.tipPerCylinder;
      }
      supplierCostHint.style.display = 'block';
    } else {
      supplierCostHint.style.display = 'none';
    }
  }
  supplierInput.addEventListener('change', tryAutoFillSupplierCost);
  supplierInput.addEventListener('input', tryAutoFillSupplierCost);
  document.getElementById('calcBillFromCostBtn').addEventListener('click', ()=>{
    const qty = readGasSizeInputs('purchase');
    const costPerUnit = readGasSizeInputs('purchaseCost', false);
    const total = GAS_SIZES.reduce((a,sz)=>a + getBreakdownQty(qty[sz])*Number(costPerUnit[sz]||0), 0);
    document.getElementById('f_bill').value = total;
  });
  if(editing){
    document.getElementById('deletePurchaseBtn').addEventListener('click', ()=>{
      openDangerousDeleteConfirm('ลบรายการรับถังถาวร', editing.supplierName, ()=>{
        state.purchases = state.purchases.filter(p=>p.id!==editId);
        persistPurchases(); render();
      });
    });
  }
  document.getElementById('purchaseForm').addEventListener('submit', e=>{
    e.preventDefault();
    const supplierName = document.getElementById('f_supplier').value.trim();
    if(!supplierName){
      document.getElementById('supplierError').style.display = 'block';
      document.getElementById('f_supplier').focus();
      return;
    }
    const data = {
      supplierName,
      date: document.getElementById('f_date').value || todayISO(),
      breakdown: readGasSizeInputs('purchase'),
      costPerUnit: readGasSizeInputs('purchaseCost', false),
      tipPaid: document.getElementById('f_tipPaid').checked,
      tipPerCylinder: Number(document.getElementById('f_tipPerCylinder').value)||0,
      billAmount: Number(document.getElementById('f_bill').value)||0,
      paidCash: Number(document.getElementById('f_paidCash').value)||0,
      paidTransfer: Number(document.getElementById('f_paidTransfer').value)||0,
      note: document.getElementById('f_note').value.trim()
    };
    if(editing){ Object.assign(editing, data); }
    else {
      const exchangeEmpty = document.getElementById('f_exchangeEmpty').checked;
      state.purchases.push({ id: uid(), ...data, exchangeEmpty });
      applyPurchaseToInventory(data.breakdown, exchangeEmpty);
    }
    persistPurchases();
    closeModal();
    render();
  });
}

/* ---------------- DASHBOARD ---------------- */
function renderDashboard(){
  const totalDebt = state.customers.reduce((a,c)=>a+Number(c.debt||0),0);
  const totalGas = state.customers.reduce((a,c)=>a+Number(c.gasCylinders||0),0);
  // split the total borrowed-cylinder count by brand for the dashboard card. Older/bulk-imported
  // customers may have a gasCylinders count with no brand breakdown recorded — default that
  // unspecified portion to "regular" so regular+ptt always adds back up to the real total
  const gasByBrand = { regular:0, ptt:0 };
  state.customers.forEach(c=>{
    const items = breakdownToLineItems(c.gasCylindersBreakdown||[]);
    const bdSum = items.reduce((a,i)=>a+i.qty,0);
    items.forEach(item=>{ gasByBrand[item.brand] = (gasByBrand[item.brand]||0) + item.qty; });
    const unspecified = Number(c.gasCylinders||0) - bdSum;
    if(unspecified>0) gasByBrand.regular += unspecified;
  });
  // total tanks physically at the shop right now (full + empty combined, split by brand) — used by
  // the merged ราคาแก๊สวันนี้ card's "ถังที่ร้าน" summary box
  const shopStockByBrand = { regular: 0, ptt: 0 };
  GAS_SIZES.forEach(sz=>{
    const reg = (state.inventory[sz] && state.inventory[sz].regular) || {full:0,empty:0};
    const ptt = (state.inventory[sz] && state.inventory[sz].ptt) || {full:0,empty:0};
    shopStockByBrand.regular += Number(reg.full||0) + Number(reg.empty||0);
    shopStockByBrand.ptt += Number(ptt.full||0) + Number(ptt.empty||0);
  });
  const totalShopStock = shopStockByBrand.regular + shopStockByBrand.ptt;
  const upcoming = getUpcomingReminders(3);
  // customers sitting on a banked ไทยช่วยไทย/บัตรประชารัฐ credit they haven't used yet — surfaced
  // here regardless of reorder-cycle prediction status, since these are often first-time/irregular
  // orderers who tapped their credit before ever actually buying gas
  const pendingCreditCustomers = state.customers.filter(c=> Number(c.thaiChuayCredit||0)>0 || Number(c.prachanatCredit||0)>0);
  const unpaidBills = state.purchases.filter(p=>{
    if(p.archived) return false;
    const s = getPurchasePaymentStatus(p);
    return !s.isPaid && !s.noBillAmount;
  });
  const unpaidBillTotal = unpaidBills.reduce((a,p)=>a+getPurchasePaymentStatus(p).remaining,0);

  // dashboard P&L card period switch (วัน/เดือน/ปี) — reuses getPLItems so the totals here always
  // match exactly what the detail modal (tap "แตะดู") shows for the same period
  const dashPLIncomeItems = getPLItems('income', dashboardPLPeriod);
  const dashPLExpenseItems = getPLItems('expense', dashboardPLPeriod);
  const totalIncomePeriod = dashPLIncomeItems.reduce((a,i)=>a+Number(i.amount||0),0);
  const totalExpensePeriod = dashPLExpenseItems.reduce((a,i)=>a+Number(i.amount||0),0);
  const profitPeriod = totalIncomePeriod - totalExpensePeriod;
  const dashPLPeriodLabels = { day:'วันนี้', month:'เดือนนี้', year:'ปีนี้' };
  const dashPLPeriodOptions = [['day','วัน'],['month','เดือน'],['year','ปี']];

  const dailySummaryButtonRow = `<div class="btnrow" style="margin-bottom:12px;"><button class="btn ghost small" id="openDailySummaryBtn">📋 สรุปผลประจำวัน (อัตโนมัติตั้งแต่ 00:00 น.)</button></div>`;

  const plCard = `
    <div class="stamp-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-weight:700;">📊 รายรับ-รายจ่าย${dashPLPeriodLabels[dashboardPLPeriod]}</div>
        <button class="btn ghost small" id="addTransactionBtn">➕ เพิ่มรายการ</button>
      </div>
      <div class="btnrow" style="margin-bottom:10px;">${dashPLPeriodOptions.map(([k,l])=>`<button type="button" class="btn ${dashboardPLPeriod===k?'primary':'ghost'} small" data-dash-pl-period="${k}">${l}</button>`).join('')}</div>
      <div class="grid2" style="margin-bottom:0;">
        <div class="stat" data-show-pl="income" style="cursor:pointer;"><div class="label">รายรับ (แตะดู)</div><div class="value sale">฿${fmtMoney(totalIncomePeriod)}</div></div>
        <div class="stat" data-show-pl="expense" style="cursor:pointer;"><div class="label">รายจ่าย (แตะดู)</div><div class="value debt">฿${fmtMoney(totalExpensePeriod)}</div></div>
        <div class="stat" style="grid-column:span 2;"><div class="label">กำไรสุทธิ</div><div class="value" style="color:${profitPeriod>=0?'var(--green)':'var(--red)'};">฿${fmtMoney(profitPeriod)}</div></div>
        <div class="stat" data-goto-tab="debtors" style="cursor:pointer;grid-column:span 2;"><div class="label">ยอดหนี้รวม (แตะดู)</div><div class="value debt">฿${fmtMoney(totalDebt)}</div></div>
      </div>
    </div>`;

  const avgCost = getWeightedAvgCostPerUnit();
  // merged card: ราคาแก๊สวันนี้ + สต๊อกถังที่ร้าน live together now, so a size's price/profit and its
  // remaining stock are visible at the same glance instead of needing two separate cards
  const priceCard = `
    <div class="stamp-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px;">
        <div style="font-weight:700;">🛢️ ราคาแก๊สวันนี้</div>
        <div class="btnrow" style="margin:0;">
          <button class="btn ghost small" id="editInventoryBtn">ปรับสต๊อก</button>
          <button class="btn ghost small" id="viewInventoryAdjLogBtn">📜 ประวัติการปรับสต๊อก</button>
          <button class="btn ghost small" id="editPricesBtn">แก้ไขราคาแก๊ส</button>
        </div>
      </div>
      <div class="grid2" style="margin-bottom:0;">
        ${GAS_SIZES.map(sz=>{
          const sell = Number(state.gasPrices[sz]||0);
          const cost = avgCost[sz];
          const profit = cost!==null ? sell - cost : null;
          const reg = (state.inventory[sz] && state.inventory[sz].regular) || {full:0,empty:0};
          const ptt = (state.inventory[sz] && state.inventory[sz].ptt) || {full:0,empty:0};
          return `<div class="stat">
            <div class="label" style="display:flex;align-items:center;gap:6px;">${iconImgHtml(tankIconSrc('regular', sz), 26)}${sz} kg</div>
            <div class="value mono" style="font-size:17px;">฿${fmtMoney(sell)}</div>
            ${profit!==null
              ? `<div class="rem-meta" style="margin-top:2px;color:${profit>=0?'var(--green)':'var(--red)'};">กำไร ${profit>=0?'+':''}฿${fmtMoney(Math.round(profit))} (ทุน ฿${fmtMoney(Math.round(cost))})</div>`

// bundles every piece of app data into one JSON file the shop owner can keep as an offline backup
// (separate from Firestore, which is the live source of truth) — covers everything loaded at init()
function exportFullBackup(){
  const backup = {
    exportedAt: new Date().toISOString(),
    app: 'ห้วยบอนแก๊ส - สมุดบัญชีร้าน',
    customers: state.customers,
    sales: state.sales,
    reminders: state.reminders,
    tasks: state.tasks,
    purchases: state.purchases,
    transactions: state.transactions,
    gasPrices: state.gasPrices,
    pickupDiscount: state.pickupDiscount,
    inventory: state.inventory,
    dailySummaries: state.dailySummaries,
    otherProducts: state.otherProducts,
    truckStock: state.truckStock
  };
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `สำรองข้อมูล_ห้วยบอนแก๊ส_${todayISO()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function openOtherProductForm(id){

  const previewSrc = p ? (productIconSrc(p.id) || '') : '';

    <form class="panel" id="otherProductForm" novalidate>

      <div class="field-row">
        <div class="field"><label>ราคาขาย (บาท) *</label><input type="text" inputmode="decimal" min="0" step="1" id="f_opPrice" value="${p? p.price||0:0}"></div>

      </div>
      <div class="field"><label>หน่วย</label><input id="f_opUnit" value="${p? escapeAttr(p.unit||'ชิ้น') : 'ชิ้น'}" placeholder="เช่น ชิ้น, เมตร, ถัง, ชุด"></div>
      <div class="field">
        <label>รูปไอค่อนสินค้า (ไม่บังคับ — จะถูกปรับขนาดเป็น 32x32 อัตโนมัติ)</label>
        <div style="display:flex;align-items:center;gap:10px;">
          <img id="opIconPreview" src="${previewSrc}" style="width:48px;height:48px;image-rendering:pixelated;border:1px solid var(--border);border-radius:6px;background:#fff;object-fit:contain;${previewSrc?'':'display:none;'}">
          <input type="file" accept="image/*" id="f_opImageFile" style="flex:1;">
          <button type="button" class="btn ghost small" id="removeOpIconBtn" style="${pendingCustomIcon?'':'display:none;'}">ลบรูป</button>
        </div>
      </div>
      <div class="btnrow">
        <button type="submit" class="btn primary">บันทึก</button>
        ${p? `<button type="button" class="btn danger" id="deleteOtherProductBtn">ลบสินค้านี้</button>` : ''}
        <button type="button" class="btn ghost" id="cancelModal">ยกเลิก</button>
      </div>
    </form>`;
  showModal(body);
  document.getElementById('f_opImageFile').addEventListener('change', e=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement('canvas');
        canvas.width = 32; canvas.height = 32;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 32, 32);
        pendingCustomIcon = canvas.toDataURL('image/png');
        const preview = document.getElementById('opIconPreview');
        preview.src = pendingCustomIcon;
        preview.style.display = '';
        document.getElementById('removeOpIconBtn').style.display = '';
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('removeOpIconBtn').addEventListener('click', ()=>{
    pendingCustomIcon = null;
    document.getElementById('f_opImageFile').value = '';
    const fallback = p ? (PRODUCT_ID_ICON_KEY[p.id] ? (PRODUCT_ICONS[PRODUCT_ID_ICON_KEY[p.id]]||'') : '') : '';
    const preview = document.getElementById('opIconPreview');
    preview.src = fallback;
    preview.style.display = fallback? '' : 'none';
    document.getElementById('removeOpIconBtn').style.display = 'none';
  });
  if(p){
    document.getElementById('deleteOtherProductBtn').addEventListener('click', ()=>{
      if(confirm(`ลบสินค้า "${p.name}" ใช่หรือไม่?`)){
        state.otherProducts = state.otherProducts.filter(x=>x.id!==p.id);
        if(selectedOtherProductId===p.id) selectedOtherProductId = null;
        persistOtherProducts();
        closeModal();
        render();
      }
    });
  }
  document.getElementById('otherProductForm').addEventListener('submit', e=>{
    e.preventDefault();
    const name = document.getElementById('f_opName').value.trim();
    if(!name){
      document.getElementById('opNameError').style.display = 'block';
      document.getElementById('f_opName').focus();
      return;
    }
    const data = {
      name,
      price: Number(document.getElementById('f_opPrice').value)||0,
      cost: Number(document.getElementById('f_opCost').value)||0,
      unit: document.getElementById('f_opUnit').value.trim() || 'ชิ้น',
      customIcon: pendingCustomIcon || null
    };
    if(p){ Object.assign(p, data); }
    else {
      const newProduct = { id: 'op_'+uid(), ...data };
      state.otherProducts.push(newProduct);
      selectedOtherProductId = newProduct.id;
    }
    persistOtherProducts();
    closeModal();
    render();
  });
}

          const after = Number(document.getElementById(`inv_${sz}_${brand}_${type}`).value)||0;
          if(before !== after) changes.push({ size:sz, brand, type, before, after });
          state.inventory[sz][brand][type] = after;
        });
      });
    });
    persistInventory();
    // audit trail — so recurring drift (e.g. one size/brand always coming up short) is actually
    // visible over time instead of silently overwritten each time someone corrects the count
    if(changes.length){
      state.inventoryAdjustments = [...(state.inventoryAdjustments||[]), { id: uid(), date: todayISO(), at: Date.now(), changes, note }];
      persistInventoryAdjustments();
    }
    closeModal();
    render();
  });
}

function getPLItems(type, period){
  const today = todayISO();
  function inPeriod(dateStr){
    if(period==='day') return dateStr===today;
    if(period==='month') return dateStr.slice(0,7)===today.slice(0,7);
    if(period==='year') return dateStr.slice(0,4)===today.slice(0,4);
    if(period==='custom') return dateStr===plDetailCustomDate;
    return true; // 'all'
  }
  let items = [];
  if(type==='income'){
    // ค้างจ่าย (unpaid) sales aren't cash yet — leave them out of the income breakdown; they'll
    // show up here on whatever day the debt actually gets paid off instead.
    // creditApplied (ไทยช่วยไทย prepaid credit used on this sale) and prachanatCreditApplied
    // (บัตรประชารัฐ prepaid credit) were already counted as income back when the customer
    // topped up those credits — so don't recognize them as income a second time here.
    state.sales.filter(s=>inPeriod(s.date) && !s.unpaid).forEach(s=>{
      const cust = state.customers.find(c=>c.id===s.customerId);
      const recognized = Number(s.amount||0) - Number(s.creditApplied||0) - Number(s.prachanatCreditApplied||0);
      if(recognized<=0) return;
      items.push({ date:s.date, amount:recognized, note: cust? cust.name : (s.note||'ยอดขาย'), id:s.id, source:'sale' });
    });
    state.transactions.filter(t=>t.type==='income' && inPeriod(t.date)).forEach(t=>{
      items.push({ date:t.date, amount:t.amount, note: t.note||'รายรับอื่นๆ', id:t.id, source:'transaction' });
    });
  } else {
    state.purchases.filter(p=>inPeriod(p.date)).forEach(p=>{
      items.push({ date:p.date, amount:p.billAmount||0, note: `รับถัง — ${p.supplierName}${p.note? ' · '+p.note:''}`, id:p.id, source:'purchase' });
    });
    state.transactions.filter(t=>t.type==='expense' && inPeriod(t.date)).forEach(t=>{
      items.push({ date:t.date, amount:t.amount, note: t.note||'รายจ่ายอื่นๆ', id:t.id, source:'transaction' });
    });

/* ---------------- CUSTOMERS ---------------- */
/* ---------------- duplicate-customer detection + merge ----------------
   ปัญหา: พิมพ์ชื่อลูกค้าด้วยเสียง (voice input) มักสะกดคลาดเคลื่อนเล็กน้อยในแต่ละครั้ง
   ทำให้คนเดียวกันถูกบันทึกเป็นหลายรายการ ที่นี่จะสแกนหาชื่อ/เบอร์ที่คล้ายกันทั้งระบบ
   แล้วให้ผู้ใช้เลือกรวมข้อมูล (debt, ถังแก๊สที่ยืม, ประวัติสั่งของ/งานส่ง) เข้าด้วยกัน */
function levenshtein(a, b){
  a = a || ''; b = b || '';
  const m = a.length, n = b.length;
  if(m===0) return n;
  if(n===0) return m;
  let prev = Array.from({length:n+1}, (_,j)=>j);
  for(let i=1;i<=m;i++){
    const cur = [i];
    for(let j=1;j<=n;j++){
      cur[j] = a[i-1]===b[j-1] ? prev[j-1] : 1+Math.min(prev[j-1], prev[j], cur[j-1]);
    }
    prev = cur;
  }
  return prev[n];
}
function nameSimilarity(a, b){
  a = (a||'').trim().toLowerCase(); b = (b||'').trim().toLowerCase();
  if(!a || !b) return 0;
  if(a===b) return 1;
  const dist = levenshtein(a, b);
  const maxLen = Math.max(a.length, b.length);
  return 1 - dist/maxLen;
}
function dupePairKey(id1, id2){ return [id1, id2].sort().join('|'); }
function getDismissedDupePairs(){
  try{ return new Set(JSON.parse(localStorage.getItem('dismissedDupePairs')||'[]')); }
  catch(e){ return new Set(); }
}
function addDismissedDupePairs(pairs){
  const set = getDismissedDupePairs();
  pairs.forEach(p=>set.add(p));
  localStorage.setItem('dismissedDupePairs', JSON.stringify([...set]));
}
// groups likely-duplicate customers together (transitively, via union-find), skipping
// pairs the user already dismissed as "not the same person"
function findDuplicateCustomerGroups(){
  const dismissed = getDismissedDupePairs();
  const customers = state.customers;
  const n = customers.length;
  const parent = customers.map((_,i)=>i);
  function find(x){ while(parent[x]!==x){ parent[x]=parent[parent[x]]; x=parent[x]; } return x; }
  function union(x,y){ const rx=find(x), ry=find(y); if(rx!==ry) parent[rx]=ry; }
  for(let i=0;i<n;i++){
    for(let j=i+1;j<n;j++){
      const a = customers[i], b = customers[j];
      if(dismissed.has(dupePairKey(a.id, b.id))) continue;
      const samePhone = a.phone && b.phone && a.phone.trim()===b.phone.trim();
      const nameA = (a.name||'').trim().toLowerCase(), nameB = (b.name||'').trim().toLowerCase();
      const substr = nameA.length>=3 && nameB.length>=3 && (nameA.includes(nameB) || nameB.includes(nameA));
      const sim = nameSimilarity(a.name, b.name);
      if(samePhone || substr || sim>=0.72) union(i,j);
    }
  }
  const groupsMap = {};
  for(let i=0;i<n;i++){
    const root = find(i);
    (groupsMap[root] = groupsMap[root]||[]).push(customers[i]);
  }
  return Object.values(groupsMap).filter(g=>g.length>1);
}
// sums the gas-cylinder breakdowns of every customer in the group into one flat array
function mergeGasBreakdowns(customers){
  const totals = {};
  customers.forEach(c=>{
    breakdownToLineItems(c.gasCylindersBreakdown).forEach(item=>{
      const key = item.size+'_'+item.brand;
      totals[key] = (totals[key]||0) + Number(item.qty||0);
    });
  });
  return Object.keys(totals).map(k=>{
    const [size, brand] = k.split('_');
    return { size, brand, qty: totals[k] };
  }).filter(i=>i.qty>0);
}

  const groups = findDuplicateCustomerGroups();

// merges every customer in `group` into the one whose id is `primaryId`: sums debt + gas
// breakdown, fills blank fields from the others, concatenates notes, re-points every historical
// sale/task/reminder that referenced a merged-away id, then removes those duplicate records
function performMergeCustomers(group, primaryId){
  const primary = state.customers.find(c=>c.id===primaryId);
  const others = group.filter(c=>c.id!==primaryId);
  if(!primary || !others.length) return;

  primary.debt = group.reduce((a,c)=>a+Number(c.debt||0), 0);
  primary.gasCylindersBreakdown = mergeGasBreakdowns(group);

  ['phone','address','soi','moo','landmark'].forEach(f=>{
    if(!primary[f]){
      const donor = others.find(c=>c[f]);
      if(donor) primary[f] = donor[f];
    }
  });
  const otherNotes = others.filter(c=>c.notes).map(c=>c.notes);
  const mergeNote = `(รวมจาก: ${others.map(c=>c.name).join(', ')})`;
  primary.notes = [primary.notes, ...otherNotes, mergeNote].filter(Boolean).join(' | ');

  const otherIds = others.map(c=>c.id);
  state.sales.forEach(s=>{ if(otherIds.includes(s.customerId)) s.customerId = primary.id; });
  state.tasks.forEach(t=>{ if(otherIds.includes(t.customerId)) t.customerId = primary.id; });
  state.reminders.forEach(r=>{ if(otherIds.includes(r.customerId)) r.customerId = primary.id; });

  state.customers = state.customers.filter(c=>!otherIds.includes(c.id));

  persistCustomers();
  persistSales();
  persistTasks();
  persistReminders();
}

  let list = [...state.customers];
  const q = customerSearchQuery.trim().toLowerCase();
  if(q){ list = list.filter(c=> c.name.toLowerCase().includes(q) || (c.phone||'').toLowerCase().includes(q)); }
  if(customersFilterType==='debt') list = list.filter(c=>Number(c.debt||0)>0);
  else if(customersFilterType==='gas') list = list.filter(c=>Number(c.gasCylinders||0)>0);
  else if(customersFilterType==='nophone') list = list.filter(c=>!c.phone);
  else if(customersFilterType==='tierDiamond') list = list.filter(c=>getCustomerTier(c.id)==='diamond');
  else if(customersFilterType==='tierInactive') list = list.filter(c=>getCustomerTier(c.id)==='inactive');
  else if(customersFilterType==='tierNew') list = list.filter(c=>getCustomerTier(c.id)==='new');
  if(customersSort==='debt') list.sort((a,b)=>Number(b.debt||0)-Number(a.debt||0));
  else if(customersSort==='gas') list.sort((a,b)=>Number(b.gasCylinders||0)-Number(a.gasCylinders||0));
  else if(customersSort==='recent') list.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  else list.sort((a,b)=>a.name.localeCompare(b.name,'th'));
  const listHtml = list.length? list.map(renderCustomerCard).join('') : '<div class="empty">ไม่พบลูกค้าที่ตรงกับเงื่อนไข</div>';
  return toolRow + searchBar + toggleBtn + panel + `<div class="rem-meta" style="margin-bottom:8px;">พบ ${list.length} คน</div>` + listHtml;
}

function exportCustomersCSV(){
  const headers = ['ชื่อ','เบอร์โทร','ที่อยู่','ถังแก๊สที่ยืม','ยอดค้างชำระ','หมายเหตุ','จำนวนครั้งที่สั่ง','ถังรวมสะสม','ยอดรวมสะสม','สั่งล่าสุด'];
  const csvEscape = v => `"${String(v==null?'':v).replace(/"/g,'""')}"`;
  const rows = state.customers.map(c=>{
    const stats = getCustomerStats(c.id);
    return [
      c.name, c.phone||'', c.address||'', c.gasCylinders||0, c.debt||0, c.notes||'',
      stats.count, stats.totalGas, stats.totalAmount, stats.lastDate||''
    ].map(csvEscape).join(',');
  });
  const csv = '\uFEFF' + headers.map(csvEscape).join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ลูกค้า_${todayISO()}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

    </div>
    <form class="panel" id="importForm">

      <div id="importResult" class="rem-meta" style="margin-top:8px;"></div>
    </form>`;
  showModal(body);
  document.getElementById('importForm').addEventListener('submit', e=>{
    e.preventDefault();
    const raw = document.getElementById('f_bulk').value;

      state.customers.push({
        id: uid(),
        createdAt: new Date().toISOString(),
        name,

        gasCylinders: Number(parts[3]) || 0,
        debt: Number(parts[4]) || 0,
        notes: parts[5] || ''
      });
      count++;
    });
    if(count>0){ persistCustomers(); }
    document.getElementById('importResult').textContent = count>0 ? `นำเข้าสำเร็จ ${count} รายการ` : 'ไม่พบข้อมูลที่นำเข้าได้ ตรวจสอบรูปแบบอีกครั้ง';
    if(count>0){
      setTimeout(()=>{ closeModal(); render(); }, 900);
    }
  });
}

      if(!q){ nameSuggestBox.innerHTML=''; return; }
      const matches = state.customers.filter(x=>x.name.toLowerCase().includes(q)).slice(0,5);
      if(!matches.length){ nameSuggestBox.innerHTML=''; return; }
      nameSuggestBox.innerHTML = `<div class="rem-meta" style="margin-bottom:4px;color:var(--orange-dark);">⚠️ มีชื่อคล้ายกันอยู่แล้วในระบบ ${matches.length} คน — แตะเพื่อแก้ไขคนนั้นแทน (ถ้าเป็นคนละคนกัน เพิ่มใหม่ต่อได้เลย)</div>`
        + matches.map(x=>`<div class="card" style="padding:8px 12px;cursor:pointer;margin-bottom:4px;" data-pick-existing-cust="${x.id}">👤 ${escapeHtml(x.name)}${x.phone? ' · '+escapeHtml(x.phone):''}</div>`).join('');
      nameSuggestBox.querySelectorAll('[data-pick-existing-cust]').forEach(el=>{
        el.addEventListener('click', ()=>{
          closeModal();
          openCustomerForm(el.dataset.pickExistingCust);
        });
      });
    }
    nameInput.addEventListener('input', renderCustNameSuggestions);
  }
  document.getElementById('useLocationBtn').addEventListener('click', ()=>{
    const statusEl = document.getElementById('locationStatus');
    if(!navigator.geolocation){
      statusEl.textContent = 'อุปกรณ์นี้ไม่รองรับการระบุตำแหน่ง กรุณาวางลิงก์ Google Maps แทน';
      return;
    }
    statusEl.textContent = 'กำลังค้นหาตำแหน่ง...';
    navigator.geolocation.getCurrentPosition(pos=>{
      const {latitude, longitude} = pos.coords;
      document.getElementById('f_address').value = `${latitude.toFixed(6)},${longitude.toFixed(6)}`;
      statusEl.textContent = '✓ บันทึกตำแหน่งปัจจุบันแล้ว';
    }, err=>{
      statusEl.textContent = 'ไม่สามารถเข้าถึงตำแหน่งได้ — กรุณาอนุญาตการเข้าถึงตำแหน่งที่ตั้ง หรือวางลิงก์ Google Maps แทน';
    }, {enableHighAccuracy:true, timeout:8000});
  });
  document.getElementById('custForm').addEventListener('submit', e=>{
    e.preventDefault();
    const gasCylindersBreakdown = (window._lineBuilders['custGasLine']||[]).slice();
    const data = {
      name: document.getElementById('f_name').value.trim(),
      phone: document.getElementById('f_phone').value.trim(),
      address: document.getElementById('f_address').value.trim(),
      soi: stripSoiChars(document.getElementById('f_soi').value),
      moo: stripToDigits(document.getElementById('f_moo').value),
      landmark: document.getElementById('f_landmark').value.trim(),
      gasCylindersBreakdown,
      gasCylinders: sumGasBreakdown(gasCylindersBreakdown),
      debt: Number(document.getElementById('f_debt').value)||0,
      thaiChuayCredit: Math.max(0, Number(document.getElementById('f_thaiChuayCredit').value)||0),
      prachanatCredit: Math.max(0, Number(document.getElementById('f_prachanatCredit').value)||0),
      notes: document.getElementById('f_notes').value.trim()
    };
    if(!data.name){
      document.getElementById('nameError').style.display = 'block';
      document.getElementById('f_name').focus();
      return;
    }
    if(c){ Object.assign(c, data); }
    else { state.customers.push({id:uid(), createdAt:new Date().toISOString(), ...data}); }
    persistCustomers();
    closeModal();
    render();
  });
}

  prachanatCheckbox.addEventListener('change', ()=>{
    prachanatBox.style.display = prachanatCheckbox.checked? 'block' : 'none';
    updatePrachanatTotal();
  });
  prachanatCardsInput.addEventListener('input', updatePrachanatTotal);
  document.getElementById('usePrachanatTotalBtn').addEventListener('click', ()=>{
    const cards = Math.max(1, Number(prachanatCardsInput.value)||1);
    document.getElementById('f_amount').value = cards*80;
  });
  document.getElementById('payForm').addEventListener('submit', e=>{
    e.preventDefault();
    const amt = Number(document.getElementById('f_amount').value)||0;
    if(amt<=0){
      document.getElementById('amountError').style.display = 'block';
      document.getElementById('f_amount').focus();
      return;
    }
    const usePrachanat = prachanatCheckbox.checked;
    const prachanatCards = usePrachanat? Math.max(1, Number(prachanatCardsInput.value)||1) : 0;
    adjustCustomerRemote(c.id, fresh=>{
      const updated = cloneCustomerForEdit(fresh);
      updated.debt = Math.max(0, Number(updated.debt||0) - amt);
      // paid via ประชารัฐ card RIGHT NOW (not pre-tapped credit) — just append to the tap-count
      // history for audit purposes; the money itself is booked as a normal debt payment below, so
      // this does NOT touch the spendable prachanatCredit balance (nothing was banked in advance)
      if(usePrachanat){
        updated.prachanatCreditLog = [...(updated.prachanatCreditLog||[]), { id: uid(), date: todayISO(), amount: prachanatCards*80, times: prachanatCards, note: 'จ่ายหนี้ด้วยบัตรประชารัฐ' }];
      }
      return updated;
    }).then(()=>render());
    state.sales.push({
      id:uid(), date:todayISO(), amount:amt, customerId:c.id,
      note: usePrachanat? `รับชำระหนี้ (บัตรประชารัฐ x${prachanatCards})` : 'รับชำระหนี้',
      createdAt: Date.now()
    });
    persistSales();
    closeModal();
    render();
  });
}

/* ---------------- ไทยช่วยไทยพลัส (60/40) credit — customers sometimes "tap" their daily ฿334
   government co-pay quota on the app before actually taking gas, banking it as a prepaid credit
   against a future real delivery. Real money lands in the shop's account the moment they tap, so
   it's logged as income right away (via state.transactions) — separate from customer.debt because
   it runs the opposite direction: the shop owes the customer gas value, not the other way around. ---------------- */
function openAddThaiChuayCreditPrompt(id){
  const c = state.customers.find(x=>x.id===id);

      </div>
      <div class="field">
        <label>จำนวนครั้งที่กด (สูงสุด 334 บาท/ครั้ง)</label>
        <div class="btnrow">${[1,2,3,4,5].map(n=>`<button type="button" class="btn ghost small" data-credit-times="${n}">×${n}</button>`).join('')}</div>
      </div>
      <div class="field">
        <label>จำนวนเงินที่กดรวม (บาท) *</label>
        <input type="text" inputmode="decimal" min="0" step="1" id="f_creditAmount" value="334">

        <div id="creditAmountError" class="rem-meta" style="color:var(--red);display:none;margin-top:4px;">กรุณากรอกจำนวนเงินมากกว่า 0</div>
      </div>
      <div class="field"><label>หมายเหตุ</label><input id="f_creditNote" placeholder="เช่น กดไทยช่วยไทยล่วงหน้า"></div>
      <div class="btnrow">
        <button type="submit" class="btn primary">บันทึก</button>
        <button type="button" class="btn ghost" id="cancelModal">ยกเลิก</button>
      </div>
    </form>
  `;
  showModal(body);
  document.querySelectorAll('[data-credit-times]').forEach(b=>b.addEventListener('click', ()=>{
    const n = Number(b.dataset.creditTimes)||1;

    document.getElementById('f_creditTimes').value = n;
  }));
  document.getElementById('addCreditForm').addEventListener('submit', e=>{
    e.preventDefault();
    const amt = Number(document.getElementById('f_creditAmount').value)||0;
    if(amt<=0){
      document.getElementById('creditAmountError').style.display = 'block';
      document.getElementById('f_creditAmount').focus();
      return;
    }
    const times = Math.max(1, Number(document.getElementById('f_creditTimes').value)||1);
    const note = document.getElementById('f_creditNote').value.trim();
    adjustCustomerRemote(c.id, fresh=>{
      const updated = cloneCustomerForEdit(fresh);
      updated.thaiChuayCredit = Number(updated.thaiChuayCredit||0) + amt;
      // keeps a running tap-by-tap log (separate from the spendable balance above, which goes
      // down as credit gets redeemed) so the shop can always see "กดไปกี่ครั้ง รวมกี่บาท" even
      // after some of it has already been used against an order — "times" lets one entry represent

// manual "settle debt against credit" reconciliation — used when a customer already has an old
// unpaid debt AND separately has a banked ไทยช่วยไทย credit balance (e.g. they tapped it hoping
// it'd cover an old bill rather than a brand-new order). Doesn't touch state.sales/income at all:
// the credit's value was already recognized as income the moment it was topped up, so this is
// purely an internal transfer between the two customer-record balances.
function openReconcileThaiChuayPrompt(id){
  const c = state.customers.find(x=>x.id===id);
  if(!c) return;
  const debt = Number(c.debt||0);
  const credit = Number(c.thaiChuayCredit||0);
  const usedCredit = Math.min(debt, credit);
  const remainingDebt = debt - usedCredit;
  const remainingCredit = credit - usedCredit;
  const resultText = remainingDebt>0
    ? `ใช้เครดิตหักหนี้ได้ ฿${fmtMoney(usedCredit)} — ลูกค้ายังต้องจ่ายเพิ่มอีก ฿${fmtMoney(remainingDebt)} (เก็บผ่าน "💰 ชำระเงิน" ได้เลยหลังกดยืนยัน)`
    : `ใช้เครดิตหักหนี้ได้ ฿${fmtMoney(usedCredit)} — หนี้หมดพอดี/มีเครดิตเหลือ ฿${fmtMoney(remainingCredit)} เก็บไว้ใช้ครั้งหน้า`;
  const body = `
    <h3>⚖️ หักหนี้ด้วยเครดิตไทยช่วยไทย — ${escapeHtml(c.name)}</h3>
    <div class="rem-meta" style="margin-bottom:10px;line-height:1.6;">ใช้ตอนลูกค้ามีทั้งหนี้เก่าค้างอยู่ และมีเครดิตไทยช่วยไทยที่กดทิ้งไว้ — เอาเครดิตไปหักหนี้ก้อนนี้โดยเฉพาะ (คนละอันกับปุ่ม "✅ เคลียร์ครบ" ที่เอาไว้ปิดหนี้+คืนถังทั้งหมดตอนลูกค้าจ่ายสดเต็มจำนวน)</div>
    <div class="field"><label>หนี้ค้างชำระปัจจุบัน</label><div class="mono" style="font-size:18px;color:var(--red);">฿${fmtMoney(debt)}</div></div>
    <div class="field"><label>เครดิตไทยช่วยไทยคงเหลือ</label><div class="mono" style="font-size:18px;color:var(--green);">฿${fmtMoney(credit)}</div></div>
    <div class="rem-meta" style="margin:10px 0;line-height:1.6;">${resultText}</div>
    <div class="btnrow">
      <button type="button" class="btn primary" id="confirmReconcileBtn">ยืนยันหักหนี้</button>
      <button type="button" class="btn ghost" id="cancelModal">ยกเลิก</button>
    </div>
  `;
  showModal(body);
  document.getElementById('confirmReconcileBtn').addEventListener('click', ()=>{
    adjustCustomerRemote(c.id, fresh=>{
      const updated = cloneCustomerForEdit(fresh);
      const d = Number(updated.debt||0);
      const cr = Number(updated.thaiChuayCredit||0);
      const used = Math.min(d, cr);
      updated.debt = d - used;
      updated.thaiChuayCredit = cr - used;
      return updated;
    }).then(()=>render());
    closeModal();
    render();
  });
}

    document.querySelectorAll('[data-pick-prachanat-staff]').forEach(x=>x.classList.toggle('primary', x===b));
    document.querySelectorAll('[data-pick-prachanat-staff]').forEach(x=>x.classList.toggle('ghost', x!==b));
  }));
  // reprints/prints a coupon for the credit already banked on this customer (no new top-up) — handy
  // when the original coupon was lost, or credit was added before this print feature existed
  const reprintBtn = document.getElementById('reprintPrachanatCouponBtn');
  if(reprintBtn) reprintBtn.addEventListener('click', ()=>{
    const totalTimes = (c.prachanatCreditLog||[]).reduce((a,l)=>a+Number(l.times||1),0);
    const staffName = document.getElementById('f_prachanatStaff').value;
    exportReceiptImage(`คูปองประชารัฐ_${c.name}`, buildPrachanatCouponHtml(c.name, Number(c.prachanatCredit||0), totalTimes || 1, 'สรุปยอดเครดิตคงเหลือ (พิมพ์ซ้ำ)', staffName), 420);

  document.getElementById('addPrachanatCreditForm').addEventListener('submit', e=>{
    e.preventDefault();
    const amt = Number(amountInput.value)||0;
    if(amt<=0){
      document.getElementById('prachanatAmountError').style.display = 'block';
      amountInput.focus();
      return;

    const cards = Number(cardsInput.value)||1;
    const note = document.getElementById('f_prachanatNote').value.trim();
    const staffName = document.getElementById('f_prachanatStaff').value;
    if(staffName) localStorage.setItem('prachanatStaffName', staffName);
    adjustCustomerRemote(c.id, fresh=>{
      const updated = cloneCustomerForEdit(fresh);
      updated.prachanatCredit = Number(updated.prachanatCredit||0) + amt;
      // running tap-by-tap log, same idea as thaiChuayCreditLog — survives redemption so the shop
      // can always see total taps/amount even after some of the balance above has been spent
      updated.prachanatCreditLog = [...(updated.prachanatCreditLog||[]), { id: uid(), date: todayISO(), amount: amt, times: cards, note, staffName }];
      return updated;
    }).then(()=>render());
    state.transactions.push({
      id: uid(),
      type: 'income',
      date: todayISO(),
      amount: amt,
      note: `เครดิตบัตรประชารัฐ — ${c.name}${note? ' ('+note+')' : ''}`
    });
    persistTransactions();
    closeModal();
    render();
    exportReceiptImage(`คูปองประชารัฐ_${c.name}`, buildPrachanatCouponHtml(c.name, amt, cards, note, staffName), 420);
  });
}

// tap the 🪪 next to a customer's name (renderCustomerCard) to see their full ประชารัฐ tap history —
// covers both customers with a live balance AND ones who used to but no longer have credit banked
// (log entries persist through redemption, see openAddPrachanatCreditPrompt's comment). Each entry
// is editable/deletable here for the day the government eventually revokes/changes someone's

// prachanatCredit balance itself (that's adjusted separately via the customer edit form) since not
// every log entry represents banked credit (same-day "จ่ายตอนนี้เลย" taps never touched the balance).

  const log = [...(c.prachanatCreditLog||[])].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const totalTimes = log.reduce((a,l)=>a+Number(l.times||1),0);
  const totalAmount = log.reduce((a,l)=>a+Number(l.amount||0),0);
  const body = `
    <h3>🪪 ประวัติบัตรประชารัฐ — ${escapeHtml(c.name)}</h3>
    <div class="field"><label>เครดิตคงเหลือตอนนี้</label>

      <div class="rem-meta" style="margin-top:4px;">รวมประวัติ: กด ${totalTimes} ครั้ง ฿${fmtMoney(totalAmount)}</div>
    </div>
    <div class="rem-meta" style="margin:10px 0;">แตะ "แก้ไข" ถ้าต้องแก้ไขรายการเก่า หรือ "ลบ" ถ้ารายการนี้ผิด/ถูกยกเลิกสิทธิ์ — การแก้ไข/ลบตรงนี้แก้แค่ประวัติ ไม่กระทบยอดเครดิตคงเหลือด้านบน (ถ้าต้องปรับยอดคงเหลือด้วย ให้ไปแก้ที่หน้าโปรไฟล์ลูกค้า)</div>
    ${log.length? log.map(l=>`
      <div class="card" style="padding:10px 14px;margin-bottom:6px;">
        <div style="display:flex;justify-content:space-between;gap:8px;">
          <div>
            <div style="font-weight:600;">฿${fmtMoney(l.amount)} ${l.times>1? `(×${l.times})`:''}</div>
            <div class="rem-meta">${fmtDateShort(l.date)}${l.staffName? ' · '+escapeHtml(l.staffName):''}</div>
            ${l.note? `<div class="rem-meta">📝 ${escapeHtml(l.note)}</div>`:''}

            <button type="button" class="btn ghost small" data-edit-prachanat-log="${l.id}">แก้ไข</button>
            <button type="button" class="btn danger small" data-del-prachanat-log="${l.id}">ลบ</button>
          </div>
        </div>
      </div>`).join('') : '<div class="empty">ยังไม่มีประวัติการใช้บัตรประชารัฐ</div>'}
    <div class="btnrow" style="margin-top:12px;">
      <button type="button" class="btn ghost" id="cancelModal">ปิด</button>
    </div>
  `;
  showModal(body);
  document.querySelectorAll('[data-edit-prachanat-log]').forEach(b=>b.addEventListener('click', ()=>{
    openEditPrachanatLogEntry(customerId, b.dataset.editPrachanatLog);
  }));
  document.querySelectorAll('[data-del-prachanat-log]').forEach(b=>b.addEventListener('click', ()=>{
    if(!confirm('ลบรายการประวัตินี้ใช่หรือไม่? (ไม่กระทบยอดเครดิตคงเหลือ)')) return;
    adjustCustomerRemote(customerId, fresh=>{
      const updated = cloneCustomerForEdit(fresh);
      updated.prachanatCreditLog = (updated.prachanatCreditLog||[]).filter(x=>x.id!==b.dataset.delPrachanatLog);
      return updated;
    }).then(()=>{ render(); openPrachanatHistoryModal(customerId); });
  }));
}
function openEditPrachanatLogEntry(customerId, entryId){
  const c = state.customers.find(x=>x.id===customerId);
  if(!c) return;
  const entry = (c.prachanatCreditLog||[]).find(x=>x.id===entryId);
  if(!entry) return;
  const body = `
    <h3>แก้ไขประวัติบัตรประชารัฐ</h3>
    <form class="panel" id="editPrachanatLogForm" novalidate>
      <div class="field"><label>วันที่</label><input type="date" id="f_logDate" value="${entry.date||todayISO()}"></div>
      <div class="field"><label>จำนวนเงิน (บาท)</label><input type="text" inputmode="decimal" min="0" step="1" id="f_logAmount" value="${Number(entry.amount||0)}"></div>

    e.preventDefault();
    const newDate = document.getElementById('f_logDate').value || entry.date;
    const newAmount = Number(document.getElementById('f_logAmount').value)||0;

function renderSales(){
  const periods = [['day','รายวัน'],['week','รายสัปดาห์'],['month','รายเดือน'],['year','รายปี']];
  const toggle = `<div class="chart-toggle">${periods.map(([k,l])=>`<button data-period="${k}" class="${k===salesPeriod?'active':''}">${l}</button>`).join('')}</div>`;
  const chart = `<div class="chart-wrap"><canvas id="salesChart" height="180"></canvas></div>`;
  const dailyList = renderDailyDeliveryList();

  const sortOptions = [['date','วันที่ล่าสุด'],['amount','จำนวนเงิน'],['name','ชื่อลูกค้า']];
  const sortBar = `<div class="btnrow" style="margin-bottom:12px;">${sortOptions.map(([k,l])=>`<button class="btn ${recentSalesSort===k?'primary':'ghost'} small" data-recent-sales-sort="${k}">${l}</button>`).join('')}</div>`;

  let recent = [...state.sales];
  if(recentSalesSort==='amount') recent.sort((a,b)=>Number(b.amount||0)-Number(a.amount||0));
  else if(recentSalesSort==='name') recent.sort((a,b)=>{
    const an = (state.customers.find(c=>c.id===a.customerId)||{}).name || a.note || '';
    const bn = (state.customers.find(c=>c.id===b.customerId)||{}).name || b.note || '';
    return an.localeCompare(bn,'th');
  });
  // "date" here is just a YYYY-MM-DD string with no time — sorting by date alone leaves same-day
  // entries in original push order (oldest first), so the newest sale of the day showed up at the
  // bottom of that day's cluster instead of the top. createdAt is a real ms timestamp set at push
  // time, so it breaks the tie correctly; older sales recorded before this fix fall back to 0.
  else recent.sort((a,b)=>{
    const dateCmp = b.date.localeCompare(a.date);
    if(dateCmp !== 0) return dateCmp;
    return (b.createdAt||0) - (a.createdAt||0);
  });
  recent = recent.slice(0,15);

  const list = recent.length? recent.map(s=>{
    const cust = state.customers.find(c=>c.id===s.customerId);
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-weight:600;">${cust? escapeHtml(cust.name) : (s.note||'ยอดขาย')}</div>
          <div class="rem-meta">${fmtDateShort(s.date)}</div>
        </div>
        <div class="mono" style="color:var(--green);font-size:16px;">+฿${fmtMoney(s.amount)}</div>
      </div>
      ${s.otherItems && s.otherItems.length? `<div class="rem-meta" style="margin-top:2px;">🧰 ${otherItemsSummary(s.otherItems)}</div>` : ''}
      <div class="btnrow" style="margin-top:6px;">
        <button class="btn ghost small" data-edit-sale="${s.id}">แก้ไข</button>
        <button class="btn ghost small" data-bill-sale="${s.id}">🧾 บิล</button>
      </div>
    </div>`;
  }).join('') : '<div class="empty">ยังไม่มีรายการขาย</div>';

  return `${toggle}${chart}<h2 class="section-title">รายการล่าสุด</h2>${sortBar}${list}${dailyList}`;
}
